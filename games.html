<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифровий Садівник | BUKVA NEWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --green: #22c55e;
            --aqua: #06b6d4;
            --gold: #f59e0b;
            --purple: #7c3aed;
            --orange: #ea580c;
            --dark: #0a0a0f;
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            background-image:
                radial-gradient(ellipse at top, rgba(34,197,94,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at bottom right, rgba(124,58,237,0.10) 0%, transparent 50%);
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        /* ── TOP HUD ── */
        #hud {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            gap: 10px;
            background: rgba(10,10,15,0.9);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 20;
        }

        .hud-logo {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.05em;
            opacity: 0.5;
            white-space: nowrap;
        }

        .hud-resources {
            display: flex;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .res-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 50px;
        }

        .res-chip svg { width: 16px; height: 16px; flex-shrink: 0; }
        .res-chip .val { font-weight: 900; font-size: 15px; }
        .res-chip .lbl { font-size: 9px; font-weight: 700; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.05em; }

        .hud-level {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            border-radius: 50px;
            padding: 6px 14px;
            font-weight: 900;
            font-size: 13px;
            white-space: nowrap;
        }

        /* ── SCREEN AREA ── */
        #screen-area {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .screen {
            display: none;
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active { display: block; }

        /* ── GARDEN SCREEN ── */
        #garden-bg {
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 50% 30%, rgba(34,197,94,0.08) 0%, transparent 70%),
                linear-gradient(180deg, #0a1a0f 0%, #0d1f0d 50%, #0a150a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Isometric garden */
        #iso-viewport {
            perspective: 800px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 380px;
        }

        #iso-grid {
            display: grid;
            grid-template-columns: repeat(4, 72px);
            grid-template-rows: repeat(3, 72px);
            gap: 4px;
            transform: rotateX(50deg) rotateZ(-20deg);
            transform-style: preserve-3d;
        }

        .iso-tile {
            width: 72px;
            height: 72px;
            background: rgba(34,197,94,0.07);
            border: 1.5px solid rgba(34,197,94,0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 28px;
        }

        .iso-tile:hover, .iso-tile.hover {
            background: rgba(34,197,94,0.18);
            border-color: rgba(34,197,94,0.5);
            transform: translateZ(8px) scale(1.04);
            box-shadow: 0 8px 24px rgba(34,197,94,0.25);
        }

        .iso-tile.occupied { cursor: default; background: rgba(34,197,94,0.05); }

        .plant-emoji { font-size: 26px; line-height:1; display: block; }
        .stage-seed { font-size: 18px; opacity: 0.7; }
        .stage-sprout { font-size: 24px; }
        .stage-tree { font-size: 30px; }
        .stage-bloom { font-size: 32px; filter: drop-shadow(0 0 8px rgba(34,197,94,0.6)); }

        .tile-progress {
            position: absolute;
            bottom: 4px;
            left: 4px; right: 4px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }
        .tile-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--aqua));
            border-radius: 99px;
            transition: width 0.8s ease;
        }

        /* Garden info bar */
        #garden-info {
            padding: 12px 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #plant-tip {
            margin: 12px 20px;
            padding: 14px 18px;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #86efac;
            text-align: center;
        }

        /* Action button (water/plant) */
        #garden-action {
            margin: 0 20px 12px;
            padding: 16px;
            background: linear-gradient(135deg, var(--green), #16a34a);
            border: none;
            border-radius: 22px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            width: calc(100% - 40px);
            letter-spacing: 0.02em;
            box-shadow: 0 8px 24px rgba(34,197,94,0.35);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #garden-action:active { transform: scale(0.97); }
        #garden-action:disabled { opacity: 0.4; background: #374151; box-shadow: none; cursor: not-allowed; }

        /* ── QUESTS SCREEN ── */
        .quests-wrap { padding: 16px; }
        .quest-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 6px;
        }
        .qtab {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qtab.active {
            background: var(--purple);
            color: white;
        }

        .quest-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quest-card:active { transform: scale(0.98); }
        .quest-card.done { opacity: 0.5; }
        .quest-card.done .qc-btn { background: var(--green); }

        .qc-icon {
            width: 48px; height: 48px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .qc-info { flex: 1; min-width: 0; }
        .qc-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
        .qc-desc { font-size: 12px; opacity: 0.6; margin-bottom: 6px; }
        .qc-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
        .qc-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--aqua)); transition: width 0.6s; }

        .qc-reward {
            font-size: 12px;
            font-weight: 900;
            color: var(--gold);
            white-space: nowrap;
            text-align: right;
        }

        .qc-btn {
            width: 36px; height: 36px;
            border-radius: 12px;
            background: var(--purple);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .qc-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }

        .section-label {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            opacity: 0.4;
            margin: 4px 0 10px;
        }

        /* ── SHOP SCREEN ── */
        .shop-wrap { padding: 16px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .shop-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .shop-card:active { transform: scale(0.97); }
        .shop-card.locked { opacity: 0.45; }
        .shop-card.owned { border-color: var(--green); background: rgba(34,197,94,0.08); }
        .shop-plant-icon { font-size: 42px; margin-bottom: 10px; display: block; line-height:1; }
        .shop-name { font-weight: 900; font-size: 15px; margin-bottom: 4px; }
        .shop-desc { font-size: 11px; opacity: 0.5; margin-bottom: 12px; }
        .shop-price {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(6,182,212,0.12);
            border: 1px solid rgba(6,182,212,0.25);
            border-radius: 50px;
            padding: 5px 12px;
            font-size: 13px;
            font-weight: 900;
            color: var(--aqua);
        }
        .shop-price.gold-price { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.25); color: var(--gold); }
        .shop-price.owned-label { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); color: var(--green); }

        /* ── PROFILE SCREEN ── */
        .profile-wrap { padding: 16px; }
        .profile-hero {
            background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(6,182,212,0.2));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .profile-avatar {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--green), var(--aqua));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            margin: 0 auto 14px;
            box-shadow: 0 0 30px rgba(34,197,94,0.4);
        }
        .profile-name { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        .profile-title { font-size: 13px; opacity: 0.6; margin-bottom: 16px; }
        .profile-xp-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
        .profile-xp-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--aqua)); transition: width 1s; }
        .profile-xp-text { font-size: 11px; opacity: 0.5; font-weight: 700; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .stat-card .s-val { font-size: 26px; font-weight: 900; }
        .stat-card .s-label { font-size: 11px; opacity: 0.5; font-weight: 700; margin-top: 4px; }

        .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .badge-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px 8px;
            text-align: center;
        }
        .badge-item .b-icon { font-size: 26px; display: block; margin-bottom: 4px; }
        .badge-item .b-name { font-size: 9px; opacity: 0.5; font-weight: 700; }
        .badge-item.locked { opacity: 0.25; filter: grayscale(1); }

        /* ── BOTTOM NAV ── */
        #bottom-nav {
            flex-shrink: 0;
            display: flex;
            background: rgba(10,10,15,0.95);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(30px);
            padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
            gap: 4px;
            z-index: 20;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 4px;
            border-radius: 18px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Outfit', sans-serif;
        }

        .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink:0; }
        .nav-btn span { font-size: 10px; font-weight: 700; letter-spacing: 0.02em; }
        .nav-btn.active { color: var(--green); background: rgba(34,197,94,0.1); }
        .nav-btn.active svg { stroke: var(--green); }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: linear-gradient(135deg, #1a2e1a, #0f2d1a);
            border: 1px solid rgba(34,197,94,0.4);
            border-radius: 20px;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 14px;
            color: #86efac;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── TILE SELECTION MODAL ── */
        #tile-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #tile-modal.open { opacity: 1; pointer-events: all; }
        #tile-modal-content {
            background: #12121a;
            border: 1px solid var(--border);
            border-radius: 32px 32px 0 0;
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
            width: 100%;
            max-width: 480px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #tile-modal.open #tile-modal-content { transform: translateY(0); }
        .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 16px; }
        .modal-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .modal-action {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
        }
        .modal-action:active { transform: scale(0.97); }
        .modal-action .ma-icon { font-size: 30px; }
        .modal-action .ma-name { font-weight: 800; font-size: 14px; }
        .modal-action .ma-cost { font-size: 12px; opacity: 0.6; }
        .modal-action.primary { border-color: var(--green); background: rgba(34,197,94,0.1); }
        .modal-action.danger { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }
        #modal-close {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            border: none;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        /* scrollbar hide */
        .screen::-webkit-scrollbar { display: none; }
        .screen { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<!-- HUD -->
<div id="hud">
    <div class="hud-logo">BUKVA<br>NEWS</div>
    <div class="hud-resources">
        <div class="res-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2.5"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
            <div>
                <div class="val" id="aqua-val">0</div>
                <div class="lbl">Вода</div>
            </div>
        </div>
        <div class="res-chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
            <div>
                <div class="val" id="solar-val">0</div>
                <div class="lbl">Сонце</div>
            </div>
        </div>
    </div>
    <div class="hud-level" id="level-badge">Рівень 1</div>
</div>

<!-- SCREEN AREA -->
<div id="screen-area">

    <!-- ① GARDEN -->
    <div id="screen-garden" class="screen active">
        <div id="garden-bg">
            <div id="garden-info">
                <div class="stat-pill">🌱 <span id="plants-planted">0</span> рослин</div>
                <div class="stat-pill">💧 Сьогодні: <span id="watered-today">0</span></div>
                <div class="stat-pill">🏆 Врожай: <span id="harvested-total">0</span></div>
            </div>
            <div id="iso-viewport">
                <div id="iso-grid"></div>
            </div>
            <div id="plant-tip">👆 Оберіть клітинку щоб посадити або доглянути рослину</div>
            <button id="garden-action" onclick="onGardenAction()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                Полити весь сад (−10 Води)
            </button>
        </div>
    </div>

    <!-- ② ЗАВДАННЯ -->
    <div id="screen-quests" class="screen">
        <div class="quests-wrap">
            <div class="quest-tabs">
                <button class="qtab active" onclick="switchQuestTab('daily')">Щоденні</button>
                <button class="qtab" onclick="switchQuestTab('achievements')">Досягнення</button>
            </div>
            <div id="quests-daily">
                <div class="section-label">Щоденні завдання</div>
            </div>
            <div id="quests-achievements" style="display:none">
                <div class="section-label">Досягнення</div>
            </div>
        </div>
    </div>

    <!-- ③ КРАМНИЦЯ -->
    <div id="screen-shop" class="screen">
        <div class="shop-wrap">
            <div class="section-label" style="margin-top:4px">Вибір рослин</div>
            <div class="shop-grid" id="shop-grid"></div>
        </div>
    </div>

    <!-- ④ ПРОФІЛЬ -->
    <div id="screen-profile" class="screen">
        <div class="profile-wrap">
            <div class="profile-hero">
                <div class="profile-avatar">🌳</div>
                <div class="profile-name" id="profile-name">Садівник</div>
                <div class="profile-title" id="profile-title">Початківець</div>
                <div class="profile-xp-bar"><div class="profile-xp-fill" id="xp-fill" style="width:0%"></div></div>
                <div class="profile-xp-text" id="xp-text">0 / 100 ОД</div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="s-val" id="ps-aqua">0</div><div class="s-label">💧 Вода зібрана</div></div>
                <div class="stat-card"><div class="s-val" id="ps-solar">0</div><div class="s-label">☀️ Сонце зібране</div></div>
                <div class="stat-card"><div class="s-val" id="ps-plants">0</div><div class="s-label">🌱 Посаджено</div></div>
                <div class="stat-card"><div class="s-val" id="ps-harvest">0</div><div class="s-label">🏆 Врожаїв</div></div>
            </div>
            <div class="section-label">Нагороди</div>
            <div class="badge-grid" id="badge-grid"></div>
        </div>
    </div>

</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
    <button class="nav-btn active" id="nav-garden" onclick="switchScreen('garden')">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Мій Сад</span>

        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Завдання</span>

        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Крамниця</span>

<!-- TOAST -->
<div id="toast"></div>

<!-- TILE MODAL -->
<div id="tile-modal">
    <div id="tile-modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modal-title">Обрати дію</div>
        <div class="modal-action-grid" id="modal-actions"></div>
        <button id="modal-close" onclick="closeModal()">Закрити</button>
    </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
const COLS = 4, ROWS = 3;
const GRID_SIZE = COLS * ROWS;

// ── PLANT TYPES ─────────────────────────────────────────────
const PLANTS = [
    { id:'oak',   name:'Дуб',      desc:'Класика Прикарпаття', icon:'🌳', cost:0,  costType:'aqua', stages:['🌱','🪴','🌲','🌳'], growTime:3,  reward:15, owned:true },
    { id:'flower',name:'Квітка',   desc:'Символ краси',       icon:'🌸', cost:20, costType:'solar',stages:['🌱','🪴','🌿','🌸'], growTime:2,  reward:10, owned:false },
    { id:'apple', name:'Яблуня',   desc:'Плоди праці',        icon:'🍎', cost:50, costType:'aqua', stages:['🌱','🪴','🌿','🍎'], growTime:4,  reward:25, owned:false },
    { id:'pine',  name:'Ялинка',   desc:'Карпатська гордість',icon:'🎄', cost:80, costType:'solar',stages:['🌱','🪴','🌲','🎄'], growTime:5,  reward:40, owned:false },
    { id:'wheat', name:'Пшениця',  desc:'Золото України',     icon:'🌾', cost:30, costType:'aqua', stages:['🌱','🪴','🌿','🌾'], growTime:2,  reward:20, owned:false },
    { id:'rose',  name:'Троянда',  desc:'Королева квітів',    icon:'🌹', cost:100,costType:'solar',stages:['🌱','🪴','🌿','🌹'], growTime:3,  reward:30, owned:false },
];

const DAILY_QUESTS = [
    { id:'read3',   name:'Прочитати 3 новини',      desc:'Читайте новини та заробляйте ресурси', icon:'📰', color:'#7c3aed', reward:{aqua:20},  total:3  },
    { id:'visit',   name:'Завітати до саду',         desc:'Відкрийте сад та перевірте рослини',   icon:'🌿', color:'#16a34a', reward:{aqua:5},   total:1  },
    { id:'water5',  name:'Полити 5 разів',           desc:'Доглядайте за своїми рослинами',       icon:'💧', color:'#0891b2', reward:{solar:30}, total:5  },
    { id:'harvest', name:'Зібрати врожай',           desc:'Виростіть рослину до кінця',           icon:'🏆', color:'#d97706', reward:{solar:50}, total:1  },
];

const ACHIEVEMENTS = [
    { id:'first_plant', name:'Перша рослина',  desc:'Посадіть першу рослину', icon:'🌱', color:'#16a34a', reward:{aqua:50},  req:1,  stat:'plants' },
    { id:'ten_plants',  name:'Зелені пальці',  desc:'Посадіть 10 рослин',     icon:'🖐️', color:'#0891b2', reward:{aqua:100}, req:10, stat:'plants' },
    { id:'first_harvest',name:'Перший врожай', desc:'Зберіть перший врожай',  icon:'🏆', color:'#d97706', reward:{solar:100},req:1,  stat:'harvests' },
    { id:'five_harvest', name:'Досвідчений',   desc:'Зберіть 5 врожаїв',      icon:'👨‍🌾', color:'#7c3aed', reward:{solar:200},req:5,  stat:'harvests' },
    { id:'read100',      name:'Новинар',        desc:'Прочитайте 100 новин',   icon:'📰', color:'#ea580c', reward:{aqua:200}, req:100,stat:'reads' },
];

const TITLES = ['Початківець','Садівник','Знавець рослин','Майстер саду','Легенда Прикарпаття'];

// ── STATE ────────────────────────────────────────────────────
let state = {
    aqua: 0, solar: 0,
    level: 1, xp: 0,
    tiles: Array(GRID_SIZE).fill(null),
    plantedCount: 0, harvestedCount: 0, wateredToday: 0,
    reads: 0,
    ownedPlants: ['oak'],
    dailyProgress: { read3:0, visit:0, water5:0, harvest:0 },
    dailyDone: {},
    achievementsDone: {},
    questsDone: {},
    selectedTile: null,
    selectedPlantId: 'oak',
};

let sc, userId;

// ── SUPABASE ─────────────────────────────────────────────────
async function initSupabase() {
    try {
        sc = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        userId = localStorage.getItem('bukva_guest_id');
        if (!userId) {
            userId = 'guest_' + Math.random().toString(36).substr(2,9);
            localStorage.setItem('bukva_guest_id', userId);
        }
        const { data } = await sc.from('user_gamification').select('*').eq('user_id', userId).single();
        if (data) {
            state.aqua = data.aqua_data || 0;
            state.solar = data.solar_insight || 0;
            if (data.garden_state) {
                const gs = typeof data.garden_state === 'string' ? JSON.parse(data.garden_state) : data.garden_state;
                if (gs.tiles) state.tiles = gs.tiles;
                if (gs.plantedCount) state.plantedCount = gs.plantedCount;
                if (gs.harvestedCount) state.harvestedCount = gs.harvestedCount;
                if (gs.ownedPlants) state.ownedPlants = gs.ownedPlants;
                if (gs.dailyProgress) state.dailyProgress = gs.dailyProgress;
                if (gs.dailyDone) state.dailyDone = gs.dailyDone;
                if (gs.achievementsDone) state.achievementsDone = gs.achievementsDone;
                if (gs.reads !== undefined) state.reads = gs.reads;
            }
        }
    } catch(e) { console.warn('Supabase init failed:', e); }
}

async function saveState() {
    try {
        if (!sc) return;
        const gardenState = {
            tiles: state.tiles, plantedCount: state.plantedCount,
            harvestedCount: state.harvestedCount, ownedPlants: state.ownedPlants,
            dailyProgress: state.dailyProgress, dailyDone: state.dailyDone,
            achievementsDone: state.achievementsDone, reads: state.reads,
        };
        await sc.from('user_gamification').upsert({
            user_id: userId,
            aqua_data: state.aqua,
            solar_insight: state.solar,
            garden_state: gardenState,
            updated_at: new Date().toISOString()
        });
    } catch(e) { console.warn('Save failed:', e); }
}

// ── GARDEN ───────────────────────────────────────────────────
function buildGrid() {
    const grid = document.getElementById('iso-grid');
    grid.innerHTML = '';
    for (let i = 0; i < GRID_SIZE; i++) {
        const tile = document.createElement('div');
        tile.className = 'iso-tile';
        tile.id = 'tile-' + i;
        tile.onclick = () => openTileModal(i);
        grid.appendChild(tile);
    }
    renderGrid();
    updateStats();
}

function renderGrid() {
    for (let i = 0; i < GRID_SIZE; i++) {
        const el = document.getElementById('tile-' + i);
        if (!el) continue;
        const plant = state.tiles[i];
        if (!plant) {
            el.innerHTML = '<span style="font-size:18px;opacity:0.2">＋</span>';
            el.classList.remove('occupied');
            el.innerHTML += '<div class="tile-progress" style="display:none"></div>';
        } else {
            const plantDef = PLANTS.find(p => p.id === plant.typeId);
            if (!plantDef) continue;
            const stage = Math.min(plant.stage, plantDef.stages.length - 1);
            const emoji = plantDef.stages[stage];
            const stageClass = ['stage-seed','stage-seed','stage-sprout','stage-tree','stage-bloom'][stage] || 'stage-tree';
            const pct = (plant.waterCount / (plantDef.growTime * 3)) * 100;
            el.innerHTML = `
                <span class="plant-emoji ${stageClass}">${emoji}</span>
                <div class="tile-progress"><div class="tile-progress-bar" style="width:${Math.min(pct,100)}%"></div></div>
            `;
            el.classList.add('occupied');
        }
    }
}

function updateStats() {
    const planted = state.tiles.filter(t => t !== null).length;
    document.getElementById('plants-planted').textContent = planted;
    document.getElementById('watered-today').textContent = state.wateredToday;
    document.getElementById('harvested-total').textContent = state.harvestedCount;
    document.getElementById('aqua-val').textContent = state.aqua;
    document.getElementById('solar-val').textContent = state.solar;
    const lvl = Math.floor(state.xp / 100) + 1;
    state.level = lvl;
    document.getElementById('level-badge').textContent = 'Рівень ' + lvl;
}

function openTileModal(idx) {
    state.selectedTile = idx;
    const plant = state.tiles[idx];
    const modal = document.getElementById('tile-modal');
    const actionsEl = document.getElementById('modal-actions');
    actionsEl.innerHTML = '';

    if (!plant) {
        document.getElementById('modal-title').textContent = '🌱 Посадити рослину';
        const plantSel = document.createElement('select');
        plantSel.id = 'plant-select';
        plantSel.style.cssText = 'width:100%;padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:white;font-size:14px;font-family:Outfit,sans-serif;margin-bottom:10px;';
        state.ownedPlants.forEach(pid => {
            const pd = PLANTS.find(p => p.id === pid);
            if (pd) {
                const opt = document.createElement('option');
                opt.value = pid;
                opt.textContent = pd.icon + ' ' + pd.name;
                plantSel.appendChild(opt);
            }
        });
        actionsEl.parentNode.insertBefore(plantSel, actionsEl);
        addModalAction(actionsEl, '🌱', 'Посадити', 'Безкоштовно', 'primary', () => plantTile(idx));
    } else {
        const pd = PLANTS.find(p => p.id === plant.typeId);
        const stageNames = ['','Насіння','Паросток','Рослина','Зріла рослина'];
        document.getElementById('modal-title').textContent = `${pd?.icon || '🌱'} ${pd?.name || 'Рослина'} — ${stageNames[plant.stage] || 'Росте'}`;
        const canHarvest = plant.stage >= 3;
        addModalAction(actionsEl, '💧', 'Полити', '−5 Води', 'primary', () => waterTile(idx));
        if (canHarvest) addModalAction(actionsEl, '🏆', 'Зібрати врожай', '+' + (pd?.reward||10) + ' Сонця', '', () => harvestTile(idx));
        addModalAction(actionsEl, '🗑️', 'Прибрати', 'Безкоштовно', 'danger', () => removeTile(idx));
    }

    modal.classList.add('open');
}

function addModalAction(container, icon, name, cost, cls, fn) {
    const btn = document.createElement('button');
    btn.className = 'modal-action ' + cls;
    btn.innerHTML = `<span class="ma-icon">${icon}</span><span class="ma-name">${name}</span><span class="ma-cost">${cost}</span>`;
    btn.onclick = () => { fn(); closeModal(); };
    container.appendChild(btn);
}

function closeModal() {
    document.getElementById('tile-modal').classList.remove('open');
    // remove injected select if any
    const sel = document.getElementById('plant-select');
    if (sel) sel.remove();
}

function plantTile(idx) {
    const sel = document.getElementById('plant-select');
    const pid = sel ? sel.value : (state.ownedPlants[0] || 'oak');
    if (state.tiles[idx]) return;
    state.tiles[idx] = { typeId: pid, stage: 1, waterCount: 0 };
    state.plantedCount++;
    state.xp += 10;
    updateStats(); renderGrid();
    trackQuest('visit', 1);
    checkAchievements();
    toast('🌱 Посаджено! +10 ОД');
    saveState();
}

function waterTile(idx) {
    if (state.aqua < 5) { toast('❌ Не вистачає Води! Читайте новини'); return; }
    const plant = state.tiles[idx];
    if (!plant) return;
    const pd = PLANTS.find(p => p.id === plant.typeId);
    if (!pd) return;
    state.aqua -= 5;
    plant.waterCount++;
    state.wateredToday++;
    const threshold = pd.growTime;
    if (plant.waterCount >= threshold && plant.stage < 4) {
        plant.stage++;
        toast('🌿 Рослина виросла! Стадія ' + plant.stage);
    } else {
        toast('💧 Полито! Прогрес: ' + plant.waterCount + '/' + (threshold * 3));
    }
    state.xp += 5;
    trackQuest('water5', 1);
    updateStats(); renderGrid(); saveState();
}

function harvestTile(idx) {
    const plant = state.tiles[idx];
    if (!plant || plant.stage < 3) { toast('🌱 Рослина ще не виросла'); return; }
    const pd = PLANTS.find(p => p.id === plant.typeId);
    const reward = pd?.reward || 10;
    state.solar += reward;
    state.harvestedCount++;
    state.xp += 20;
    state.tiles[idx] = null;
    trackQuest('harvest', 1);
    checkAchievements();
    updateStats(); renderGrid();
    toast('🏆 Зібрано врожай! +' + reward + ' Сонця');
    saveState();
}

function removeTile(idx) {
    state.tiles[idx] = null;
    updateStats(); renderGrid();
    toast('🗑️ Рослину прибрано');
    saveState();
}

function onGardenAction() {
    const cost = 10;
    if (state.aqua < cost) { toast('❌ Не вистачає Води! Читайте новини для поповнення'); return; }
    state.aqua -= cost;
    let watered = 0;
    for (let i = 0; i < GRID_SIZE; i++) {
        if (state.tiles[i]) {
            const pd = PLANTS.find(p => p.id === state.tiles[i].typeId);
            if (!pd) continue;
            state.tiles[i].waterCount++;
            state.wateredToday++;
            watered++;
            if (state.tiles[i].waterCount >= pd.growTime && state.tiles[i].stage < 4) {
                state.tiles[i].stage++;
            }
        }
    }
    if (watered === 0) { toast('🌿 Немає рослин для поливу'); return; }
    state.xp += watered * 3;
    trackQuest('water5', watered);
    updateStats(); renderGrid();
    toast(`💧 Полито ${watered} рослин!`);
    saveState();
}

// ── QUESTS ───────────────────────────────────────────────────
function trackQuest(id, amount = 1) {
    if (state.dailyDone[id]) return;
    state.dailyProgress[id] = (state.dailyProgress[id] || 0) + amount;
    const q = DAILY_QUESTS.find(q => q.id === id);
    if (q && state.dailyProgress[id] >= q.total) {
        completeQuest(id, q);
    }
    renderQuests();
}

function completeQuest(id, q) {
    if (state.dailyDone[id]) return;
    state.dailyDone[id] = true;
    if (q.reward.aqua) state.aqua += q.reward.aqua;
    if (q.reward.solar) state.solar += q.reward.solar;
    state.xp += 25;
    updateStats();
    toast(`🏆 Завдання виконано! ${q.name}`);
    saveState();
}

function switchQuestTab(tab) {
    document.querySelectorAll('.qtab').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='daily')));
    document.getElementById('quests-daily').style.display = tab === 'daily' ? '' : 'none';
    document.getElementById('quests-achievements').style.display = tab === 'achievements' ? '' : 'none';
}

function renderQuests() {
    const dailyEl = document.getElementById('quests-daily');
    dailyEl.innerHTML = '<div class="section-label">Щоденні завдання</div>';
    DAILY_QUESTS.forEach(q => {
        const progress = state.dailyProgress[q.id] || 0;
        const done = !!state.dailyDone[q.id];
        const pct = Math.min((progress / q.total) * 100, 100);
        const rewardStr = q.reward.aqua ? `+${q.reward.aqua} 💧` : `+${q.reward.solar} ☀️`;
        const card = document.createElement('div');
        card.className = 'quest-card' + (done ? ' done' : '');
        card.onclick = () => !done && completeQuest(q.id, q);
        card.innerHTML = `
            <div class="qc-icon" style="background:${q.color}22;color:${q.color}">${q.icon}</div>
            <div class="qc-info">
                <div class="qc-name">${q.name}</div>
                <div class="qc-desc">${q.desc}</div>
                <div class="qc-bar"><div class="qc-bar-fill" style="width:${pct}%"></div></div>
            </div>
            <div>
                <div class="qc-reward">${rewardStr}</div>
                <div class="qc-btn">
                    <svg viewBox="0 0 24 24">${done ? '<polyline points="20 6 9 17 4 12"/>' : '<polyline points="9 18 15 12 9 6"/>'}</svg>
                </div>
            </div>`;
        dailyEl.appendChild(card);
    });

    const achEl = document.getElementById('quests-achievements');
    achEl.innerHTML = '<div class="section-label">Досягнення</div>';
    ACHIEVEMENTS.forEach(a => {
        const done = !!state.achievementsDone[a.id];
        const val = a.stat === 'plants' ? state.plantedCount : a.stat === 'harvests' ? state.harvestedCount : state.reads;
        const pct = Math.min((val / a.req) * 100, 100);
        const rewardStr = a.reward.aqua ? `+${a.reward.aqua} 💧` : `+${a.reward.solar} ☀️`;
        const card = document.createElement('div');
        card.className = 'quest-card' + (done ? ' done' : '');
        card.innerHTML = `
            <div class="qc-icon" style="background:${a.color}22;color:${a.color}">${a.icon}</div>
            <div class="qc-info">
                <div class="qc-name">${a.name}</div>
                <div class="qc-desc">${a.desc}</div>
                <div class="qc-bar"><div class="qc-bar-fill" style="width:${pct}%"></div></div>
            </div>
            <div>
                <div class="qc-reward">${rewardStr}</div>
                <div class="qc-btn"><svg viewBox="0 0 24 24">${done ? '<polyline points="20 6 9 17 4 12"/>' : '<polyline points="9 18 15 12 9 6"/>'}</svg></div>
            </div>`;
        achEl.appendChild(card);
    });
}

function checkAchievements() {
    ACHIEVEMENTS.forEach(a => {
        if (state.achievementsDone[a.id]) return;
        const val = a.stat === 'plants' ? state.plantedCount : a.stat === 'harvests' ? state.harvestedCount : state.reads;
        if (val >= a.req) {
            state.achievementsDone[a.id] = true;
            if (a.reward.aqua) state.aqua += a.reward.aqua;
            if (a.reward.solar) state.solar += a.reward.solar;
            state.xp += 50;
            toast(`🏆 Досягнення: ${a.name}!`);
            updateStats(); saveState();
        }
    });
}

// ── SHOP ─────────────────────────────────────────────────────
function renderShop() {
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';
    PLANTS.forEach(p => {
        const owned = state.ownedPlants.includes(p.id);
        const card = document.createElement('div');
        card.className = 'shop-card' + (owned ? ' owned' : '');
        const costIcon = p.costType === 'aqua' ? '💧' : '☀️';
        const priceHtml = owned
            ? `<div class="shop-price owned-label">✓ Маєте</div>`
            : `<div class="shop-price ${p.costType==='solar'?'gold-price':''}">${costIcon} ${p.cost}</div>`;
        card.innerHTML = `
            <span class="shop-plant-icon">${p.icon}</span>
            <div class="shop-name">${p.name}</div>
            <div class="shop-desc">${p.desc}</div>
            ${priceHtml}`;
        if (!owned) card.onclick = () => buyPlant(p);
        grid.appendChild(card);
    });
}

function buyPlant(p) {
    if (state.ownedPlants.includes(p.id)) return;
    const bal = p.costType === 'aqua' ? state.aqua : state.solar;
    if (bal < p.cost) { toast(`❌ Не вистачає ${p.costType==='aqua'?'💧 Води':'☀️ Сонця'}!`); return; }
    if (p.costType === 'aqua') state.aqua -= p.cost;
    else state.solar -= p.cost;
    state.ownedPlants.push(p.id);
    updateStats(); renderShop();
    toast(`🎉 Купили: ${p.name}!`);
    saveState();
}

// ── PROFILE ──────────────────────────────────────────────────
function renderProfile() {
    const xpNeeded = state.level * 100;
    const xpCurrent = state.xp % 100;
    const titlesIdx = Math.min(Math.floor(state.xp / 200), TITLES.length - 1);
    document.getElementById('profile-name').textContent = 'Садівник #' + userId.slice(-4);
    document.getElementById('profile-title').textContent = TITLES[titlesIdx];
    document.getElementById('xp-fill').style.width = (xpCurrent) + '%';
    document.getElementById('xp-text').textContent = xpCurrent + ' / 100 ОД';
    document.getElementById('ps-aqua').textContent = state.aqua;
    document.getElementById('ps-solar').textContent = state.solar;
    document.getElementById('ps-plants').textContent = state.plantedCount;
    document.getElementById('ps-harvest').textContent = state.harvestedCount;

    const badgeGrid = document.getElementById('badge-grid');
    badgeGrid.innerHTML = '';
    ACHIEVEMENTS.forEach(a => {
        const done = !!state.achievementsDone[a.id];
        const el = document.createElement('div');
        el.className = 'badge-item' + (done ? '' : ' locked');
        el.innerHTML = `<span class="b-icon">${a.icon}</span><div class="b-name">${a.name}</div>`;
        badgeGrid.appendChild(el);
    });
}

// ── NAVIGATION ───────────────────────────────────────────────
function switchScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'quests') { renderQuests(); trackQuest('visit', 1); }
    if (name === 'shop') renderShop();
    if (name === 'profile') renderProfile();
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── PUBLIC API ── (для статей)
window.awardAquaData = async (amount = 10) => {
    state.aqua += amount;
    state.reads++;
    trackQuest('read3', 1);
    checkAchievements();
    updateStats(); saveState();
    toast(`💧 +${amount} Води за читання!`);
};
window.awardSolarInsight = async (amount = 5) => {
    state.solar += amount;
    updateStats(); saveState();
    toast(`☀️ +${amount} Сонця!`);
};

// ── INIT ──────────────────────────────────────────────────────
async function init() {
    await initSupabase();
    buildGrid();
    trackQuest('visit', 1);
}

init();
</script>
