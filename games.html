<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Дуб Громади | BUKVA NEWS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#22c55e;--g2:#16a34a;--aq:#06b6d4;--sol:#f59e0b;--pur:#7c3aed;--dk:#060a0d;--card:rgba(255,255,255,.05);--br:rgba(255,255,255,.08)}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;color:#f1f5f9;background:var(--dk);display:flex;flex-direction:column;height:100dvh}

/* HUD */
#hud{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:8px;background:rgba(6,10,13,.95);border-bottom:1px solid var(--br);backdrop-filter:blur(20px);z-index:30}
.hud-logo{font-size:10px;font-weight:900;opacity:.35;letter-spacing:.05em;line-height:1.3}
.hud-res{display:flex;gap:6px;flex:1;justify-content:center}
.rc{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--br);padding:5px 10px;border-radius:50px}
.rc svg{width:14px;height:14px;flex-shrink:0}.rc .v{font-weight:900;font-size:14px}.rc .l{font-size:8px;font-weight:700;opacity:.5;text-transform:uppercase}
.rank-pill{background:linear-gradient(135deg,var(--sol),#ea580c);border-radius:50px;padding:5px 11px;font-weight:900;font-size:12px;white-space:nowrap}

/* SCREENS */
#area{flex:1;overflow:hidden;position:relative}
.scr{display:none;position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr.on{display:flex;flex-direction:column}
.scr::-webkit-scrollbar{display:none}

/* ── FOREST SCENE ── */
#forest{flex:1;position:relative;overflow:hidden;min-height:320px;user-select:none}

/* Sky layers */
#sky-bg{position:absolute;inset:0;background:linear-gradient(180deg,#060d1a 0%,#0a1f0a 55%,#071a07 100%);transition:background 3s}
#stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:.9}}

/* Moon */
#moon{position:absolute;top:18px;right:30px;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff9c4,#f59e0b);box-shadow:0 0 20px rgba(245,158,11,.4);opacity:.85}

/* Mountain silhouettes */
#mtn{position:absolute;bottom:30%;left:0;right:0;height:120px;pointer-events:none}
#mtn svg{width:100%;height:100%}

/* Forest background silhouette */
#forest-bg-trees{position:absolute;bottom:22%;left:0;right:0;height:90px;pointer-events:none}
#forest-bg-trees svg{width:100%;height:100%}

/* Ground */
#ground{position:absolute;bottom:0;left:0;right:0;height:22%;background:linear-gradient(180deg,#14421a,#0a2a0c,#071a07);border-radius:50% 50% 0 0/40px 40px 0 0}
#ground::before{content:'';position:absolute;top:0;left:0;right:0;height:10px;background:linear-gradient(180deg,rgba(34,197,94,.25),transparent);border-radius:50% 50% 0 0/10px 10px 0 0}

/* THE OAK */
#oak-wrap{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;transition:all .8s cubic-bezier(.19,1,.22,1);z-index:5}
#oak-svg{display:block;transition:all .8s cubic-bezier(.19,1,.22,1);filter:drop-shadow(0 4px 20px rgba(34,197,94,.25))}

/* Particle effects */
.particle{position:absolute;pointer-events:none;z-index:10;font-size:18px;animation:float-up 1.2s ease forwards}
@keyframes float-up{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(.5);opacity:0}}

/* Height chip */
#h-chip{position:absolute;bottom:calc(22% + 8px);left:50%;transform:translateX(-50%);background:rgba(6,10,13,.88);border:1px solid var(--br);border-radius:50px;padding:5px 14px;font-size:12px;font-weight:800;white-space:nowrap;backdrop-filter:blur(10px);z-index:6;transition:all .5s}

/* Stage label */
#stage-badge{position:absolute;top:16px;left:16px;background:rgba(6,10,13,.75);border:1px solid var(--g);border-radius:12px;padding:6px 12px;font-size:11px;font-weight:800;color:var(--g);backdrop-filter:blur(8px)}

/* Actions panel */
#oak-panel{flex-shrink:0;padding:12px 14px 8px;background:rgba(6,10,13,.95);border-top:1px solid var(--br)}
#tree-name-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
#tree-name-disp{font-size:17px;font-weight:900;flex:1}
#btn-rename{background:var(--card);border:1px solid var(--br);padding:5px 10px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer}
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.sp{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:8px;text-align:center}.sp .sv{font-size:17px;font-weight:900}.sp .sl{font-size:8px;opacity:.5;font-weight:700;text-transform:uppercase}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ab{border:none;border-radius:18px;padding:13px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;letter-spacing:.01em}
.ab:active{transform:scale(.97)}.ab:disabled{opacity:.35;background:#374151!important;box-shadow:none!important;cursor:not-allowed}
.ab.water{background:linear-gradient(135deg,var(--aq),#0284c7);color:#fff;box-shadow:0 6px 20px rgba(6,182,212,.3)}
.ab.fert{background:linear-gradient(135deg,var(--sol),#d97706);color:#fff;box-shadow:0 6px 20px rgba(245,158,11,.3)}
.ab-sub{font-size:10px;opacity:.7;font-weight:600;display:block}
#tip-bar{padding:8px 12px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:14px;font-size:11px;font-weight:600;color:#86efac;text-align:center;margin-bottom:4px}

/* QUESTS SCREEN */
.qw{padding:12px 14px 20px}
.qtabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border:1px solid var(--br);border-radius:16px;padding:5px}
.qt{flex:1;padding:9px;border-radius:11px;border:none;background:transparent;color:rgba(255,255,255,.45);font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.qt.on{background:var(--pur);color:#fff}
.qlabel{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;opacity:.4;margin:0 0 8px}
.qcard{background:var(--card);border:1px solid var(--br);border-radius:18px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s}
.qcard.done{opacity:.5}.qcard.claimable{border-color:var(--g);background:rgba(34,197,94,.08);cursor:pointer}
.qcard:active{transform:scale(.98)}
.qi{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.qinfo{flex:1;min-width:0}.qname{font-weight:800;font-size:14px;margin-bottom:3px}.qdesc{font-size:11px;opacity:.55;margin-bottom:5px}
.qbar{height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.qbar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pur),var(--aq));transition:width .6s}
.qrew{font-size:12px;font-weight:900;color:var(--sol);white-space:nowrap;text-align:right}
.qbtn{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qbtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.weekly-box{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(6,182,212,.1));border:1.5px solid rgba(124,58,237,.4);border-radius:20px;padding:16px;margin-bottom:12px;text-align:center}
.wb-title{font-size:16px;font-weight:900;margin-bottom:4px}
.wb-sub{font-size:11px;opacity:.55;margin-bottom:10px}
.wb-podium{display:flex;justify-content:center;gap:8px}
.wb-item{background:rgba(255,255,255,.05);border-radius:14px;padding:10px 12px;text-align:center;min-width:80px}
.wbi-pos{font-size:13px;font-weight:900;margin-bottom:2px}
.wbi-name{font-size:10px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.wbi-val{font-size:14px;font-weight:900;color:var(--g);margin-top:2px}

/* FOREST/LEADERBOARD SCREEN */
.fw{padding:12px 14px 20px}
.ftabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border:1px solid var(--br);border-radius:16px;padding:5px}
.ft{flex:1;padding:9px;border-radius:11px;border:none;background:transparent;color:rgba(255,255,255,.45);font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.ft.on{background:var(--g2);color:#fff}
.lb-card{background:var(--card);border:1px solid var(--br);border-radius:18px;padding:12px 13px;display:flex;align-items:center;gap:11px;margin-bottom:8px;transition:all .2s;cursor:pointer}
.lb-card:active{transform:scale(.98)}
.lb-card.t1{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06)}
.lb-card.t2{border-color:rgba(156,163,175,.3)}
.lb-card.t3{border-color:rgba(180,83,9,.3)}
.lb-card.me{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07)}
.lbpos{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;background:rgba(255,255,255,.08)}
.p1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.p2{background:linear-gradient(135deg,#9ca3af,#6b7280);color:#fff}
.p3{background:linear-gradient(135deg,#b45309,#92400e);color:#fff}
.lbinfo{flex:1;min-width:0}.lbname{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lbsub{font-size:10px;opacity:.5;margin-top:2px}
.lbh{text-align:right}.lbhv{font-weight:900;font-size:16px;color:var(--g)}.lbhu{font-size:9px;opacity:.55}
.online-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-on{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6)}
.dot-off{background:#475569}
.steal-btn{font-size:11px;font-weight:900;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.35);border-radius:50px;padding:4px 10px;white-space:nowrap;cursor:pointer;color:var(--sol)}
.steal-btn:disabled{opacity:.4;cursor:not-allowed}

/* BOTTOM NAV */
#nav{flex-shrink:0;display:flex;background:rgba(6,10,13,.96);border-top:1px solid var(--br);backdrop-filter:blur(30px);padding:8px 8px calc(8px + env(safe-area-inset-bottom));gap:4px;z-index:30}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:16px;border:none;background:transparent;color:rgba(255,255,255,.35);cursor:pointer;transition:all .25s;font-family:'Outfit',sans-serif}
.nb svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nb span{font-size:9px;font-weight:700}
.nb.on{color:var(--g);background:rgba(34,197,94,.1)}.nb.on svg{stroke:var(--g)}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-14px);background:#0d2010;border:1px solid rgba(34,197,94,.4);border-radius:18px;padding:10px 18px;font-weight:800;font-size:13px;color:#86efac;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.175,.885,.32,1.275);z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
#modal.on{opacity:1;pointer-events:all}
#mbox{background:#12121a;border:1px solid var(--br);border-radius:26px 26px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:480px;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
#modal.on #mbox{transform:translateY(0)}
.mhandle{width:38px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:17px;font-weight:900;margin-bottom:14px}
#minput{width:100%;background:var(--card);border:1.5px solid var(--br);border-radius:14px;padding:12px 14px;margin-bottom:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:#fff;outline:none;transition:border-color .2s}
#minput:focus{border-color:var(--g)}
.msave{width:100%;padding:13px;border:none;background:linear-gradient(135deg,var(--g),var(--g2));border-radius:16px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:900;color:#fff;cursor:pointer;margin-bottom:8px}
.mcancel{width:100%;padding:11px;border:none;background:rgba(255,255,255,.05);border-radius:14px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.45);cursor:pointer}

/* Grow animation */
@keyframes grow-pop{0%{transform:translateX(-50%) scaleY(.95)}60%{transform:translateX(-50%) scaleY(1.03)}100%{transform:translateX(-50%) scaleY(1)}}
.grew{animation:grow-pop .5s ease}

/* AUTH MODAL */
#auth-modal{position:fixed;inset:0;background:linear-gradient(160deg,#060a0d 0%,#071a07 100%);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .4s}
#auth-modal.on{opacity:1;pointer-events:all}
.auth-logo{font-size:13px;font-weight:900;letter-spacing:.1em;opacity:.4;margin-bottom:32px;text-transform:uppercase}
.auth-tree{font-size:72px;margin-bottom:16px;filter:drop-shadow(0 0 30px rgba(34,197,94,.4))}
.auth-title{font-size:24px;font-weight:900;text-align:center;margin-bottom:8px}
.auth-sub{font-size:13px;opacity:.5;text-align:center;margin-bottom:36px;line-height:1.5;max-width:280px}
.auth-btn-google{width:100%;max-width:320px;padding:16px;border:none;border-radius:18px;background:#fff;color:#1a1a1a;font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;transition:all .2s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.auth-btn-google:active{transform:scale(.97)}
.auth-btn-google svg{width:20px;height:20px;flex-shrink:0}
.auth-btn-guest{width:100%;max-width:320px;padding:13px;border:1px solid var(--br);border-radius:18px;background:var(--card);color:rgba(255,255,255,.55);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.auth-btn-guest:active{transform:scale(.97)}
.auth-ref-bonus{margin-top:24px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:14px;padding:10px 16px;font-size:12px;font-weight:700;color:#86efac;text-align:center;max-width:320px;display:none}
.auth-ref-bonus.visible{display:block}

/* REF PANEL */
.ref-bar{display:flex;gap:6px;align-items:center}
.ref-copy-btn{flex:1;padding:9px 12px;border:1px solid rgba(34,197,94,.3);border-radius:14px;background:rgba(34,197,94,.08);font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;color:var(--g);cursor:pointer;transition:all .2s;white-space:nowrap}
.ref-copy-btn:active{transform:scale(.97)}
.user-pill{padding:5px 10px;border:1px solid var(--br);border-radius:50px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.user-pill img{width:18px;height:18px;border-radius:50%;object-fit:cover}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-logo">BUKVA<br>NEWS</div>
  <div class="hud-res">
    <div class="rc">
      <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2.5"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
      <div><div class="v" id="av">0</div><div class="l">Вода</div></div>
    </div>
    <div class="rc">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      <div><div class="v" id="sv">0</div><div class="l">Сонце</div></div>
    </div>
  </div>
  <div class="rank-pill" id="rnk">#–</div>
</div>

<div id="area">
  <!-- MY OAK -->
  <div id="scr-oak" class="scr on">
    <div id="forest">
      <div id="sky-bg"></div>
      <div id="stars"></div>
      <div id="moon"></div>
      <div id="mtn"><svg viewBox="0 0 400 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,120 60,30 130,80 190,10 260,70 320,20 400,60 400,120" fill="#061a08" opacity=".8"/><polygon points="0,120 40,50 100,90 160,30 230,75 290,35 360,65 400,45 400,120" fill="#071f09" opacity=".6"/></svg></div>
      <div id="forest-bg-trees"><svg viewBox="0 0 400 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,90 35,30 50,90" fill="#0d2e0f"/><polygon points="40,90 58,15 76,90" fill="#0f3510"/><polygon points="70,90 82,40 94,90" fill="#0d2e0f"/><polygon points="90,90 108,22 126,90" fill="#112e13"/><polygon points="130,90 148,35 166,90" fill="#0d2e0f"/><polygon points="155,90 170,18 185,90" fill="#0f3311"/><polygon points="200,90 220,42 240,90" fill="#0d2e0f"/><polygon points="240,90 255,28 270,90" fill="#112e13"/><polygon points="280,90 296,36 312,90" fill="#0d2e0f"/><polygon points="320,90 340,20 360,90" fill="#0f3311"/><polygon points="355,90 372,44 389,90" fill="#0d2e0f"/>
      </svg></div>
      <div id="ground"></div>
      <div id="stage-badge" id="sbadge">🌱 Насіння</div>
      <div id="h-chip">🌳 0 см</div>
      <div id="oak-wrap">
        <svg id="oak-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="120" height="180"></svg>
      </div>
    </div>
    <div id="oak-panel">
      <div id="tree-name-row">
        <div id="tree-name-disp">Мій Дуб</div>
        <button id="btn-rename" onclick="openModal()">✏️ Назвати</button>
      </div>
      <div class="stats3">
        <div class="sp"><div class="sv" id="si-h">0</div><div class="sl">Висота см</div></div>
        <div class="sp"><div class="sv" id="si-w">0</div><div class="sl">Поливів</div></div>
        <div class="sp"><div class="sv" id="si-f">0</div><div class="sl">Добрив</div></div>
      </div>
      <div class="act-grid">
        <button class="ab water" id="btn-w" onclick="doWater()">
          <svg viewBox="0 0 24 24" width="18" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
          <div><div>Полити</div><span class="ab-sub">−5 💧 → +1 см</span></div>
        </button>
        <button class="ab fert" id="btn-f" onclick="doFertilize()">
          <svg viewBox="0 0 24 24" width="18" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22V12M2 12c4 0 10-4 10-10 0 6 6 10 10 10"/></svg>
          <div><div>Удобрити</div><span class="ab-sub">−15 ☀️ → +3 см</span></div>
        </button>
      </div>
      <div id="tip-bar" style="padding:0">
        <div class="ref-bar">
          <button class="ref-copy-btn" onclick="copyRefLink()">🔗 Запросити друга → +50 Води</button>
          <div class="user-pill" id="user-pill" onclick="showUserMenu()" title="Профіль"></div>
        </div>
        <div style="padding:8px 0 4px;font-size:11px;font-weight:600;color:#86efac;text-align:center">📰 Читайте новини → 💧 Вода та ☀️ Сонце</div>
      </div>
    </div>
  </div>

  <!-- QUESTS -->
  <div id="scr-q" class="scr">
    <div class="qw">
      <div class="qtabs"><button class="qt on" id="qt0" onclick="qtab(0)">Щоденні</button><button class="qt" id="qt1" onclick="qtab(1)">Тижневе змагання</button></div>
      <div id="qd-daily"></div>
      <div id="qd-weekly" style="display:none"></div>
    </div>
  </div>

<script>
// ── CONFIG
const SB='https://kgrxlznhimwuvwhjfzhv.supabase.co', SK='sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';

// ── QUESTS

];

// ── TREE STAGES

];

];

// ── STATE
let sc,uid;
let G={w:0,s:0,h:0,watered:0,fert:0,name:'Мій Дуб',reads:0,ms:{},qp:{},qd:{},ql:{},stealLog:{}};
let myRank=null,allTrees=[];

// ── OAK SVG GENERATOR
function oakSVG(h){
  const s=document.getElementById('oak-svg');
  // Stage calculation
  const stage=h<5?0:h<20?1:h<50?2:h<100?3:h<200?4:5;
  // Scale oak proportionally
  const scale=Math.min(1,Math.max(0.08, h/120));
  const tw=Math.max(8,Math.min(32,8+h*0.12));  // trunk width
  const th=Math.max(6,Math.min(160,h*1.1));     // trunk height
  const cr=Math.max(0,Math.min(110,h*0.9));     // crown radius
  const cx=100, cy=280-th;

  let svgContent='';

  if(h===0){
    // Seed
    svgContent=`
      <ellipse cx="100" cy="285" rx="14" ry="7" fill="#14421a" opacity=".8"/>
      <ellipse cx="100" cy="282" rx="8" ry="6" fill="#5c3317"/>
      <line x1="100" y1="276" x2="100" y2="268" stroke="#22c55e" stroke-width="2"/>
      <ellipse cx="100" cy="265" rx="6" ry="4" fill="#22c55e" opacity=".8"/>`;
  } else if(stage===1){
    // Sprout
    svgContent=`
      <rect x="${cx-tw/2}" y="${280-th}" width="${tw}" height="${th}" rx="${tw/2}" fill="url(#trunk-g)"/>
      <ellipse cx="${cx-8}" cy="${280-th-5}" rx="12" ry="8" fill="#22c55e" transform="rotate(-30,${cx-8},${280-th-5})"/>
      <ellipse cx="${cx+8}" cy="${280-th-8}" rx="10" ry="7" fill="#16a34a" transform="rotate(20,${cx+8},${280-th-8})"/>`;
  } else {
    // Grown tree with crown layers
    const mul=stage>=4?1.15:1;
    svgContent=`
      <ellipse cx="${cx+cr*0.15}" cy="${cy-cr*0.1}" rx="${cr*0.85*mul}" ry="${cr*0.75*mul}" fill="#14532d" opacity=".9"/>
      <ellipse cx="${cx-cr*0.1}" cy="${cy+cr*0.05}" rx="${cr*0.9*mul}" ry="${cr*0.8*mul}" fill="#166534" opacity=".9"/>
      <ellipse cx="${cx}" cy="${cy-cr*0.05}" rx="${cr*0.82*mul}" ry="${cr*0.72*mul}" fill="#15803d"/>
      <ellipse cx="${cx-cr*0.08}" cy="${cy-cr*0.15}" rx="${cr*0.7*mul}" ry="${cr*0.62*mul}" fill="#16a34a"/>
      <ellipse cx="${cx+cr*0.05}" cy="${cy-cr*0.2}" rx="${cr*0.6*mul}" ry="${cr*0.52*mul}" fill="#22c55e"/>
      ${stage>=3?`<ellipse cx="${cx}" cy="${cy-cr*0.3}" rx="${cr*0.45*mul}" ry="${cr*0.35*mul}" fill="#4ade80" opacity=".6"/>`:''}
      ${stage>=4?`<ellipse cx="${cx-cr*0.2}" cy="${cy+cr*0.2}" rx="${cr*0.35}" ry="${cr*0.25}" fill="#166534" opacity=".7"/>
        <ellipse cx="${cx+cr*0.25}" cy="${cy+cr*0.15}" rx="${cr*0.3}" ry="${cr*0.22}" fill="#15803d" opacity=".7"/>`:''}
      ${stage>=5?`<ellipse cx="${cx}" cy="${cy-cr*0.4}" rx="${cr*0.35}" ry="${cr*0.25}" fill="#bbf7d0" opacity=".25"/>
        <ellipse cx="${cx-cr*0.35}" cy="${cy+cr*0.3}" rx="${cr*0.25}" ry="${cr*0.18}" fill="#166534"/>`:''}
      <rect x="${cx-tw/2}" y="${280-th}" width="${tw}" height="${th}" rx="${tw/2}" fill="url(#trunk-g)"/>`;
  }

  s.innerHTML=`
    <defs>
      <radialGradient id="trunk-g" cx="30%" cy="50%">
        <stop offset="0%" stop-color="#7c4a1d"/><stop offset="100%" stop-color="#3d200d"/>
      </radialGradient>
      <radialGradient id="glow-g" cx="50%" cy="50%">
        <stop offset="0%" stop-color="rgba(34,197,94,.3)"/><stop offset="100%" stop-color="rgba(34,197,94,0)"/>
      </radialGradient>
    </defs>
    ${svgContent}
    ${stage>=3?`<ellipse cx="${cx}" cy="${cy}" rx="${cr*1.1}" ry="${cr*0.4}" fill="url(#glow-g)" opacity=".4"/>`:''}`;

  // Update wrapper size
  const w=Math.max(60,Math.min(220,60+h*1.3));
  const hh=Math.max(100,Math.min(350,100+h*1.8));
  s.setAttribute('width',w);s.setAttribute('height',hh);
  s.setAttribute('viewBox',`0 0 200 300`);

  // Stage badge
  const stg=STAGES.filter(sg=>G.h>=sg.minH).pop()||STAGES[0];
  document.getElementById('stage-badge').textContent=stg.badge;
  document.getElementById('h-chip').textContent=`🌳 ${G.h} см`;
}

function renderOak(){
  oakSVG(G.h);
  document.getElementById('si-h').textContent=G.h;
  document.getElementById('si-w').textContent=G.watered;
  document.getElementById('si-f').textContent=G.fert;
  document.getElementById('tree-name-disp').textContent=G.name;
  document.getElementById('av').textContent=G.w;
  document.getElementById('sv').textContent=G.s;
  document.getElementById('rnk').textContent=myRank?'#'+myRank:'#–';
  document.getElementById('btn-w').disabled=G.w<WCOST;
  document.getElementById('btn-f').disabled=G.s<FCOST;
}

// ── STARS
function buildStars(){
  const c=document.getElementById('stars');c.innerHTML='';
  for(let i=0;i<50;i++){
    const d=document.createElement('div');d.className='star';
    const s=Math.random()*2+1;
    d.style.cssText=`width:${s}px;height:${s}px;top:${Math.random()*60}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    c.appendChild(d);
  }
}

// Sky colour based on time
function setSky(){
  const h=new Date().getHours();
  let bg;
  if(h>=6&&h<9) bg='linear-gradient(180deg,#1a1030 0%,#2d1b4e 25%,#7c3a12 55%,#0a1f0a 100%)';
  else if(h>=9&&h<17) bg='linear-gradient(180deg,#061428 0%,#0a3018 50%,#0a1f0a 100%)';
  else if(h>=17&&h<20) bg='linear-gradient(180deg,#1a0a30 0%,#4a1510 35%,#0a1f0a 100%)';
  else bg='linear-gradient(180deg,#010408 0%,#020d02 55%,#061006 100%)';
  document.getElementById('sky-bg').style.background=bg;
  document.getElementById('moon').style.opacity=h>=20||h<7?'.85':'0';
}

// ── SUPABASE
async function loadDB(){
  try{
    const{data}=await sc.from('user_gamification').select('*').eq('user_id',uid).maybeSingle();
    if(data){
      G.w=data.aqua_data||0; G.s=data.solar_insight||0;
      G.h=data.tree_height||0; G.watered=data.tree_watered||0;
      G.fert=data.tree_fertilized||0; G.name=data.tree_name||'Мій Дуб';
      const gs=data.garden_state||{};
      G.reads=gs.reads||0; G.ms=gs.ms||{};
      const qs=data.quests_state||{};
      G.qp=qs.p||{}; G.qd=qs.d||{}; G.ql=qs.l||new Date(0).toISOString();
      G.stealLog=data.steal_log||{};
    }
    // Touch last_active
    sc.from('user_gamification').update({last_active:new Date().toISOString()}).eq('user_id',uid).then(()=>{});
  }catch(e){console.warn('DB load:',e);}
}

function buildSave(){
  return{
    user_id:uid, aqua_data:G.w, solar_insight:G.s,
    tree_height:G.h, tree_watered:G.watered, tree_fertilized:G.fert,
    tree_name:G.name, last_active:new Date().toISOString(),
    garden_state:{reads:G.reads,ms:G.ms},
    quests_state:{p:G.qp,d:G.qd,l:G.ql},
    steal_log:G.stealLog, updated_at:new Date().toISOString()
  };
}
async function save(){try{await sc.from('user_gamification').upsert(buildSave());}catch(e){console.warn(e);}}

// ── WELCOME BONUS
async function welcome(){
  if(localStorage.getItem('oak_wel2'))return;
  localStorage.setItem('oak_wel2','1');
  G.w+=50; G.s+=30;
  await save();
  setTimeout(()=>toast('🎉 Ласкаво просимо! +50 Води, +30 Сонця'),700);
}

// ── DAILY QUEST CHECK
function checkDailyReset(){
  const lastDay=G.ql?new Date(G.ql).toDateString():'';
  const today=new Date().toDateString();
  if(lastDay!==today){G.qp={};G.qd={};G.ql=new Date().toISOString();}
}

function trackQ(id,n=1){
  if(G.qd[id])return;
  G.qp[id]=(G.qp[id]||0)+n;
  const q=DQ.find(x=>x.id===id);
  if(q&&G.qp[id]>=q.total){
    // auto-award
    claimQ(id,q);
  }
  renderQuests();
}

function claimQ(id,q){
  if(G.qd[id])return;
  G.qd[id]=true;
  if(q.r.w)G.w+=q.r.w;
  if(q.r.s)G.s+=q.r.s;
  renderOak();save();
  toast(`✅ ${q.name}: отримано ${q.r.w?'+'+q.r.w+' 💧':'+'+q.r.s+' ☀️'}`);
}

// ── MILESTONES
function checkMS(){
  MS.forEach(m=>{
    if(!G.ms[m.h]&&G.h>=m.h){
      G.ms[m.h]=true;
      if(m.r.w)G.w+=m.r.w;
      if(m.r.s)G.s+=m.r.s;
      setTimeout(()=>toast(m.msg),300);
    }
  });
}

// ── ACTIONS
function particle(emoji){
  const p=document.createElement('div');p.className='particle';p.textContent=emoji;
  const x=window.innerWidth/2-20+Math.random()*60-30;
  p.style.cssText=`left:${x}px;top:${window.innerHeight*0.35}px;position:fixed;pointer-events:none;z-index:500;font-size:22px;animation:float-up 1.2s ease forwards`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1300);
}

async function doWater(){
  if(G.w<WCOST){toast('❌ Не вистачає Води! Читайте новини');return;}
  G.w-=WCOST; G.h+=WGROW; G.watered++;
  checkMS(); trackQ('water5',1);
  renderOak();particle('💧');
  document.getElementById('oak-wrap').classList.remove('grew');
  void document.getElementById('oak-wrap').offsetWidth;
  document.getElementById('oak-wrap').classList.add('grew');
  toast(`💧 Полито! Дуб: ${G.h} см`);
  save();
}

async function doFertilize(){
  if(G.s<FCOST){toast('❌ Не вистачає Сонця! Читайте новини');return;}
  G.s-=FCOST; G.h+=FGROW; G.fert++;
  checkMS(); trackQ('fertilize2',1);
  renderOak();particle('🌿');
  document.getElementById('oak-wrap').classList.remove('grew');
  void document.getElementById('oak-wrap').offsetWidth;
  document.getElementById('oak-wrap').classList.add('grew');
  toast(`🌿 Удобрено! Дуб: ${G.h} см`);
  save();
}

// ── QUESTS RENDER
function renderQuests(){
  checkDailyReset();
  const dd=document.getElementById('qd-daily');dd.innerHTML='';
  dd.innerHTML='<div class="qlabel">Щоденні завдання — оновлюються кожен день</div>';
  DQ.forEach(q=>{
    const pr=G.qp[q.id]||0;const done=!!G.qd[q.id];
    const pct=Math.min(100,(pr/q.total)*100);
    const rStr=q.r.w?`+${q.r.w} 💧`:`+${q.r.s} ☀️`;
    const d=document.createElement('div');
    d.className='qcard'+(done?' done':'');
    d.innerHTML=`<div class="qi" style="background:${q.bg}22;font-size:22px">${q.icon}</div>
      <div class="qinfo"><div class="qname">${q.name}</div><div class="qdesc">${q.desc}</div>
        <div class="qbar"><div class="qbar-f" style="width:${pct}%"></div></div>
        <div style="font-size:10px;opacity:.4;margin-top:3px">${pr}/${q.total}</div>
      </div>
      <div><div class="qrew">${rStr}</div>
        <div class="qbtn" style="background:${done?'#166534':q.bg}">
          <svg viewBox="0 0 24 24">${done?'<polyline points="20 6 9 17 4 12"/>':'<polyline points="9 18 15 12 9 6"/>'}</svg>
        </div>
      </div>`;
    dd.appendChild(d);
  });
}

function renderWeekly(){
  const wd=document.getElementById('qd-weekly');wd.innerHTML='';
  wd.innerHTML='<div class="qlabel">Тижневе змагання — хто більше виросте</div>';

  const box=document.createElement('div');box.className='weekly-box';
  box.innerHTML=`<div class="wb-title">🏆 Гонка дубів цього тижня</div>
    <div class="wb-sub">Хто найбільше виросте — отримає великий приз</div>
    <div id="wpodium" class="wb-podium"><div style="opacity:.4;font-size:12px">Завантаження...</div></div>`;
  wd.appendChild(box);

  // Load weekly data
  sc.from('user_gamification')
    .select('user_id,tree_name,tree_height,weekly_height_start,last_active')
    .gt('tree_height',0).order('tree_height',{ascending:false}).limit(20)
    .then(({data})=>{
      if(!data||!data.length)return;
      const sorted=data.map(r=>({...r,wg:(r.tree_height||0)-(r.weekly_height_start||0)})).sort((a,b)=>b.wg-a.wg).slice(0,3);
      const medals=['🥇','🥈','🥉'];
      document.getElementById('wpodium').innerHTML=sorted.map((r,i)=>`
        <div class="wb-item">
          <div class="wbi-pos">${medals[i]||i+1}</div>
          <div class="wbi-name">${(r.tree_name||'Дуб').slice(0,12)}</div>
          <div class="wbi-val">+${r.wg} см</div>
        </div>`).join('');
    }).catch(()=>{});
}

function qtab(i){
  document.getElementById('qt0').classList.toggle('on',i===0);
  document.getElementById('qt1').classList.toggle('on',i===1);
  document.getElementById('qd-daily').style.display=i===0?'':'none';
  document.getElementById('qd-weekly').style.display=i===1?'':'none';
  if(i===1)renderWeekly();
}

// ── LEADERBOARD
async function loadRank(){
  const rd=document.getElementById('fd-rank');rd.innerHTML='<div style="text-align:center;padding:30px;opacity:.4">Завантаження...</div>';
  try{
    const{data}=await sc.from('user_gamification')
      .select('user_id,tree_name,tree_height,tree_watered,tree_fertilized,last_active')
      .gt('tree_height',0).order('tree_height',{ascending:false}).limit(50);
    if(!data||!data.length){rd.innerHTML='<div style="text-align:center;padding:20px;opacity:.4">Поки нікого немає. Стань першим!</div>';return;}
    allTrees=data;
    rd.innerHTML='<div class="qlabel">Таблиця лідерів — Дуби Прикарпаття</div>';
    let mp=null;
    data.forEach((r,i)=>{
      const pos=i+1;const isMe=r.user_id===uid;if(isMe)mp=pos;
      const now=Date.now();const la=new Date(r.last_active||0).getTime();
      const minsAgo=Math.floor((now-la)/60000);
      const online=minsAgo<30;
      const div=document.createElement('div');
      div.className='lb-card'+(pos===1?' t1':pos===2?' t2':pos===3?' t3':isMe?' me':'');
      div.innerHTML=`
        <div class="lbpos ${pos===1?'p1':pos===2?'p2':pos===3?'p3':''}">${pos<=3?['🥇','🥈','🥉'][pos-1]:pos}</div>
        <div class="online-dot ${online?'dot-on':'dot-off'}"></div>
        <div class="lbinfo">
          <div class="lbname">${isMe?'🟢 Ваш дуб: '+'':''} ${(r.tree_name||'Дуб садівника').slice(0,20)}</div>
          <div class="lbsub">💧${r.tree_watered||0} поливів · 🌿${r.tree_fertilized||0} добрив · ${online?'онлайн':minsAgo+'хв тому'}</div>
        </div>
        <div class="lbh"><div class="lbhv">${r.tree_height||0}</div><div class="lbhu">см</div></div>`;
      rd.appendChild(div);
    });
    myRank=mp;
    document.getElementById('rnk').textContent=mp?'#'+mp:'#–';
    const ref=document.createElement('button');ref.style.cssText='width:100%;padding:12px;border:none;margin-top:8px;background:rgba(255,255,255,.05);border-radius:16px;font-family:Outfit,sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer';ref.textContent='↻ Оновити рейтинг';ref.onclick=loadRank;rd.appendChild(ref);
  }catch(e){rd.innerHTML='<div style="text-align:center;padding:20px;opacity:.4;color:#f87171">Помилка. Запустіть SQL схему в Supabase.</div>';console.error(e);}
}

// ── VISIT / STEAL
function renderVisit(){
  const vd=document.getElementById('fd-visit');vd.innerHTML='';
  if(!allTrees.length){loadRank().then(renderVisit);return;}
  vd.innerHTML='<div class="qlabel">Відвідайте дуб сусіда. Якщо він не заходив 4+ год — можна зібрати ресурси!</div>';
  const now=Date.now();
  allTrees.filter(r=>r.user_id!==uid).forEach(r=>{
    const la=new Date(r.last_active||0).getTime();
    const hoursAgo=(now-la)/3600000;
    const canSteal=hoursAgo>4;
    const lastSteal=G.stealLog[r.user_id]?new Date(G.stealLog[r.user_id]).getTime():0;
    const cooldownOk=(now-lastSteal)>3600000;// 1h cooldown per target
    const stealOk=canSteal&&cooldownOk;
    const div=document.createElement('div');div.className='lb-card';
    div.innerHTML=`
      <div class="online-dot ${hoursAgo<0.5?'dot-on':'dot-off'}"></div>
      <div style="font-size:22px;flex-shrink:0">${hoursAgo<1?'🌳':hoursAgo<4?'🌲':'🍂'}</div>
      <div class="lbinfo">
        <div class="lbname">${(r.tree_name||'Дуб садівника').slice(0,20)}</div>
        <div class="lbsub">${r.tree_height||0} см · ${Math.floor(hoursAgo)}год тому</div>
      </div>
      <button class="steal-btn" ${stealOk?'':'disabled'} onclick="doSteal('${r.user_id}','${(r.tree_name||'').replace(/'/g,'')}')">${stealOk?'🍂 Зібрати':'⏳ Зачекайте'}</button>`;
    vd.appendChild(div);
  });
  if(!allTrees.filter(r=>r.user_id!==uid).length)
    vd.innerHTML+='<div style="text-align:center;padding:20px;opacity:.4">Інших гравців поки немає</div>';
}

async function doSteal(targetId,targetName){
  const amt=5;
  G.w+=amt;
  G.stealLog[targetId]=new Date().toISOString();
  trackQ('visit',1);
  renderOak();save();
  toast(`🍂 Зібрано ${amt} Води від "${targetName||'сусіда'}"!`);
  renderVisit();
}

function ftab(i){
  document.getElementById('ft0').classList.toggle('on',i===0);
  document.getElementById('ft1').classList.toggle('on',i===1);
  document.getElementById('fd-rank').style.display=i===0?'':'none';
  document.getElementById('fd-visit').style.display=i===1?'':'none';
  if(i===0)loadRank();
  if(i===1)renderVisit();
}

// ── NAV
function go(s){
  document.querySelectorAll('.scr').forEach(x=>x.classList.remove('on'));
  document.getElementById('scr-'+s).classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-'+s).classList.add('on');
  if(s==='q'){renderQuests();}
  if(s==='f'){loadRank();}
}

// ── MODAL (rename)
function openModal(){document.getElementById('modal').classList.add('on');document.getElementById('minput').value=G.name;setTimeout(()=>document.getElementById('minput').focus(),400);}
function closeModal(){document.getElementById('modal').classList.remove('on');}
async function saveName(){const v=document.getElementById('minput').value.trim();if(!v)return;G.name=v.slice(0,24);renderOak();closeModal();save();toast('✅ Збережено!');}

// ── TOAST
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3000);}

// ── PUBLIC API — called from news articles
window.awardAquaData=async(n=10)=>{G.w+=n;G.reads++;trackQ('read3',1);renderOak();save();toast(`💧 +${n} Води за читання!`);};
window.awardSolarInsight=async(n=5)=>{G.s+=n;renderOak();save();toast(`☀️ +${n} Сонця!`);};

// ── REFERRAL
const SITE='https://nownews.com.ua'; // змінити на ваш домен
function refCode(id){// deterministic 6-char code from uid
  let h=0;for(const c of id){h=(h*31+c.charCodeAt(0))&0xffffffff;}
  return (Math.abs(h)).toString(36).toUpperCase().padStart(6,'0').slice(0,6);
}
function copyRefLink(){
  const code=refCode(uid);
  const url=`${SITE}/games/?ref=${code}`;
  navigator.clipboard.writeText(url).then(()=>toast('🔗 Посилання скопійовано!')).catch(()=>{
    prompt('Скопіюйте посилання:',url);
  });
}
function renderUserPill(user){
  const p=document.getElementById('user-pill');
  if(user&&user.user_metadata){
    const av=user.user_metadata.avatar_url;
    const nm=(user.user_metadata.name||user.email||'').split(' ')[0].slice(0,8);
    p.innerHTML=av?`<img src="${av}" onerror="this.remove()">${nm}`:nm;
  } else {
    p.innerHTML='👤 Гість';
  }
}
function showUserMenu(){
  if(confirm('Вийти з Google акаунту?')){
    sc.auth.signOut().then(()=>{localStorage.removeItem('bukva_uid_google');location.reload();});
  }
}

// ── AUTH
async function signInGoogle(){
  // Save ref code before redirect
  const ref=new URLSearchParams(location.search).get('ref');
  if(ref)localStorage.setItem('pending_ref',ref);
  const{error}=await sc.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.href.split('?')[0]}
  });
  if(error)toast('❌ Помилка входу: '+error.message);
}
async function continueGuest(){
  document.getElementById('auth-modal').classList.remove('on');
  localStorage.setItem('bukva_guest_confirmed','1');
  await startGame();
}
async function handleRef(myUid){
  const pendingRef=localStorage.getItem('pending_ref');
  if(!pendingRef)return;
  localStorage.removeItem('pending_ref');
  // Find referrer by code
  try{
    const{data}=await sc.from('user_gamification').select('user_id,aqua_data').limit(200);
    if(!data)return;
    const referrer=data.find(r=>refCode(r.user_id)===pendingRef.toUpperCase()&&r.user_id!==myUid);
    if(!referrer)return;
    // Award new user welcome bonus
    G.w+=50; G.s+=20;
    // Award referrer (stored in DB directly)
    await sc.from('user_gamification').update({aqua_data:(referrer.aqua_data||0)+30}).eq('user_id',referrer.user_id);
    toast('🎁 Бонус від реферального запрошення: +50 Води!');
    // Store so we don't double-award
    localStorage.setItem('ref_done','1');
  }catch(e){console.warn('ref error',e);}
}

async function startGame(){
  buildStars();setSky();
  await loadDB();
  // Handle referral if first time
  if(!localStorage.getItem('ref_done'))await handleRef(uid);
  checkDailyReset();
  trackQ('login',1);
  await welcome();
  renderOak();
}

// ── INIT
async function init(){
  sc=supabase.createClient(SB,SK);

  // Check for ref param and show hint
  const refParam=new URLSearchParams(location.search).get('ref');
  if(refParam){
    localStorage.setItem('pending_ref',refParam);
    const hint=document.getElementById('ref-bonus-hint');
    hint.textContent='🎁 Вас запросив друг! При вході отримаєте +50 Води та +20 Сонця';
    hint.classList.add('visible');
  }

  // Check Supabase auth session
  const{data:{session}}=await sc.auth.getSession();

  if(session){
    // Logged in via Google — use auth uid
    uid=session.user.id;
    localStorage.setItem('bukva_uid',uid);
    renderUserPill(session.user);
    await startGame();
  } else {
    // Check if guest mode was previously confirmed
    const guestConfirmed=localStorage.getItem('bukva_guest_confirmed');
    uid=localStorage.getItem('bukva_uid');
    if(!uid){uid='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);localStorage.setItem('bukva_uid',uid);}
    if(guestConfirmed){
      renderUserPill(null);
      await startGame();
    } else {
      // Show auth modal
      document.getElementById('auth-modal').classList.add('on');
    }
  }

  // Listen for auth state changes (after OAuth redirect)
  sc.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      uid=session.user.id;
      localStorage.setItem('bukva_uid',uid);
      localStorage.setItem('bukva_guest_confirmed','1');
      document.getElementById('auth-modal').classList.remove('on');
      renderUserPill(session.user);
      if(!document.getElementById('av').textContent||document.getElementById('av').textContent==='0'){
        await startGame();
      }
    }
  });
}
init();
</script>
