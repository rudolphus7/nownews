<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LIVE • Infinite Radio — Прикарпаття News</title>
    <meta name="description" content="Слухайте новини Прикарпаття. Хронологія дня голосом диктора.">
    <link rel="canonical" href="https://ifnews-omega.vercel.app/live/">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/components/header.css">
    <script src="/components/header.js"></script>
    <style>
        :root {
            --accent: #ff4d00;
            --accent-light: #ff7d45;
            --bg: #09090b;
            --card: #141417;
        }

        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        h1,
        h2,
        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        html,
        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            overscroll-behavior-y: contain;
        }

        /* ── Scrollbar ────────────────────────────────────────── */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
        }

        /* ── Timeline Styles ─────────────────────────────────── */
        .date-group {
            margin-bottom: 24px;
            position: relative;
        }

        .date-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 20px 8px;
            font-size: 11px;
            font-weight: 900;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            display: flex;
            items-center;
            justify-content: space-between;
        }

        /* ── Track Tile ────────────────────────────────────────── */
        .track-tile {
            display: flex;
            gap: 16px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .track-tile:active {
            background: rgba(255, 255, 255, 0.03);
        }

        .track-tile.active {
            background: rgba(255, 77, 0, 0.08);
        }

        .track-tile.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
        }

        .track-img-container {
            position: relative;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }

        .track-img {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            object-fit: cover;
            background: #1e1e24;
        }

        .track-play-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .track-tile:hover .track-play-hint {
            opacity: 1;
        }

        .track-tile.active .track-play-hint {
            opacity: 1;
            background: rgba(255, 77, 0, 0.3);
        }

        .track-meta {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .track-tag {
            font-size: 10px;
            font-weight: 800;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }

        .track-title {
            font-size: 14px;
            font-weight: 600;
            color: #f4f4f5;
            line-height: 1.35;
            margin-bottom: 6px;
        }

        .track-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: auto;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: var(--accent);
        }

        /* ── Sticky Bottom Player ──────────────────────────────── */
        #player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(18, 18, 22, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        .progress-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            width: 100%;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
        }

        .mini-art {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
        }

        .mini-info {
            flex: 1;
            min-width: 0;
        }

        .mini-title {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-sub {
            font-size: 10px;
            color: #71717a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .player-btns {
            display: flex;
            items-center;
            gap: 8px;
        }

        .p-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            items-center;
            justify-content: center;
            color: #fff;
        }

        .p-btn-play {
            background: #fff;
            color: #000;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
        }

        /* ── Filter Modal ─────────────────────────────────────── */
        #filter-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        #filter-modal.open {
            transform: translateY(0);
        }

        .modal-bg {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            top: 15%;
            background: #18181b;
            border-radius: 32px 32px 0 0;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: -16px auto 16px;
        }

        .filter-section-title {
            font-size: 11px;
            font-weight: 900;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 16px;
        }

        .chip-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 13px;
            font-weight: 600;
            color: #d4d4d8;
            transition: all 0.2s;
        }

        .chip.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 77, 0, 0.3);
        }

        /* ── Misc ────────────────────────────────────────────── */
        .badge-live {
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-flex;
            items-center;
            gap: 4px;
        }

        main {
            padding-top: calc(70px);
            padding-bottom: 120px;
        }

        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 40;
            height: 70px;
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Wave bar animation */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 18px;
        }

        .wave-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 1.5px;
            animation: wave-anim 1s ease-in-out infinite;
        }

        @keyframes wave-anim {

            0%,
            100% {
                height: 4px;
            }

            50% {
                height: 18px;
            }
        }
    </style>
</head>

<body>
    <div id="site-header-placeholder" class="relative z-10"></div>

    <!-- Persistent Header -->
    <div class="header-fixed flex items-center justify-between px-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-outfit font-black tracking-tight leading-none">INFINITE <span
                    class="text-orange-600">RADIO</span></h1>
            <div class="flex items-center gap-1.5 mt-1">
                <span class="badge-live"><span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                    LIVE</span>
                <span id="active-filter-label"
                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Всі новини</span>
            </div>
        </div>
        <button onclick="openFilters()"
            class="w-11 h-11 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 active:scale-95 transition-transform">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <main class="max-w-xl mx-auto">
        <!-- Radio Toggle Row -->
        <div class="px-6 py-4 flex items-center justify-between bg-white/[0.02] border-b border-white/[0.04]">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Автоматичний ефір</p>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold text-orange-600" id="radio-status">ВИМКНЕНO</span>
                <button onclick="toggleRadioMode()" id="radio-btn"
                    class="w-12 h-6 rounded-full bg-slate-800 p-1 transition-colors relative">
                    <div id="radio-knob" class="w-4 h-4 bg-slate-400 rounded-full transition-transform"></div>
                </button>
            </div>
        </div>

        <!-- Timeline Container -->
        <div id="timeline">
            <!-- Loading Skeletons -->
            <div class="p-6 space-y-8">
                <div class="animate-pulse space-y-4">
                    <div class="h-4 w-24 bg-white/5 rounded"></div>
                    <div class="flex gap-4">
                        <div class="w-16 h-16 bg-white/5 rounded-2xl"></div>
                        <div class="flex-1 space-y-2">
                            <div class="h-4 w-3/4 bg-white/5 rounded"></div>
                            <div class="h-3 w-1/2 bg-white/5 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ──────────────── Sticky Player Bar ──────────────── -->
    <div id="player-bar" class="hidden">
        <div class="progress-bar" id="p-bar" onclick="seek(event)">
            <div class="progress-fill" id="p-fill"></div>
        </div>
        <div class="player-content" onclick="togglePlay()">
            <img id="m-art" src="" alt="" class="mini-art">
            <div class="mini-info">
                <p id="m-sub" class="mini-sub">Політика</p>
                <h3 id="m-title" class="mini-title">Завантаження...</h3>
            </div>
            <div class="player-btns">
                <button class="p-btn text-slate-400" onclick="event.stopPropagation();nextTrack()">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
                <div id="p-wrap" class="p-btn p-btn-play">
                    <svg id="p-play" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="p-pause" class="hidden" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- ──────────────── Filter Modal ──────────────── -->
    <div id="filter-modal">
        <div class="modal-bg" onclick="closeFilters()"></div>
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-outfit font-black">Фільтри</h2>
                <button onclick="closeFilters()"
                    class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Готово</button>
            </div>

            <div class="overflow-y-auto flex-1 space-y-8">
                <div>
                    <h3 class="filter-section-title">РУБРИКИ</h3>
                    <div class="chip-grid" id="cat-grid"></div>
                </div>
                <div>
                    <h3 class="filter-section-title">МІСТА</h3>
                    <div class="chip-grid" id="city-grid"></div>
                </div>
            </div>

            <button onclick="resetFilters()"
                class="w-11px py-4 text-[11px] font-black uppercase tracking-[0.2em] text-slate-500 border border-white/5 rounded-2xl">Скинути
                все</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTracks = [], tracks = [], currentIndex = -1, isPlaying = false, radioMode = false;
        let activeFilter = { type: 'all', val: null };
        const audio = new Audio();
        audio.volume = 0.9;

        // ── Load & Group ───────────────────────────────────────
        async function loadTracks() {
            const { data, error } = await _supabase
                .from('news')
                .select('id, title, slug, image_url, category, city, created_at, tts_audio_url')
                .eq('is_published', true)
                .not('tts_audio_url', 'is', null)
                .order('created_at', { ascending: false })
                .limit(100);

            if (data) { allTracks = data; filterAndRender(); }
        }

        function filterAndRender() {
            tracks = activeFilter.type === 'all' ? allTracks
                : activeFilter.type === 'cat' ? allTracks.filter(t => t.category === activeFilter.val)
                    : allTracks.filter(t => t.city === activeFilter.val);

            renderTimeline();

            // Auto-load first track if none playing
            if (currentIndex === -1 && tracks.length > 0) loadTrack(0, false);
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            if (tracks.length === 0) {
                timeline.innerHTML = '<div class="p-20 text-center opacity-30 font-black uppercase tracking-widest text-xs">Порожньо</div>';
                return;
            }

            // Group by day
            const groups = {};
            tracks.forEach(track => {
                const date = new Date(track.created_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                const today = new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                const label = date === today ? 'Сьогодні' : date;
                if (!groups[label]) groups[label] = [];
                groups[label].push(track);
            });

            timeline.innerHTML = Object.entries(groups).map(([date, items]) => `
                <div class="date-group">
                    <div class="date-header"><span>${date}</span><span>${items.length} НОВИН</span></div>
                    ${items.map(track => {
                const globalIdx = tracks.findIndex(t => t.id === track.id);
                const isActive = globalIdx === currentIndex;
                const catName = window.CATEGORIES_UK?.[track.category] || track.category || 'Новини';
                return `
                        <div class="track-tile ${isActive ? 'active' : ''}" onclick="handleTileClick(${globalIdx})">
                            <div class="track-img-container">
                                <img src="${track.image_url || ''}" class="track-img" onerror="this.src='/favicon.ico';">
                                <div class="track-play-hint">
                                    ${isActive && isPlaying
                        ? `<div class="wave-container">${[0, 0.1, 0.2, 0.3, 0.15].map(d => `<div class="wave-bar" style="animation-delay:${d}s"></div>`).join('')}</div>`
                        : `<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`}
                                </div>
                            </div>
                            <div class="track-meta">
                                <span class="track-tag">${catName}</span>
                                <h3 class="track-title">${track.title}</h3>
                                <div class="track-actions">
                                    <button onclick="event.stopPropagation();share('${track.title}','${getLink(track)}')" class="action-btn">
                                        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg> 
                                        Share
                                    </button>
                                    <a href="${getLink(track)}" onclick="event.stopPropagation()" class="action-btn">
                                        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                        Читати
                                    </a>
                                </div>
                            </div>
                        </div>`;
            }).join('')}
                </div>
            `).join('');
        }

        // ── Player Logic ───────────────────────────────────────
        function handleTileClick(index) {
            if (index === currentIndex) togglePlay();
            else loadTrack(index, true);
        }

        function loadTrack(index, play = true) {
            currentIndex = index;
            const t = tracks[index];
            if (!t) return;

            document.getElementById('player-bar').classList.remove('hidden');
            document.getElementById('m-art').src = t.image_url || '';
            document.getElementById('m-title').textContent = t.title;
            document.getElementById('m-sub').textContent = window.CATEGORIES_UK?.[t.category] || t.category || 'Новини';

            audio.src = t.tts_audio_url;
            if (play) {
                audio.play().then(() => setPlayState(true)).catch(console.error);
            } else {
                setPlayState(false);
            }
            renderTimeline();
        }

        function togglePlay() {
            if (audio.paused) audio.play().then(() => setPlayState(true));
            else { audio.pause(); setPlayState(false); }
        }

        function setPlayState(playing) {
            isPlaying = playing;
            document.getElementById('p-play').classList.toggle('hidden', playing);
            document.getElementById('p-pause').classList.toggle('hidden', !playing);
            document.getElementById('p-wrap').classList.toggle('p-btn-play', !playing);
            renderTimeline();
        }

        function nextTrack() {
            if (currentIndex < tracks.length - 1) loadTrack(currentIndex + 1, true);
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            document.getElementById('p-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
        });

        audio.addEventListener('ended', () => {
            if (radioMode || currentIndex < tracks.length - 1) nextTrack();
            else setPlayState(false);
        });

        function seek(e) {
            const r = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - r.left) / r.width;
            if (audio.duration) audio.currentTime = pct * audio.duration;
        }

        // ── Filters ────────────────────────────────────────────
        function openFilters() { document.getElementById('filter-modal').classList.add('open'); }
        function closeFilters() { document.getElementById('filter-modal').classList.remove('open'); }

        function setFilter(type, val, label) {
            activeFilter = { type, val };
            document.getElementById('active-filter-label').textContent = label;
            updateChips();
            filterAndRender();
            closeFilters();
        }

        function resetFilters() { setFilter('all', null, 'Всі новини'); }

        function updateChips() {
            document.querySelectorAll('.chip').forEach(c => {
                const isActive = (c.dataset.type === activeFilter.type && c.dataset.val === activeFilter.val) || (activeFilter.type === 'all' && c.dataset.type === 'all');
                c.classList.toggle('active', isActive);
            });
        }

        // ── Init Systems ───────────────────────────────────────
        async function buildFilterGrids() {
            const [catRes, cityRes] = await Promise.all([
                _supabase.from('categories').select('slug,name').order('order_index'),
                _supabase.from('cities').select('slug,name').order('order_index')
            ]);

            const catGrid = document.getElementById('cat-grid');
            catGrid.innerHTML = `<div class="chip active" data-type="all" onclick="resetFilters()">Всі рубрики</div>` +
                catRes.data.map(c => `<div class="chip" data-type="cat" data-val="${c.slug}" onclick="setFilter('cat','${c.slug}','${c.name}')">${c.name}</div>`).join('');

            const cityGrid = document.getElementById('city-grid');
            cityGrid.innerHTML = cityRes.data.map(c => `<div class="chip" data-type="city" data-val="${c.slug}" onclick="setFilter('city','${c.slug}','${c.name}')">${c.name}</div>`).join('');
            updateChips();
        }

        function toggleRadioMode() {
            radioMode = !radioMode;
            document.getElementById('radio-knob').style.transform = radioMode ? 'translateX(24px)' : 'translateX(0)';
            document.getElementById('radio-btn').classList.toggle('bg-orange-600', radioMode);
            document.getElementById('radio-status').textContent = radioMode ? 'УВІМКНЕНО' : 'ВИМКНЕНО';
            if (radioMode && audio.paused) nextTrack();
        }

        function getLink(t) { return t.city ? `/${t.city}/${t.slug}/` : t.category ? `/category/${t.category}/${t.slug}/` : `/${t.slug}/`; }
        async function share(title, url) { if (navigator.share) navigator.share({ title, url }); else alert('URL copied'); }

        (async () => {
            await window.initSiteHeader(_supabase);
            await buildFilterGrids();
            await loadTracks();
        })();
    </script>
