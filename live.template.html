<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LIVE • Аудіо-Новини — Прикарпаття News</title>
    <meta name="description"
        content="Слухайте новини Прикарпаття голосом диктора. Оберіть місто або рубрику і слухайте по дорозі.">
    <link rel="canonical" href="https://ifnews-omega.vercel.app/live/">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/components/header.css">
    <script src="/components/header.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            background: #0d0d14;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            overscroll-behavior-y: contain;
        }

        /* ── Scrollbar invisible ───────────────────────────────── */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
        }

        /* ── Channel cards ────────────────────────────────────── */
        .channel-cards {
            display: flex;
            gap: 10px;
            padding: 0 16px 4px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
        }

        .channel-card {
            flex: 0 0 auto;
            width: 100px;
            height: 90px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            scroll-snap-align: start;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            text-align: center;
            line-height: 1.2;
            padding: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .channel-card .icon {
            font-size: 22px;
            line-height: 1;
        }

        .channel-card:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .channel-card.active {
            color: #fff;
            border-color: var(--card-accent, rgba(234, 88, 12, 0.7));
            background: var(--card-bg, rgba(234, 88, 12, 0.15));
            box-shadow: 0 0 20px var(--card-glow, rgba(234, 88, 12, 0.2));
        }

        .channel-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            background: linear-gradient(135deg, var(--card-accent2, rgba(234, 88, 12, 0.3)), transparent);
            transition: opacity 0.3s;
        }

        .channel-card.active::before {
            opacity: 1;
        }

        .channel-card .dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--card-accent, #ea580c);
            opacity: 0;
            box-shadow: 0 0 6px var(--card-accent, #ea580c);
        }

        .channel-card.active .dot {
            opacity: 1;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        /* ── Track list ────────────────────────────────────────── */
        .track-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.15s;
            position: relative;
        }

        .track-row:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .track-row.active {
            background: rgba(234, 88, 12, 0.08);
        }

        .track-row.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ea580c;
            border-radius: 0 2px 2px 0;
        }

        .track-thumb {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background: #1e293b;
        }

        .track-thumb-placeholder {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            flex-shrink: 0;
            background: #1a1f2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* ── Sticky bottom player ──────────────────────────────── */
        #player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 500;
            background: rgba(13, 13, 20, 0.97);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .player-progress {
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        .player-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ea580c, #f97316);
            width: 0%;
            transition: width 0.3s linear;
        }

        .player-main {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
        }

        .player-art {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-cat {
            font-size: 10px;
            font-weight: 900;
            color: #f97316;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .ctrl {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .ctrl:active {
            transform: scale(0.9);
        }

        .ctrl-play {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ea580c, #dc2626);
            color: #fff;
            box-shadow: 0 4px 16px rgba(234, 88, 12, 0.4);
        }

        .ctrl-play:active {
            box-shadow: 0 2px 8px rgba(234, 88, 12, 0.3);
        }

        .ctrl:hover {
            color: #fff;
        }

        /* ── Expanded player overlay ──────────────────────────── */
        #player-full {
            position: fixed;
            inset: 0;
            z-index: 600;
            background: rgba(10, 10, 18, 0.98);
            backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(.32, .72, 0, 1);
            padding-top: env(safe-area-inset-top, 0);
        }

        #player-full.open {
            transform: translateY(0);
        }

        .full-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
        }

        .full-cover {
            width: min(280px, 80vw);
            aspect-ratio: 1;
            border-radius: 24px;
            object-fit: cover;
            margin: 0 auto 20px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s ease;
        }

        .full-cover.spin {
            animation: cover-float 6s ease-in-out infinite;
        }

        @keyframes cover-float {

            0%,
            100% {
                transform: scale(1.02) translateY(0)
            }

            50% {
                transform: scale(1.02) translateY(-6px)
            }
        }

        .full-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            margin: 0 20px;
        }

        .full-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ea580c, #f97316);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s linear;
        }

        .full-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 24px 20px 16px;
        }

        .full-ctrl {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .full-ctrl:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.12);
        }

        .full-ctrl-play {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #ea580c, #dc2626);
            color: #fff;
            box-shadow: 0 8px 32px rgba(234, 88, 12, 0.5);
        }

        .full-ctrl-play:active {
            box-shadow: 0 4px 16px rgba(234, 88, 12, 0.3);
        }

        .vol-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px 8px;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            outline: none;
            flex: 1;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ea580c;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(234, 88, 12, 0.5);
        }

        /* ── Wave animation ────────────────────────────────────── */
        .wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }

        .wave-b {
            width: 3px;
            background: #ea580c;
            border-radius: 2px;
            animation: wav 1s ease-in-out infinite;
        }

        @keyframes wav {

            0%,
            100% {
                height: 4px
            }

            50% {
                height: 16px
            }
        }

        /* ── Skeleton ──────────────────────────────────────────── */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0
            }

            100% {
                background-position: 200% 0
            }
        }

        /* ── Content spacing for player bar ───────────────────── */
        main {
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px) + 8px);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div id="site-header-placeholder" class="relative z-10"></div>

    <main class="max-w-2xl mx-auto">

        <!-- Page head -->
        <div class="px-4 pt-6 pb-2">
            <div class="flex items-center gap-2 mb-2">
                <span class="flex h-2.5 w-2.5 relative">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600"></span>
                </span>
                <span class="text-[10px] font-black text-red-500 uppercase tracking-[0.3em]">Live • Ефір</span>
            </div>
            <div class="flex items-end justify-between">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter text-white italic">Аудіо<span
                            class="text-orange-500">-новини</span></h1>
                    <p class="text-[12px] text-slate-400 mt-0.5">Слухай по дорозі — без рук</p>
                </div>
                <!-- Radio toggle -->
                <button id="radio-toggle" onclick="toggleRadioMode()"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-white/[0.05] border border-white/[0.08] transition-all">
                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-400"
                        id="radio-label">Авторадіо</span>
                    <div id="radio-dot" class="w-2 h-2 rounded-full bg-slate-600 transition-colors"></div>
                </button>
            </div>
        </div>

        <!-- Channel selector label -->
        <p class="px-4 pt-5 pb-2 text-[9px] font-black text-slate-600 uppercase tracking-[0.25em]">Канал</p>

        <!-- Channel cards row -->
        <div class="channel-cards pb-2" id="channel-cards">
            <!-- Injected by JS -->
        </div>

        <!-- Section label -->
        <div class="flex items-center justify-between px-4 pt-5 pb-3">
            <p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.25em]">Черга</p>
            <span id="queue-count" class="text-[9px] font-bold text-slate-600"></span>
        </div>

        <!-- Loading skeletons -->
        <div id="loading-state" class="px-4 space-y-3">
            <div class="skeleton h-16 rounded-2xl"></div>
            <div class="skeleton h-16 rounded-2xl"></div>
            <div class="skeleton h-16 rounded-2xl"></div>
            <div class="skeleton h-16 rounded-2xl"></div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="hidden text-center py-16 px-4">
            <div class="text-5xl mb-4">🎙️</div>
            <p class="text-slate-300 font-bold">Немає аудіо-новин у цьому каналі</p>
            <p class="text-slate-500 text-sm mt-2">Спробуйте іншу рубрику або місто</p>
        </div>

        <!-- Track list -->
        <div id="track-list"></div>

    </main>

    <!-- ──────────────── Sticky Bottom Player ──────────────── -->
    <div id="player-bar" class="hidden">
        <div class="player-progress" id="min-progress" onclick="seekFromMini(event)">
            <div class="player-progress-fill" id="min-progress-fill"></div>
        </div>
        <div class="player-main" onclick="openFullPlayer()">
            <img id="min-art" src="" alt="" class="player-art" onerror="this.style.display='none'">
            <div class="player-info">
                <div class="player-cat" id="min-cat">Новини</div>
                <div class="player-title" id="min-title">Завантаження...</div>
            </div>
            <div class="player-controls" onclick.stop="">
                <button class="ctrl" onclick="event.stopPropagation();prevTrack()" title="Назад">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                    </svg>
                </button>
                <button class="ctrl ctrl-play" id="min-play-btn" onclick="event.stopPropagation();togglePlay()">
                    <svg id="min-play-icon" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="min-pause-icon" class="hidden" width="22" height="22" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <button class="ctrl" onclick="event.stopPropagation();nextTrack()" title="Далі">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ──────────────── Full Player Overlay ──────────────── -->
    <div id="player-full">
        <div class="full-header">
            <button onclick="closeFullPlayer()" class="p-2 -ml-2 text-slate-400 hover:text-white transition-colors">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div class="text-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.25em]" id="full-channel-label">Всі
                    новини</p>
                <p class="text-xs font-bold text-slate-300">← Свайп вниз →</p>
            </div>
            <button onclick="copyShareLink()" class="p-2 -mr-2 text-slate-400 hover:text-orange-400 transition-colors">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
            </button>
        </div>

        <!-- Cover art -->
        <div class="flex-1 flex flex-col overflow-hidden px-6">
            <div class="flex-1 flex items-center justify-center">
                <div class="relative">
                    <img id="full-art" class="full-cover" src="" alt="">
                    <div class="absolute top-3 left-3 px-2.5 py-1 bg-orange-600/90 backdrop-blur-sm rounded-full text-[9px] font-black text-white uppercase tracking-widest"
                        id="full-cat"></div>
                </div>
            </div>

            <!-- Track info -->
            <div class="mb-4 px-2">
                <h2 id="full-title" class="text-xl font-black text-white leading-tight mb-1"></h2>
                <p id="full-date" class="text-sm text-slate-400 font-medium"></p>
                <a id="full-link" href="#"
                    class="inline-flex items-center gap-1 text-[10px] font-black text-slate-500 hover:text-orange-400 mt-1 transition-colors uppercase tracking-wider">
                    Читати статтю
                    <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5"
                        viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6m4-3h6m0 0v6m0-6L10 14" />
                    </svg>
                </a>
            </div>

            <!-- Progress -->
            <div class="mb-2 px-2">
                <div class="full-progress" id="full-progress" onclick="seekFromFull(event)">
                    <div class="full-progress-fill" id="full-progress-fill"></div>
                </div>
                <div class="flex justify-between mt-1.5 text-[10px] font-bold text-slate-500">
                    <span id="full-cur">0:00</span>
                    <span id="full-dur">0:00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="full-controls">
                <button class="full-ctrl" onclick="prevTrack()">
                    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                    </svg>
                </button>
                <button class="full-ctrl full-ctrl-play" id="full-play-btn" onclick="togglePlay()">
                    <svg id="full-play-icon" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="full-pause-icon" class="hidden" width="28" height="28" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <button class="full-ctrl" onclick="nextTrack()">
                    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
            </div>

            <!-- Volume -->
            <div class="vol-row pb-4">
                <svg width="14" height="14" fill="currentColor" class="text-slate-500 flex-shrink-0"
                    viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                </svg>
                <input type="range" id="vol-slider" min="0" max="1" step="0.02" value="0.85"
                    oninput="setVolume(this.value)">
                <svg width="16" height="16" fill="currentColor" class="text-slate-400 flex-shrink-0"
                    viewBox="0 0 24 24">
                    <path
                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTracks = [], tracks = [];
        let currentIndex = 0;
        let audio = new Audio();
        let isPlaying = false;
        let radioMode = false;
        let filterType = 'all', filterValue = null;
        audio.volume = 0.85;

        // ── Channel config ─────────────────────────────────────
        // Dynamic entries get generated once categories/cities load
        const CHANNEL_COLORS = {
            // categories (slug → colors)
            polityka: { bg: 'rgba(99,102,241,0.15)', border: 'rgba(99,102,241,0.6)', glow: 'rgba(99,102,241,0.2)', icon: '🏛️' },
            novyny: { bg: 'rgba(234,88,12,0.15)', border: 'rgba(234,88,12,0.6)', glow: 'rgba(234,88,12,0.2)', icon: '📰' },
            ekonomika: { bg: 'rgba(16,185,129,0.15)', border: 'rgba(16,185,129,0.6)', glow: 'rgba(16,185,129,0.2)', icon: '💹' },
            sport: { bg: 'rgba(59,130,246,0.15)', border: 'rgba(59,130,246,0.6)', glow: 'rgba(59,130,246,0.2)', icon: '⚽' },
            kultura: { bg: 'rgba(168,85,247,0.15)', border: 'rgba(168,85,247,0.6)', glow: 'rgba(168,85,247,0.2)', icon: '🎭' },
            tekhnolohii: { bg: 'rgba(14,165,233,0.15)', border: 'rgba(14,165,233,0.6)', glow: 'rgba(14,165,233,0.2)', icon: '💻' },
            frankivsk: { bg: 'rgba(234,88,12,0.15)', border: 'rgba(234,88,12,0.6)', glow: 'rgba(234,88,12,0.2)', icon: '🏙️' },
            oblast: { bg: 'rgba(250,204,21,0.15)', border: 'rgba(250,204,21,0.5)', glow: 'rgba(250,204,21,0.15)', icon: '🌲' },
            viyna: { bg: 'rgba(239,68,68,0.15)', border: 'rgba(239,68,68,0.6)', glow: 'rgba(239,68,68,0.2)', icon: '🛡️' },
            pogoda: { bg: 'rgba(14,165,233,0.15)', border: 'rgba(14,165,233,0.6)', glow: 'rgba(14,165,233,0.2)', icon: '⛅' },
        };
        const CITY_COLORS = {
            if: { bg: 'rgba(234,88,12,0.15)', border: 'rgba(234,88,12,0.6)', glow: 'rgba(234,88,12,0.2)', icon: '🏛️' },
            kalush: { bg: 'rgba(99,102,241,0.15)', border: 'rgba(99,102,241,0.6)', glow: 'rgba(99,102,241,0.2)', icon: '⚗️' },
            kolomyya: { bg: 'rgba(16,185,129,0.15)', border: 'rgba(16,185,129,0.6)', glow: 'rgba(16,185,129,0.2)', icon: '🌿' },
            dolyna: { bg: 'rgba(250,204,21,0.15)', border: 'rgba(250,204,21,0.5)', glow: 'rgba(250,204,21,0.15)', icon: '⛰️' },
            bolekhiv: { bg: 'rgba(168,85,247,0.15)', border: 'rgba(168,85,247,0.6)', glow: 'rgba(168,85,247,0.2)', icon: '🏰' },
            nadvirna: { bg: 'rgba(59,130,246,0.15)', border: 'rgba(59,130,246,0.6)', glow: 'rgba(59,130,246,0.2)', icon: '🌊' },
            burshtyn: { bg: 'rgba(251,146,60,0.15)', border: 'rgba(251,146,60,0.6)', glow: 'rgba(251,146,60,0.2)', icon: '⚡' },
            kosiv: { bg: 'rgba(34,197,94,0.15)', border: 'rgba(34,197,94,0.6)', glow: 'rgba(34,197,94,0.2)', icon: '🌺' },
            yaremche: { bg: 'rgba(14,165,233,0.15)', border: 'rgba(14,165,233,0.6)', glow: 'rgba(14,165,233,0.2)', icon: '🏔️' },
        };
        const DEFAULT_COLORS = { bg: 'rgba(234,88,12,0.15)', border: 'rgba(234,88,12,0.5)', glow: 'rgba(234,88,12,0.15)', icon: '📡' };

        // ── Build channel cards ──────────────────────────────────
        function buildChannelCards(categories, cities) {
            const container = document.getElementById('channel-cards');
            container.innerHTML = '';

            // "All" card
            const allCard = makeCard('all', null, { bg: DEFAULT_COLORS.bg, border: 'rgba(234,88,12,0.6)', glow: 'rgba(234,88,12,0.2)', icon: '📻' }, 'Всі новини');
            allCard.classList.add('active');
            container.appendChild(allCard);

            // Category cards
            categories.forEach(c => {
                const colors = CHANNEL_COLORS[c.slug] || DEFAULT_COLORS;
                container.appendChild(makeCard('category', c.slug, colors, c.name));
            });

            // City cards
            cities.forEach(c => {
                const colors = CITY_COLORS[c.slug] || DEFAULT_COLORS;
                container.appendChild(makeCard('city', c.slug, colors, c.name));
            });
        }

        function makeCard(type, slug, colors, label) {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.id = `card-${type}-${slug || 'all'}`;
            div.style.setProperty('--card-bg', colors.bg);
            div.style.setProperty('--card-accent', colors.border);
            div.style.setProperty('--card-accent2', colors.glow);
            div.style.setProperty('--card-glow', colors.glow);
            div.innerHTML = `<div class="dot"></div><div class="icon">${colors.icon}</div><div>${label}</div>`;
            div.onclick = () => setFilter(type, slug);
            return div;
        }

        // ── Filter ─────────────────────────────────────────────
        function setFilter(type, slug) {
            filterType = type; filterValue = slug;

            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            const id = `card-${type}-${slug || 'all'}`;
            document.getElementById(id)?.classList.add('active');

            // Scroll active card into view
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            // Filter tracks
            tracks = type === 'all' ? allTracks
                : type === 'category' ? allTracks.filter(t => t.category === slug)
                    : allTracks.filter(t => t.city === slug);

            currentIndex = 0;

            // Update channel label in full player
            const catName = type === 'all' ? 'Всі новини'
                : type === 'category' ? (window.CATEGORIES_UK?.[slug] || slug)
                    : (window.CITIES_UK?.[slug] || slug);
            document.getElementById('full-channel-label').textContent = catName;

            if (tracks.length === 0) {
                document.getElementById('track-list').innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('queue-count').textContent = '';
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('queue-count').textContent = `${tracks.length} аудіо`;
                renderList();
                loadTrack(0, false);
            }
        }

        // ── Load all tracks ──────────────────────────────────────
        async function loadTracks() {
            const { data, error } = await _supabase
                .from('news')
                .select('id, title, slug, image_url, category, city, created_at, tts_audio_url')
                .eq('is_published', true)
                .not('tts_audio_url', 'is', null)
                .order('created_at', { ascending: false })
                .limit(100);

            document.getElementById('loading-state').classList.add('hidden');

            if (error || !data || !data.length) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            allTracks = data; tracks = data;
            document.getElementById('queue-count').textContent = `${tracks.length} аудіо`;
            renderList();

            // Deep-link
            const urlParams = new URLSearchParams(window.location.search);
            const initialId = window.__PRELOADED_TRACK_ID__ || urlParams.get('id');
            let idx = 0;
            if (initialId) { const f = tracks.findIndex(t => t.id === initialId); if (f !== -1) idx = f; }
            loadTrack(idx, !!initialId);
        }

        // ── Render list ──────────────────────────────────────────
        function renderList() {
            const container = document.getElementById('track-list');
            const listened = getListened();
            container.innerHTML = tracks.map((t, i) => {
                const listened_class = listened.includes(t.id) ? 'opacity-50' : '';
                const active_class = i === currentIndex ? 'active' : '';
                const catName = window.CATEGORIES_UK?.[t.category] || t.category || '';
                return `
                <div class="track-row ${active_class} ${listened_class}" id="tr-${i}" onclick="loadTrack(${i},true)">
                    ${t.image_url
                        ? `<img src="${t.image_url}" class="track-thumb" onerror="this.parentNode.innerHTML='<div class=track-thumb-placeholder>🎙️</div>'+this.parentNode.innerHTML.replace(this.outerHTML,'');">`
                        : `<div class="track-thumb-placeholder">🎙️</div>`
                    }
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-0.5">${catName}</p>
                        <h3 class="text-[13px] font-bold text-white leading-snug line-clamp-2">${t.title}</h3>
                        <p class="text-[10px] text-slate-500 mt-0.5">${formatDate(t.created_at)}</p>
                    </div>
                    <div class="flex-shrink-0 ml-2">
                        ${i === currentIndex && isPlaying
                        ? `<div class="wave">${[0, 0.15, 0.3, 0.1, 0.25].map(d => `<div class="wave-b" style="animation-delay:${d}s"></div>`).join('')}</div>`
                        : `<svg width="14" height="14" fill="currentColor" class="text-slate-700" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`}
                    </div>
                </div>`;
            }).join('');
        }

        // ── Track load ───────────────────────────────────────────
        function loadTrack(index, andPlay = true) {
            if (index < 0 || index >= tracks.length) return;
            currentIndex = index;
            const t = tracks[index];

            // Mini player
            const art = document.getElementById('min-art');
            art.src = t.image_url || '';
            art.style.display = t.image_url ? '' : 'none';
            document.getElementById('min-title').textContent = t.title;
            document.getElementById('min-cat').textContent = window.CATEGORIES_UK?.[t.category] || t.category || 'Новини';
            document.getElementById('player-bar').classList.remove('hidden');

            // Full player
            const fullArt = document.getElementById('full-art');
            fullArt.src = t.image_url || '';
            fullArt.onerror = () => { fullArt.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="%230f172a" width="300" height="300" rx="24"/><text fill="%23ea580c" font-size="80" x="95" y="175">🎙</text></svg>'; };
            document.getElementById('full-cat').textContent = window.CATEGORIES_UK?.[t.category] || t.category || 'Новини';
            document.getElementById('full-title').textContent = t.title;
            document.getElementById('full-date').textContent = formatDate(t.created_at);
            document.getElementById('full-link').href = getArticleLink(t);

            // Reset progress
            ['min-progress-fill', 'full-progress-fill'].forEach(id => document.getElementById(id).style.width = '0%');
            document.getElementById('full-cur').textContent = '0:00';
            document.getElementById('full-dur').textContent = '0:00';

            audio.pause();
            audio.src = t.tts_audio_url;
            audio.load();

            if (andPlay) {
                audio.play().then(() => { setPlayState(true); markListened(t.id); }).catch(console.error);
            } else {
                setPlayState(false);
            }

            const url = new URL(window.location);
            url.searchParams.set('id', t.id);
            window.history.replaceState({}, '', url);

            renderList();
            setTimeout(() => {
                const el = document.getElementById(`tr-${index}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // ── Play state ───────────────────────────────────────────
        function setPlayState(playing) {
            isPlaying = playing;
            // Mini player
            document.getElementById('min-play-icon').classList.toggle('hidden', playing);
            document.getElementById('min-pause-icon').classList.toggle('hidden', !playing);
            // Full player
            document.getElementById('full-play-icon').classList.toggle('hidden', playing);
            document.getElementById('full-pause-icon').classList.toggle('hidden', !playing);
            document.getElementById('full-art').classList.toggle('spin', playing);
            renderList();
        }

        function togglePlay() {
            if (audio.paused) { audio.play().then(() => setPlayState(true)).catch(console.error); }
            else { audio.pause(); setPlayState(false); }
        }
        function prevTrack() { loadTrack((currentIndex - 1 + tracks.length) % tracks.length, isPlaying); }
        function nextTrack() { loadTrack((currentIndex + 1) % tracks.length, true); }
        function setVolume(v) { audio.volume = parseFloat(v); }

        // ── Full player ──────────────────────────────────────────
        function openFullPlayer() { document.getElementById('player-full').classList.add('open'); }
        function closeFullPlayer() { document.getElementById('player-full').classList.remove('open'); }

        // Swipe down to close full player
        let touchStartY = 0;
        document.getElementById('player-full').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
        document.getElementById('player-full').addEventListener('touchend', e => {
            if (e.changedTouches[0].clientY - touchStartY > 80) closeFullPlayer();
        }, { passive: true });

        // ── Progress ─────────────────────────────────────────────
        function seek(pct) { if (audio.duration) audio.currentTime = pct * audio.duration; }
        function seekFromMini(e) {
            e.stopPropagation();
            const r = e.currentTarget.getBoundingClientRect();
            seek((e.clientX - r.left) / r.width);
        }
        function seekFromFull(e) {
            const r = e.currentTarget.getBoundingClientRect();
            seek((e.clientX - r.left) / r.width);
        }
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('min-progress-fill').style.width = `${pct}%`;
            document.getElementById('full-progress-fill').style.width = `${pct}%`;
            document.getElementById('full-cur').textContent = fmtTime(audio.currentTime);
            document.getElementById('full-dur').textContent = fmtTime(audio.duration);
        });
        audio.addEventListener('ended', () => {
            const next = (currentIndex + 1) % tracks.length;
            if (radioMode || next !== 0 || currentIndex !== tracks.length - 1) loadTrack(next, true);
            else setPlayState(false);
        });

        // ── Radio mode ───────────────────────────────────────────
        function toggleRadioMode() {
            radioMode = !radioMode;
            const dot = document.getElementById('radio-dot');
            const label = document.getElementById('radio-label');
            dot.style.background = radioMode ? '#ef4444' : '#4b5563';
            dot.style.boxShadow = radioMode ? '0 0 8px rgba(239,68,68,0.6)' : 'none';
            label.style.color = radioMode ? '#fca5a5' : '';
            if (radioMode && audio.paused && tracks.length) loadTrack(currentIndex, true);
        }

        // ── Utils ────────────────────────────────────────────────
        function getListened() { try { return JSON.parse(localStorage.getItem('news_listened_tracks') || '[]'); } catch (e) { return []; } }
        function markListened(id) {
            const l = getListened(); if (!l.includes(id)) { l.unshift(id); localStorage.setItem('news_listened_tracks', JSON.stringify(l.slice(0, 100))); }
        }
        function formatDate(iso) { return new Date(iso).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' }); }
        function fmtTime(s) { if (!s || isNaN(s)) return '0:00'; return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`; }
        function getArticleLink(t) {
            if (t.city && window.CITIES_UK?.[t.city]) return `/${t.city}/${t.slug}/`;
            if (t.category) return `/category/${t.category}/${t.slug}/`;
            return `/${t.slug}/`;
        }

        // ── Share ────────────────────────────────────────────────
        async function copyShareLink() {
            try {
                if (navigator.share) {
                    await navigator.share({ title: document.getElementById('full-title').textContent, url: window.location.href });
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Посилання скопійовано!');
                }
            } catch (e) { console.log('Share cancelled'); }
        }

        // ── Keyboard ─────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
            if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 10);
            if (e.code === 'KeyN') nextTrack();
            if (e.code === 'KeyP') prevTrack();
            if (e.code === 'Escape') closeFullPlayer();
        });

        // ── Init ─────────────────────────────────────────────────
        (async () => {
            await window.initSiteHeader(_supabase);
            const [catRes, cityRes] = await Promise.all([
                _supabase.from('categories').select('slug,name').order('order_index', { ascending: true }),
                _supabase.from('cities').select('slug,name').order('order_index', { ascending: true })
            ]);
            if (catRes.data && cityRes.data) buildChannelCards(catRes.data, cityRes.data);
            await loadTracks();
        })();
    </script>
</body>
