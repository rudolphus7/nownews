<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LIVE • Infinite Radio — Прикарпаття News</title>
    <meta name="description" content="Слухайте новини Прикарпаття. Хронологія дня голосом диктора.">
    <link rel="canonical" href="https://ifnews-omega.vercel.app/live/">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/components/header.css">
    <script src="/components/header.js"></script>
    <style>
        :root {
            --accent: #ff4d00;
            --accent-dark: #dc2610;
            --bg: #09090b;
            --card: #141417;
            --text-muted: #71717a;
        }

        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        h1,
        h2,
        h3,
        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        html,
        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            overscroll-behavior: none;
        }

        /* ── Scrollbar ────────────────────────────────────────── */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
        }

        /* ── Hero Section ─────────────────────────────────────── */
        .hero {
            padding: 40px 20px;
            text-align: left;
            background: linear-gradient(to bottom, rgba(255, 77, 0, 0.08), transparent);
        }

        .hero-live {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 900;
            color: #ff4d00;
            margin-bottom: 12px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff4d00;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .hero-title {
            font-size: 44px;
            font-weight: 900;
            font-family: 'Outfit';
            font-style: italic;
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }

        .hero-title span {
            color: var(--accent);
        }

        .hero-desc {
            font-size: 14px;
            font-weight: 500;
            color: #a1a1aa;
            line-height: 1.5;
            margin-bottom: 24px;
            max-width: 85%;
        }

        .hero-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .auto-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 10px;
            font-weight: 800;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }

        .auto-btn.active {
            border-color: var(--accent);
            color: #fff;
        }

        .auto-val {
            color: #fff;
            font-weight: 900;
            margin-left: 2px;
        }

        .city-chip {
            display: flex;
            items-center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-size: 10px;
            font-weight: 900;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ── Player Stage ─────────────────────────────────────── */
        .stage {
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-box {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1;
            margin-bottom: 32px;
            filter: drop-shadow(0 40px 80px rgba(0, 0, 0, 0.6));
        }

        .cover-img {
            width: 100%;
            height: 100%;
            border-radius: 28px;
            object-fit: cover;
        }

        .cover-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .stage-info {
            text-align: center;
            margin-bottom: 24px;
        }

        .stage-title {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 8px;
            font-family: 'Outfit';
        }

        .stage-date {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .wave-vis {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 32px;
            margin-bottom: 24px;
        }

        .wave-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        .p-main-track {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
            margin-bottom: 12px;
        }

        .p-main-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .p-main-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .p-main-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            margin: 32px 0;
        }

        .p-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            display: flex;
            items-center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 77, 0, 0.4);
        }

        .p-side-btn {
            color: #fff;
            opacity: 0.6;
        }

        .volume-box {
            width: 100%;
            max-width: 240px;
            display: flex;
            items-center;
            gap: 12px;
            margin-bottom: 32px;
            opacity: 0.5;
        }

        .v-slider {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .v-fill {
            height: 100%;
            background: #fff;
            width: 80%;
        }

        .v-knob {
            position: absolute;
            right: 0;
            top: -4px;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
        }

        .act-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .read-link {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: flex;
            items-center;
            gap: 6px;
        }

        .share-pill {
            padding: 12px 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 10px;
            font-weight: 900;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ── Timeline (Feed) ─────────────────────────────────── */
        .feed-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(9, 9, 11, 0.95);
            backdrop-filter: blur(16px);
            padding: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }

        .feed-label {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
        }

        .item {
            display: flex;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .item.active {
            background: rgba(255, 77, 0, 0.05);
        }

        .item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
        }

        .item.listened {
            opacity: 0.5;
        }

        .item-thumb {
            position: relative;
            width: 84px;
            height: 84px;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border 0.2s;
        }

        .item.active .item-thumb {
            border-color: var(--accent);
            border-radius: 14px;
        }

        .item-img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        .item-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            opacity: 0;
        }

        .item:hover .item-play,
        .item.active .item-play {
            opacity: 1;
        }

        .item-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .item-cat {
            font-size: 10px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .item-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1.35;
            margin-bottom: 8px;
        }

        .item-acts {
            display: flex;
            items-center;
            gap: 16px;
        }

        .item-act {
            display: flex;
            items-center;
            gap: 4px;
            font-size: 9px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ── Mini Player ─────────────────────────────────────── */
        #mini {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #101014;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .m-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .m-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 0 4px 4px 0;
        }

        .m-content {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px 14px;
        }

        .m-img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
        }

        .m-info {
            flex: 1;
            min-width: 0;
        }

        .m-cat {
            font-size: 9px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .m-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .m-btns {
            display: flex;
            items-center;
            gap: 14px;
        }

        /* ── Animations ─────────────────────────────────────── */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        .wave-active .wave-bar {
            animation: bar-anim 1s ease-in-out infinite;
        }

        @keyframes bar-anim {

            0%,
            100% {
                height: 4px;
            }

            50% {
                height: 32px;
            }
        }

        #filter-drawer {
            position: fixed;
            inset: 0;
            z-index: 500;
            visibility: hidden;
            transition: visibility 0.4s;
        }

        #filter-drawer.open {
            visibility: visible;
        }

        .drawer-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.4s;
        }

        #filter-drawer.open .drawer-overlay {
            opacity: 1;
        }

        .drawer-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #18181b;
            border-radius: 24px 24px 0 0;
            padding: 32px 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        #filter-drawer.open .drawer-sheet {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div id="site-header-placeholder"></div>

    <main class="max-w-xl mx-auto">
        <!-- Hero Section -->
        <div class="hero">
            <div class="hero-live">
                <div class="live-dot"></div>
                LIVE • ЕФІР
            </div>
            <h1 class="hero-title">АУДІО-<span>НОВИНИ</span></h1>
            <p class="hero-desc">Новини Прикарпаття голосом диктора. Слухайте по дорозі — без рук, без зупинок.</p>

            <div class="hero-row">
                <div class="auto-btn" id="radio-btn" onclick="toggleRadio()">
                    АВТОРАДІО <span class="auto-val" id="radio-status">ВИМК</span>
                </div>
                <button onclick="openFilters()" class="city-chip" id="city-label">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
                    ВСІ НОВИНИ
                </button>
            </div>
        </div>

        <!-- Main Player Stage -->
        <div class="stage">
            <div class="cover-box">
                <img id="p-art" src="" class="cover-img">
                <div id="p-badge" class="cover-badge">Новини</div>
            </div>

            <div class="stage-info">
                <h2 id="p-title" class="stage-title">Завантаження...</h2>
                <p id="p-date" class="stage-date">---</p>
            </div>

            <div class="wave-vis" id="wave-box">
                <!-- Bars via JS -->
            </div>

            <div class="p-main-track" onclick="seek(event)">
                <div class="p-main-fill" id="p-fill"></div>
            </div>
            <div class="p-main-labels">
                <span id="p-cur">0:00</span>
                <span id="p-dur">0:00</span>
            </div>

            <div class="p-main-controls">
                <button onclick="prevTrack()" class="p-side-btn">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                    </svg>
                </button>
                <button onclick="togglePlay()" class="p-circle">
                    <svg id="play-ico" width="32" height="32" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="pause-ico" class="hidden" width="32" height="32" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <button onclick="nextTrack()" class="p-side-btn">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
            </div>

            <div class="volume-box">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg>
                <div class="v-slider">
                    <div class="v-fill"></div>
                    <div class="v-knob"></div>
                </div>
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg>
            </div>

            <div class="act-footer">
                <a id="p-read" href="#" class="read-link">
                    ЧИТАТИ СТАТТЮ
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" />
                    </svg>
                </a>
                <button onclick="copyLink()" class="share-pill">
                    <svg class="inline-block mr-2" width="14" height="14" fill="none" stroke="currentColor"
                        stroke-width="3" viewBox="0 0 24 24">
                        <path
                            d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                    </svg>
                    ПОДІЛИТИСЯ
                </button>
            </div>
        </div>

        <!-- News Feed Container -->
        <div id="feed">
            <!-- Rendered by JS -->
        </div>

        <div class="h-40"></div>
    </main>

    <!-- Mini Player Bar -->
    <div id="mini" class="hidden" onclick="scrollToPlayer()">
        <div class="m-bar">
            <div class="m-fill" id="m-fill"></div>
        </div>
        <div class="m-content">
            <img id="m-img" src="" class="m-img">
            <div class="m-info">
                <p id="m-cat" class="m-cat">Новини</p>
                <h3 id="m-title" class="m-title">Завантаження...</h3>
            </div>
            <div class="m-btns">
                <button onclick="event.stopPropagation();nextTrack()" class="text-zinc-500">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
                <button onclick="event.stopPropagation();togglePlay()" class="text-white">
                    <svg id="m-play" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="m-pause" class="hidden" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Filter Drawer -->
    <div id="filter-drawer">
        <div class="drawer-overlay" onclick="closeFilters()"></div>
        <div class="drawer-sheet">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-outfit font-black">Канали</h2>
                <button onclick="closeFilters()"
                    class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest">Готово</button>
            </div>
            <div class="space-y-8 max-h-[60vh] overflow-y-auto">
                <div>
                    <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-4">РУБРИКИ</h3>
                    <div class="flex flex-wrap gap-2" id="cat-grid"></div>
                </div>
                <div>
                    <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-4">МІСТА</h3>
                    <div class="flex flex-wrap gap-2" id="city-grid"></div>
                </div>
            </div>
            <button onclick="setFilter('all',null,'ВСІ НОВИНИ')"
                class="w-full mt-8 py-4 bg-zinc-800 rounded-2xl text-[10px] font-black uppercase tracking-widest">Скинути
                все</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let all = [], tracks = [], currentIndex = -1, isPlaying = false, radio = false;
        let activeFilter = { type: 'all', val: null };
        const audio = new Audio();
        audio.volume = 0.95;

        // Init
        async function init() {
            await window.initSiteHeader(_supabase);
            const { data } = await _supabase.from('news')
                .select('id, title, slug, image_url, category, city, created_at, tts_audio_url')
                .eq('is_published', true).not('tts_audio_url', 'is', null)
                .order('created_at', { ascending: false }).limit(100);

            all = data || [];
            buildFilterUI();

            // Build Waveform
            const box = document.getElementById('wave-box');
            box.innerHTML = Array.from({ length: 40 }).map(() => `<div class="wave-bar" style="height:${Math.random() * 15 + 4}px"></div>`).join('');

            setFilter('all', null, 'ВСІ НОВИНИ');

            // Scroll listener for mini-player
            window.addEventListener('scroll', () => {
                const stage = document.querySelector('.stage');
                const rect = stage.getBoundingClientRect();
                document.getElementById('mini').classList.toggle('hidden', rect.bottom > 100);
            });
        }

        function buildFilterUI() {
            const cats = [...new Set(all.map(t => t.category))].filter(Boolean);
            const cities = [...new Set(all.map(t => t.city))].filter(Boolean);

            const btn = (type, val, label) => `<button onclick="setFilter('${type}','${val}','${label}')" class="px-4 py-2 rounded-xl bg-white/[0.04] text-xs font-bold border border-white/[0.04] transition-all">${label}</button>`;

            document.getElementById('cat-grid').innerHTML = cats.map(c => btn('cat', c, window.CATEGORIES_UK?.[c] || c)).join('');
            document.getElementById('city-grid').innerHTML = cities.map(c => btn('city', c, window.CITIES_UK?.[c] || c)).join('');
        }

        function setFilter(type, val, label) {
            activeFilter = { type, val };
            document.getElementById('city-label').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> ${label.toUpperCase()}`;

            tracks = type === 'all' ? all
                : type === 'cat' ? all.filter(t => t.category === val)
                    : all.filter(t => t.city === val);

            renderFeed();
            if (tracks.length > 0) loadTrack(0, false);
            closeFilters();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const groups = {};
            tracks.forEach(t => {
                const date = new Date(t.created_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                const today = new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                const key = date === today ? 'сьогодні' : date;
                if (!groups[key]) groups[key] = [];
                groups[key].push(t);
            });

            feed.innerHTML = Object.entries(groups).map(([date, items]) => `
                <div class="feed-header">
                    <span class="feed-label">${date}</span>
                    <span class="text-[10px] font-black text-zinc-600 tracking-widest">${items.length} НОВИН</span>
                </div>
                ${items.map(t => {
                const idx = tracks.findIndex(x => x.id === t.id);
                const isActive = idx === currentIndex;
                const isDone = (JSON.parse(localStorage.getItem('radio_done') || '[]')).includes(t.id);
                return `
                    <div class="item ${isActive ? 'active' : ''} ${isDone ? 'listened' : ''}" onclick="handleItemClick(${idx})">
                        <div class="item-thumb">
                            <img src="${t.image_url}" class="item-img" onerror="this.src='/favicon.ico';">
                            <div class="item-play">
                                ${isActive && isPlaying
                        ? `<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
                        : `<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`}
                            </div>
                        </div>
                        <div class="item-body">
                            <p class="item-cat">${window.CATEGORIES_UK?.[t.category] || t.category || ''}</p>
                            <h3 class="item-title">${t.title}</h3>
                            <div class="item-acts">
                                <button class="item-act" onclick="event.stopPropagation();share('${t.title}','${getLink(t)}')">
                                    <svg class="mr-1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                                    SHARE
                                </button>
                                <a href="${getLink(t)}" class="item-act" onclick="event.stopPropagation()">
                                    <svg class="mr-1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                    ЧИТАТИ
                                </a>
                            </div>
                        </div>
                    </div>`;
            }).join('')}
            `).join('');
        }

        // Logic
        function handleItemClick(idx) {
            if (currentIndex === idx) togglePlay();
            else loadTrack(idx, true);
        }

        function loadTrack(idx, play = true) {
            currentIndex = idx;
            const t = tracks[idx];
            if (!t) return;

            document.getElementById('p-art').src = t.image_url;
            document.getElementById('m-img').src = t.image_url;
            document.getElementById('p-title').textContent = t.title;
            document.getElementById('m-title').textContent = t.title;
            const cat = window.CATEGORIES_UK?.[t.category] || t.category || 'НОВИНИ';
            document.getElementById('p-badge').textContent = cat;
            document.getElementById('m-cat').textContent = cat;
            document.getElementById('p-date').textContent = new Date(t.created_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
            document.getElementById('p-read').href = getLink(t);

            audio.src = t.tts_audio_url;
            if (play) audio.play().then(() => setPlayState(true));
            else setPlayState(false);
            renderFeed();
        }

        function togglePlay() {
            if (audio.paused) audio.play().then(() => setPlayState(true));
            else { audio.pause(); setPlayState(false); }
        }

        function setPlayState(p) {
            isPlaying = p;
            document.getElementById('play-ico').classList.toggle('hidden', p);
            document.getElementById('pause-ico').classList.toggle('hidden', !p);
            document.getElementById('m-play').classList.toggle('hidden', p);
            document.getElementById('m-pause').classList.toggle('hidden', !p);
            document.getElementById('wave-box').classList.toggle('wave-active', p);
            renderFeed();
        }

        function nextTrack() { if (currentIndex < tracks.length - 1) loadTrack(currentIndex + 1, true); }
        function prevTrack() { if (currentIndex > 0) loadTrack(currentIndex - 1, true); }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration);
            document.getElementById('p-fill').style.width = (pct * 100) + '%';
            document.getElementById('m-fill').style.width = (pct * 100) + '%';
            document.getElementById('p-cur').textContent = fmt(audio.currentTime);
            document.getElementById('p-dur').textContent = fmt(audio.duration);

            if (pct > 0.95) {
                const list = JSON.parse(localStorage.getItem('radio_done') || '[]');
                if (!list.includes(tracks[currentIndex].id)) {
                    list.push(tracks[currentIndex].id);
                    localStorage.setItem('radio_done', JSON.stringify(list));
                }
            }
            if (isPlaying) {
                document.querySelectorAll('.wave-bar').forEach(b => b.style.height = (Math.random() * 28 + 4) + 'px');
            }
        });

        audio.addEventListener('ended', () => { if (radio || currentIndex < tracks.length - 1) nextTrack(); else setPlayState(false); });

        function seek(e) {
            const r = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - r.left) / r.width;
            if (audio.duration) audio.currentTime = pct * audio.duration;
        }

        function toggleRadio() {
            radio = !radio;
            document.getElementById('radio-btn').classList.toggle('active', radio);
            document.getElementById('radio-status').textContent = radio ? 'УВІМК' : 'ВИМК';
            if (radio && audio.paused) nextTrack();
        }

        function scrollToPlayer() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function openFilters() { document.getElementById('filter-drawer').classList.add('open'); }
        function closeFilters() { document.getElementById('filter-drawer').classList.remove('open'); }
        function getLink(t) { return t.city ? `/${t.city}/${t.slug}/` : t.category ? `/category/${t.category}/${t.slug}/` : `/${t.slug}/`; }
        function fmt(s) { const m = Math.floor(s / 60), r = Math.floor(s % 60); return `${m}:${r < 10 ? '0' : ''}${r}`; }
        function share(t, u) { if (navigator.share) navigator.share({ title: t, url: u }); else { navigator.clipboard.writeText(u); alert('Link copied'); } }
        function copyLink() { share(tracks[currentIndex]?.title, getLink(tracks[currentIndex])); }

        init();
    </script>
</body>

</html>
