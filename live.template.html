        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"

    <style>
        :root {
            --accent: #ff4d00;
            --accent-dark: #dc2610;
            --bg: #09090b;
            --card: #141417;
            --text-muted: #71717a;
        }

        /* Force Sans-Serif everywhere to prevent serif fallback */
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
            -webkit-tap-highlight-color: transparent;
        }

        h1,
        h2,
        h3,
        .font-outfit {
            font-family: 'Outfit', 'Inter', sans-serif !important;
        }

        html,
        body {
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            overscroll-behavior: none;
        }

        /* ── Scrollbar ────────────────────────────────────────── */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
        }

        /* ── Hero Section ─────────────────────────────────────── */
        .hero {
            padding: 48px 20px 32px;
            text-align: left;
            background: linear-gradient(to bottom, rgba(255, 77, 0, 0.06), transparent);
        }

        .hero-live {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 900;
            color: #ff4d00;
            margin-bottom: 16px;
            letter-spacing: 0.15em;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff4d00;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 900;
            font-family: 'Outfit';
            font-style: italic;
            line-height: 0.85;
            letter-spacing: -0.05em;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .hero-title span {
            color: var(--accent);
        }

        .hero-desc {
            font-size: 14px;
            font-weight: 500;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 90%;
        }

        .hero-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 100px;
            background: #111114;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #d4d4d8;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
        }

        .btn-pill.active {
            border-color: var(--accent);
            background: rgba(255, 77, 0, 0.05);
            color: #fff;
        }

        .btn-pill:active {
            scale: 0.95;
            background: rgba(255, 255, 255, 0.05);
        }

        .pill-val {
            color: #fff;
            font-weight: 900;
            margin-left: 2px;
        }

        .city-pill {
            background: rgba(59, 130, 246, 0.05);
            border: 1.5px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .city-pill:active {
            background: rgba(59, 130, 246, 0.15);
        }

        /* ── Player Stage ─────────────────────────────────────── */
        .stage {
            padding: 0 20px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cover-box {
            position: relative;
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1;
            margin-bottom: 32px;
            filter: drop-shadow(0 40px 60px rgba(0, 0, 0, 0.5));
        }

        .cover-img {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cover-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stage-info {
            text-align: center;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .stage-title {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 10px;
            font-family: 'Outfit';
            letter-spacing: -0.01em;
        }

        .stage-date {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: lowercase;
        }

        .wave-vis {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 32px;
            margin-bottom: 32px;
        }

        .wave-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 4px;
            transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .p-main-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            position: relative;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .p-main-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .p-main-labels {
            display: flex;
            justify-content: center;
            width: 100%;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }

        .p-main-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 32px 0;
        }

        .p-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 30px rgba(255, 77, 0, 0.35);
            transition: transform 0.2s;
        }

        .p-circle:active {
            transform: scale(0.92);
        }

        .p-side-btn {
            color: #fff;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .p-side-btn:active {
            opacity: 1;
            scale: 0.9;
        }

        .volume-box {
            width: 100%;
            max-width: 240px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
            opacity: 0.4;
        }

        .v-slider {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            position: relative;
        }

        .v-fill {
            height: 100%;
            background: #fff;
            width: 85%;
            border-radius: 4px;
        }

        .v-knob {
            position: absolute;
            right: 15%;
            top: -4.5px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .act-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
        }

        .read-link {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit';
        }

        .share-pill {
            padding: 14px 40px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.04);
            font-size: 10px;
            font-weight: 900;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border: 1.5px solid rgba(255, 255, 255, 0.05);
        }

        /* ── Timeline (Feed) ─────────────────────────────────── */
        .feed-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(9, 9, 11, 0.96);
            backdrop-filter: blur(20px);
            padding: 24px 20px 12px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 48px;
        }

        @media (min-width: 1024px) {
            .feed-header {
                top: 80px;
                margin-top: 0;
                padding: 16px 20px 12px;
                background: rgba(9, 9, 11, 0.85);
            }
        }

        .feed-label {
            font-size: 18px;
            font-weight: 900;
            font-family: 'Outfit';
            color: #fff;
            text-transform: lowercase;
        }

        .feed-count {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .item {
            display: flex;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            transition: background 0.2s;
            cursor: pointer;
        }

        @media (min-width: 1024px) {
            .item {
                border-radius: 16px;
                border-bottom: 1px solid transparent;
                margin-bottom: 4px;
            }

            .item:hover {
                background: rgba(255, 255, 255, 0.03);
            }

            .item.active {
                border-radius: 16px;
            }

            .item.active::before {
                border-top-left-radius: 16px;
                border-bottom-left-radius: 16px;
            }
        }

        .item.active {
            background: rgba(255, 77, 0, 0.05);
        }

        .item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
        }

        .item.listened {
            opacity: 0.4;
        }

        .item-thumb {
            position: relative;
            width: 88px;
            height: 88px;
            flex-shrink: 0;
            border-radius: 16px;
            overflow: hidden;
        }

        .item.active .item-thumb {
            border: 2px solid var(--accent);
        }

        .item-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #18181b;
        }

        .item-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .item:hover .item-play,
        .item.active .item-play {
            opacity: 1;
        }

        .item-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-cat {
            font-size: 10px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .item-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1.35;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }

        .item-acts {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .item-act {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 9px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* ── Mini Player ─────────────────────────────────────── */
        #mini {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(16, 16, 20, 0.98);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: env(safe-area-inset-bottom, 12px);
            transform: translateY(0);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        #mini.hidden {
            transform: translateY(100%);
        }

        .m-bar {
            height: 2.5px;
            background: rgba(255, 255, 255, 0.08);
            width: 100%;
            position: relative;
        }

        .m-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 0 4px 4px 0;
        }

        .m-content {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
        }

        .m-img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
        }

        .m-info {
            flex: 1;
            min-width: 0;
        }

        .m-cat {
            font-size: 9px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }

        .m-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .m-btns {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* ── Animations ─────────────────────────────────────── */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.15);
            }
        }

        .wave-active .wave-bar {
            animation: bar-anim 1s ease-in-out infinite;
        }

        @keyframes bar-anim {

            0%,
            100% {
                height: 6px;
            }

            50% {
                height: 32px;
            }
        }

        #filter-drawer {
            position: fixed;
            inset: 0;
            z-index: 500;
            visibility: hidden;
            transition: visibility 0.4s;
        }

        #filter-drawer.open {
            visibility: visible;
        }

        .drawer-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.4s;
        }

        #filter-drawer.open .drawer-overlay {
            opacity: 1;
        }

        .drawer-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #18181b;
            border-radius: 32px 32px 0 0;
            padding: 32px 24px 48px;
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.5);
        }

        #filter-drawer.open .drawer-sheet {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .drawer-close {
            font-size: 11px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div id="site-header-placeholder"></div>

    <main
        class="max-w-xl lg:max-w-6xl xl:max-w-[1300px] mx-auto lg:grid lg:grid-cols-[400px_1fr] xl:grid-cols-[460px_1fr] lg:gap-10 xl:gap-20 lg:px-6">
        <!-- Desktop Sticky Sidebar -->
        <div class="lg:sticky lg:top-[80px] lg:h-[calc(100vh-80px)] lg:overflow-y-auto lg:pb-12 flex flex-col hide-scrollbar"
            style="scrollbar-width: none;">
            <!-- Hero Section -->
            <div class="hero lg:pt-8 w-full">
                <div class="hero-live">
                    <div class="live-dot"></div>
                    LIVE • ЕФІР
                </div>
                <h1 class="hero-title">АУДІО-<span>НОВИНИ</span></h1>
                <p class="hero-desc">BUKVA NEWS — голосом диктора. Слухайте по дорозі — без рук, без зупинок.</p>

                <div class="hero-row">
                    <div class="btn-pill" id="radio-pill" onclick="toggleRadio()">
                        АВТОРАДІО <span class="pill-val" id="radio-status">ВИМК</span>
                    </div>
                    <button onclick="openFilters()" class="btn-pill city-pill" id="city-label">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
                        ВСІ НОВИНИ
                    </button>
                </div>
            </div>

            <!-- Main Player Stage -->
            <div class="stage">
                <div class="cover-box">
                    <img id="p-art" src="" class="cover-img" fetchpriority="high">
                    <div id="p-badge" class="cover-badge">НОВИНИ</div>
                </div>

                <div class="stage-info">
                    <h2 id="p-title" class="stage-title">Завантаження...</h2>
                    <p id="p-date" class="stage-date">---</p>
                </div>

                <div class="wave-vis" id="wave-box">
                    <!-- Bars via JS -->
                </div>

                <div class="p-main-track" onclick="seek(event)">
                    <div class="p-main-fill" id="p-fill"></div>
                </div>
                <div class="p-main-labels">
                    <span id="p-time">0:00 / 0:00</span>
                </div>

                <div class="p-main-controls">
                    <button onclick="prevTrack()" class="p-side-btn">
                        <svg width="34" height="34" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                        </svg>
                    </button>
                    <button onclick="togglePlay()" class="p-circle">
                        <svg id="play-ico" width="38" height="38" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg id="pause-ico" class="hidden" width="38" height="38" fill="currentColor"
                            viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>
                    <button onclick="nextTrack()" class="p-side-btn">
                        <svg width="34" height="34" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                        </svg>
                    </button>
                </div>

                <div class="volume-box">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    <div class="v-slider">
                        <div class="v-fill"></div>
                        <div class="v-knob"></div>
                    </div>
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                </div>

                <div class="act-footer">
                    <a id="p-read" href="#" class="read-link">
                        ЧИТАТИ СТАТТЮ
                        <svg class="ml-1" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3"
                            viewBox="0 0 24 24">
                            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" />
                        </svg>
                    </a>
                    <button onclick="copyLink()" class="share-pill">
                        <svg class="inline-block mr-2" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z" />
                        </svg>
                        ПОДІЛИТИСЯ
                    </button>
                </div>
            </div>
        </div> <!-- End of Desktop Sticky Sidebar -->

        <!-- Right Column: News Feed Container -->
        <div class="lg:pt-6 lg:pb-24 min-w-0 lg:pl-6 xl:pl-8">
            <div id="feed">
                <!-- Rendered by JS -->
            </div>
        </div> <!-- End of Right Column -->

        <div class="h-48 lg:hidden"></div>
    </main>

    <!-- Mini Player Bar -->
    <div id="mini" class="hidden" onclick="scrollToPlayer()">
        <div class="m-bar">
            <div class="m-fill" id="m-fill"></div>
        </div>
        <div class="m-content">
            <img id="m-img" src="" class="m-img">
            <div class="m-info">
                <p id="m-cat" class="m-cat">Новини</p>
                <h3 id="m-title" class="m-title">Завантаження...</h3>
            </div>
            <div class="m-btns">
                <button onclick="event.stopPropagation();nextTrack()" class="text-zinc-500">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
                <button onclick="event.stopPropagation();togglePlay()" class="text-white">
                    <svg id="m-play" width="30" height="30" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="m-pause" class="hidden" width="30" height="30" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="site-footer-placeholder"></div>
    <script src="/components/footer.js"></script>

    <!-- Filter Drawer -->
    <div id="filter-drawer">
        <div class="drawer-overlay" onclick="closeFilters()"></div>
        <div class="drawer-sheet">
            <div class="drawer-header">
                <h2 class="text-2xl font-outfit font-black uppercase tracking-tight">Канали</h2>
                <button onclick="closeFilters()" class="drawer-close">Закрити</button>
            </div>
            <div class="space-y-10 max-h-[60vh] overflow-y-auto">
                <div>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">РУБРИКИ</h3>
                    <div class="flex flex-wrap gap-2.5" id="cat-grid"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">МІСТА</h3>
                    <div class="flex flex-wrap gap-2.5" id="city-grid"></div>
                </div>
            </div>
            <button onclick="setFilter('all',null,'ВСІ НОВИНИ')"
                class="w-full mt-10 py-4.5 bg-zinc-800 rounded-2xl text-[11px] font-black uppercase tracking-[0.2em]">Скинути
                все</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
        let _supabase;

        let all = [], tracks = [], currentIndex = -1, isPlaying = false, radio = false;
        let activeFilter = { type: 'all', val: null };
        const audio = new Audio();
        audio.volume = 0.95;

        // Init
        async function init() {
            await window.initSiteHeader(_supabase);
            window.initSiteFooter(_supabase);
            const { data } = await _supabase.from('news')
                .select('id, title, slug, image_url, category, city, created_at, tts_audio_url')
                .eq('is_published', true).not('tts_audio_url', 'is', null)
                .order('created_at', { ascending: false }).limit(100);

            all = data || [];
            buildFilterUI();

            // Build Waveform
            const box = document.getElementById('wave-box');
            box.innerHTML = Array.from({ length: 42 }).map(() => `<div class="wave-bar" style="height:${Math.random() * 15 + 4}px"></div>`).join('');

            setFilter('all', null, 'ВСІ НОВИНИ');

            // --- ADDED SUPPORT FOR SHAREABLE LINKS ---
            const urlParams = new URLSearchParams(window.location.search);
            const trackId = urlParams.get('track');
            if (trackId) {
                const origIdx = all.findIndex(t => t.id == trackId);
                if (origIdx !== -1) {
                    setTimeout(() => {
                        loadTrack(origIdx, true);
                        const items = document.querySelectorAll('.item');
                        if (items[origIdx]) {
                            items[origIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 300);
                }
            }

            // Scroll listener for mini-player
            window.addEventListener('scroll', () => {
                const stage = document.querySelector('.stage');
                if (!stage) return;
                const rect = stage.getBoundingClientRect();
                document.getElementById('mini').classList.toggle('hidden', rect.bottom > 100);
            }, { passive: true });
        }

        function buildFilterUI() {
            const cats = [...new Set(all.map(t => t.category))].filter(Boolean);
            const cities = [...new Set(all.map(t => t.city))].filter(Boolean);

            const btn = (type, val, label) => `<button onclick="setFilter('${type}','${val}','${label}')" class="px-5 py-2.5 rounded-xl bg-white/[0.04] text-xs font-bold border border-white/[0.04] transition-all hover:bg-white/[0.08]">${label}</button>`;

            document.getElementById('cat-grid').innerHTML = cats.map(c => btn('cat', c, window.CATEGORIES_UK?.[c] || c)).join('');
            document.getElementById('city-grid').innerHTML = cities.map(c => btn('city', c, window.CITIES_UK?.[c] || c)).join('');
        }

        function setFilter(type, val, label) {
            activeFilter = { type, val };
            document.getElementById('city-label').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> ${label.toUpperCase()}`;

            tracks = type === 'all' ? all
                : type === 'cat' ? all.filter(t => t.category === val)
                    : all.filter(t => t.city === val);

            renderFeed();
            if (tracks.length > 0) loadTrack(0, false);
            closeFilters();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const groups = {};
            tracks.forEach(t => {
                const date = new Date(t.created_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                const today = new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                const key = date === today ? 'сьогодні' : date;
                if (!groups[key]) groups[key] = [];
                groups[key].push(t);
            });

            feed.innerHTML = Object.entries(groups).map(([date, items]) => `
                <div class="feed-header">
                    <span class="feed-label">${date}</span>
                    <span class="feed-count">${items.length} НОВИН</span>
                </div>
                ${items.map(t => {
                const idx = tracks.findIndex(x => x.id === t.id);
                const isActive = idx === currentIndex;
                const isDone = (JSON.parse(localStorage.getItem('radio_done') || '[]')).includes(t.id);
                return `
                    <div class="item ${isActive ? 'active' : ''} ${isDone ? 'listened' : ''}" onclick="handleItemClick(${idx})">
                        <div class="item-thumb shadow-xl">
                            <img src="${t.image_url}" class="item-img" onerror="this.src='/favicon.ico';">
                            <div class="item-play">
                                ${isActive && isPlaying
                        ? `<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
                        : `<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`}
                            </div>
                        </div>
                        <div class="item-body">
                            <p class="item-cat">${window.CATEGORIES_UK?.[t.category] || t.category || ''}</p>
                            <h3 class="item-title">${t.title}</h3>
                            <div class="item-acts">
                                <button class="item-act" onclick="event.stopPropagation();share('${t.title}','${getShareLink(t)}')">
                                    <svg class="mr-1" width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                                    ПОДІЛИТИСЯ
                                </button>
                                <a href="${getLink(t)}" class="item-act" onclick="event.stopPropagation()">
                                    <svg class="mr-1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                    ЧИТАТИ
                                </a>
                            </div>
                        </div>
                    </div>`;
            }).join('')}
            `).join('');
        }

        // Logic
        function handleItemClick(idx) {
            if (currentIndex === idx) togglePlay();
            else loadTrack(idx, true);
        }

        function loadTrack(idx, play = true) {
            currentIndex = idx;
            const t = tracks[idx];
            if (!t) return;

            document.getElementById('p-art').src = t.image_url;
            document.getElementById('m-img').src = t.image_url;
            document.getElementById('p-title').textContent = t.title;
            document.getElementById('m-title').textContent = t.title;
            const cat = window.CATEGORIES_UK?.[t.category] || t.category || 'НОВИНИ';
            document.getElementById('p-badge').textContent = cat.toUpperCase();
            document.getElementById('m-cat').textContent = cat;
            document.getElementById('p-date').textContent = new Date(t.created_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
            document.getElementById('p-read').href = getLink(t);

            audio.src = t.tts_audio_url;
            if (play) audio.play().then(() => setPlayState(true)).catch(err => console.log('Autoplay blocked'));
            else setPlayState(false);
            renderFeed();
        }

        function togglePlay() {
            if (audio.paused) audio.play().then(() => setPlayState(true));
            else { audio.pause(); setPlayState(false); }
        }

        function setPlayState(p) {
            isPlaying = p;
            document.getElementById('play-ico').classList.toggle('hidden', p);
            document.getElementById('pause-ico').classList.toggle('hidden', !p);
            document.getElementById('m-play').classList.toggle('hidden', p);
            document.getElementById('m-pause').classList.toggle('hidden', !p);
            document.getElementById('wave-box').classList.toggle('wave-active', p);
            renderFeed();

            // Voice Analytics Tracking
            if (window.BukvaAnalytics) {
                if (p && tracks[currentIndex]) {
                    window.BukvaAnalytics.startVoiceTracking(tracks[currentIndex].id, _supabase, audio);
                } else {
                    window.BukvaAnalytics.stopVoiceTracking(false, _supabase);
                }
            }
        }

        function nextTrack() { if (currentIndex < tracks.length - 1) loadTrack(currentIndex + 1, true); }
        function prevTrack() { if (currentIndex > 0) loadTrack(currentIndex - 1, true); }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration || isNaN(audio.duration)) return;
            const pct = (audio.currentTime / audio.duration);
            document.getElementById('p-fill').style.width = (pct * 100) + '%';
            document.getElementById('m-fill').style.width = (pct * 100) + '%';

            // YouTube Music style time display with explicit spacer
            document.getElementById('p-time').textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);

            if (pct > 0.95) {
                const list = JSON.parse(localStorage.getItem('radio_done') || '[]');
                if (!list.includes(tracks[currentIndex].id)) {
                    list.push(tracks[currentIndex].id);
                    localStorage.setItem('radio_done', JSON.stringify(list));
                }
            }
            if (isPlaying) {
                document.querySelectorAll('.wave-bar').forEach(b => b.style.height = (Math.random() * 26 + 6) + 'px');
            }
        });

        audio.addEventListener('ended', () => { if (radio || currentIndex < tracks.length - 1) nextTrack(); else setPlayState(false); });

        function seek(e) {
            const r = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - r.left) / r.width;
            if (audio.duration && !isNaN(audio.duration)) audio.currentTime = pct * audio.duration;
        }

        function toggleRadio() {
            radio = !radio;
            document.getElementById('radio-pill').classList.toggle('active', radio);
            document.getElementById('radio-status').textContent = radio ? 'УВІМК' : 'ВИМК';
            if (radio && audio.paused) nextTrack();
        }

        function scrollToPlayer() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function openFilters() { document.getElementById('filter-drawer').classList.add('open'); }
        function closeFilters() { document.getElementById('filter-drawer').classList.remove('open'); }
        function getLink(t) { return t.city ? `/novyny/${t.city}/${t.slug}/` : t.category ? `/category/${t.category}/${t.slug}/` : `/${t.slug}/`; }
        function getShareLink(t) { return window.location.origin + window.location.pathname + '?track=' + t.id; }
        function fmt(s) {
            if (isNaN(s) || s < 0) return "0:00";
            const totalSeconds = Math.floor(s);
            const m = Math.floor(totalSeconds / 60);
            const r = totalSeconds % 60;
            return `${m}:${r < 10 ? '0' : ''}${r}`;
        }
        function share(t, u) { if (navigator.share) navigator.share({ title: t, url: u }); else { navigator.clipboard.writeText(u); alert('Посилання скопійовано'); } }
        function copyLink() { share(tracks[currentIndex]?.title, getShareLink(tracks[currentIndex])); }

        document.addEventListener('DOMContentLoaded', () => {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            init();
        });
    </script>
    <script defer src="/components/analytics.js"></script>
</body>

</html>
