    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            letter-spacing: -0.015em;
        }

        .bg-pulse {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(234, 88, 12, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            pointer-events: none;
            transition: background 1s ease;
        }

        .bg-pulse.playing {
            animation: bg-breathe 3s ease-in-out infinite;
        }

        @keyframes bg-breathe {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.5
            }
        }

        /* Filter chips */
        .filter-scroll {
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.55);
            transition: all 0.2s ease;
            user-select: none;
        }

        .chip:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .chip.active {
            background: rgba(234, 88, 12, 0.2);
            border-color: rgba(234, 88, 12, 0.5);
            color: #f97316;
            box-shadow: 0 0 16px rgba(234, 88, 12, 0.2);
        }

        .chip.active.city-chip {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
            color: #818cf8;
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.2);
        }

        /* Cover */
        .cover-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 2rem;
            object-fit: cover;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.6s cubic-bezier(.4, 0, .2, 1), box-shadow 0.6s ease;
        }

        .cover-art.playing {
            transform: scale(1.03);
            box-shadow: 0 60px 120px rgba(234, 88, 12, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
            animation: cover-float 6s ease-in-out infinite;
        }

        @keyframes cover-float {

            0%,
            100% {
                transform: scale(1.03) translateY(0)
            }

            50% {
                transform: scale(1.03) translateY(-8px)
            }
        }

        .vinyl-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 3px solid rgba(234, 88, 12, 0.4);
            border-top-color: rgba(234, 88, 12, 0.9);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .playing .vinyl-ring {
            opacity: 1;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* Progress */
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ea580c, #f97316);
            border-radius: 4px;
            transition: width 0.3s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(234, 88, 12, 0.8);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        /* Waveform */
        .wave-bars {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 32px;
        }

        .wave-bar {
            width: 3px;
            border-radius: 2px;
            background: rgba(234, 88, 12, 0.5);
            transform-origin: bottom;
        }

        .playing .wave-bar {
            animation: wave 1.2s ease-in-out infinite;
            background: #ea580c;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.3)
            }

            50% {
                transform: scaleY(1)
            }
        }

        /* Playlist */
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .playlist-item.active {
            background: rgba(234, 88, 12, 0.12);
            border-color: rgba(234, 88, 12, 0.25);
        }

        .playlist-thumb {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Controls */
        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            color: white;
        }

        .ctrl-btn:hover {
            transform: scale(1.1);
            color: #f97316;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn-main {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #ea580c, #dc2626);
            box-shadow: 0 8px 32px rgba(234, 88, 12, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .ctrl-btn-main:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(234, 88, 12, 0.6);
            color: white;
        }

        /* Radio mode button */
        .radio-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .radio-btn.on {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
        }

        .radio-btn.off {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
        }

        /* Volume */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            outline: none;
            width: 100%;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ea580c;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(234, 88, 12, 0.6);
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0
            }

            100% {
                background-position: 200% 0
            }
        }

        /* Channel badge */
        .channel-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
    </style>
</head>

        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTracks = [];     // Full unfiltered set
        let tracks = [];        // Currently filtered set
        let currentIndex = 0;
        let audio = new Audio();
        let isPlaying = false;
        let radioMode = false;

        // Filter state
        let activeFilterType = 'all'; // 'all' | 'category' | 'city'
        let activeFilterValue = null;  // slug or null

        audio.volume = 0.85;

        // Waveform
        const waveContainer = document.getElementById('wave-container');
        const heights = [20, 40, 60, 80, 100, 80, 60, 40, 30, 50, 70, 90, 70, 50, 30, 45, 65, 85, 65, 45, 35, 55, 75, 55, 35, 25, 45, 25];
        for (let i = 0; i < 28; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            bar.style.height = `${heights[i] || 40}%`;
            bar.style.animationDelay = `${i * 0.06}s`;
            waveContainer.appendChild(bar);
        }

        // ─── Filter Logic ───────────────────────────────────────────────
        function setFilter(type, value) {
            activeFilterType = type;
            activeFilterValue = value;

            // Update chip UI
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            const id = type === 'all' ? 'chip-all' : `chip-${type}-${value}`;
            const el = document.getElementById(id);
            if (el) el.classList.add('active');

            // Update channel badge
            const badge = document.getElementById('channel-badge');
            if (type === 'all') {
                badge.textContent = '';
                badge.innerHTML = `<span class="flex h-1.5 w-1.5 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span></span> Всі новини`;
                badge.className = 'channel-badge bg-orange-500/10 border border-orange-500/20 text-orange-400';
            } else if (type === 'category') {
                const name = (window.CATEGORIES_UK && window.CATEGORIES_UK[value]) || value;
                badge.innerHTML = `<span class="flex h-1.5 w-1.5 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span></span> Рубрика: ${name}`;
                badge.className = 'channel-badge bg-orange-500/10 border border-orange-500/20 text-orange-400';
            } else if (type === 'city') {
                const name = (window.CITIES_UK && window.CITIES_UK[value]) || value;
                badge.innerHTML = `<span class="flex h-1.5 w-1.5 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span></span> ${name}`;
                badge.className = 'channel-badge bg-indigo-500/10 border border-indigo-500/20 text-indigo-400';
            }

            // Filter tracks
            if (type === 'all') {
                tracks = allTracks;
            } else if (type === 'category') {
                tracks = allTracks.filter(t => t.category === value);
            } else if (type === 'city') {
                tracks = allTracks.filter(t => t.city === value);
            }

            currentIndex = 0;

            if (tracks.length === 0) {
                document.getElementById('player-ui').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('player-ui').classList.remove('hidden');
                document.getElementById('playlist-count').textContent = `${tracks.length} аудіо`;
                loadTrack(0, false);
                renderPlaylist();
            }
        }

        function renderFilterChips(categories, cities) {
            const catContainer = document.getElementById('category-chips');
            const cityContainer = document.getElementById('city-chips');

            // Category chips (append after "Всі")
            categories.forEach(c => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.id = `chip-category-${c.slug}`;
                chip.innerHTML = c.name;
                chip.onclick = () => setFilter('category', c.slug);
                catContainer.appendChild(chip);
            });

            // City chips
            cities.forEach(c => {
                const chip = document.createElement('div');
                chip.className = 'chip city-chip';
                chip.id = `chip-city-${c.slug}`;
                chip.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>${c.name}`;
                chip.onclick = () => setFilter('city', c.slug);
                cityContainer.appendChild(chip);
            });
        }

        // ─── Load all tracks ─────────────────────────────────────────────
        async function loadTracks() {
            const { data, error } = await _supabase
                .from('news')
                .select('id, title, slug, image_url, category, city, created_at, tts_audio_url')
                .eq('is_published', true)
                .not('tts_audio_url', 'is', null)
                .order('created_at', { ascending: false })
                .limit(100);

            document.getElementById('loading-state').classList.add('hidden');

            if (error || !data || data.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            allTracks = data;
            tracks = data;

            document.getElementById('player-ui').classList.remove('hidden');
            document.getElementById('playlist-count').textContent = `${tracks.length} аудіо`;

            renderPlaylist();

            // Deep linking
            const urlParams = new URLSearchParams(window.location.search);
            const initialId = window.__PRELOADED_TRACK_ID__ || urlParams.get('id');
            let initialIndex = 0;
            if (initialId) {
                const idx = tracks.findIndex(t => t.id === initialId);
                if (idx !== -1) initialIndex = idx;
            }
            loadTrack(initialIndex, !!initialId);
        }

        // ─── Helpers ─────────────────────────────────────────────────────
        function getCategoryName(cat) {
            return (window.CATEGORIES_UK && window.CATEGORIES_UK[cat]) || cat || 'Новини';
        }
        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
        }
        function getArticleLink(t) {
            if (t.city && window.CITIES_UK && window.CITIES_UK[t.city]) return `/${t.city}/${t.slug}/`;
            if (t.category) return `/category/${t.category}/${t.slug}/`;
            return `/${t.slug}/`;
        }
        function getListenedTracks() {
            try { return JSON.parse(localStorage.getItem('news_listened_tracks') || '[]'); }
            catch (e) { return []; }
        }
        function markTrackAsListened(id) {
            const listened = getListenedTracks();
            if (!listened.includes(id)) {
                listened.unshift(id);
                localStorage.setItem('news_listened_tracks', JSON.stringify(listened.slice(0, 100)));
            }
        }

        // ─── Render Playlist ─────────────────────────────────────────────
        function renderPlaylist() {
            const container = document.getElementById('playlist');
            const listened = getListenedTracks();

            const groups = {};
            tracks.forEach((t, i) => {
                const date = new Date(t.created_at);
                const today = new Date();
                const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
                let g = date.toDateString() === today.toDateString() ? 'Сьогодні'
                    : date.toDateString() === yesterday.toDateString() ? 'Вчора'
                        : date.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                if (!groups[g]) groups[g] = [];
                groups[g].push({ track: t, index: i });
            });

            container.innerHTML = Object.entries(groups).map(([label, items]) => `
                <div class="py-4 px-4 sticky top-0 bg-[#0a0e1a]/95 backdrop-blur-sm z-20">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-3">
                        ${label}<span class="h-px flex-1 bg-white/5"></span>
                    </h3>
                </div>
                ${items.map(({ track: t, index: i }) => {
                const isListened = listened.includes(t.id);
                return `
                    <div class="playlist-item ${i === currentIndex ? 'active' : ''} ${isListened ? 'opacity-60' : ''}" onclick="loadTrack(${i},true)" id="pi-${i}">
                        <div class="relative flex-shrink-0">
                            <img src="${t.image_url || ''}" alt="" class="playlist-thumb" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect fill=%22%231e293b%22 width=%2252%22 height=%2252%22 rx=%2212%22/><text fill=%22%23ea580c%22 font-size=%2222%22 x=%2213%22 y=%2234%22>🎙</text></svg>'">
                            ${isListened ? `<div class="absolute -top-1 -right-1 bg-green-500 text-white p-0.5 rounded-full shadow-lg border-2 border-[#0a0e1a]"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>` : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">${getCategoryName(t.category)}</p>
                            <h4 class="text-sm font-bold text-white leading-snug line-clamp-2">${t.title}</h4>
                            <p class="text-xs text-slate-500 mt-1 font-medium">${formatDate(t.created_at)}</p>
                        </div>
                        <div class="flex-shrink-0">
                            ${i === currentIndex && isPlaying
                        ? `<div class="flex items-end gap-0.5 h-5">
                                    <span class="w-1 bg-orange-500 rounded-full animate-bounce" style="height:60%;animation-delay:0s"></span>
                                    <span class="w-1 bg-orange-500 rounded-full animate-bounce" style="height:100%;animation-delay:0.15s"></span>
                                    <span class="w-1 bg-orange-500 rounded-full animate-bounce" style="height:40%;animation-delay:0.3s"></span>
                                </div>`
                        : `<svg class="w-4 h-4 text-slate-600" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`
                    }
                        </div>
                    </div>`;
            }).join('')}
            `).join('');
        }

        // ─── Track Loading ────────────────────────────────────────────────
        function loadTrack(index, andPlay = true) {
            if (index < 0 || index >= tracks.length) return;
            currentIndex = index;
            const track = tracks[index];

            const coverImg = document.getElementById('cover-img');
            coverImg.src = track.image_url || '';
            coverImg.onerror = () => { coverImg.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="%230f172a" width="400" height="400" rx="32"/><text fill="%23ea580c" font-size="120" x="120" y="250">🎙</text></svg>'; };

            document.getElementById('cover-category').textContent = getCategoryName(track.category);
            document.getElementById('track-title').textContent = track.title;
            document.getElementById('track-date').textContent = formatDate(track.created_at);
            document.getElementById('track-link').href = getArticleLink(track);
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('time-current').textContent = '0:00';
            document.getElementById('time-total').textContent = '0:00';

            audio.pause();
            audio.src = track.tts_audio_url;
            audio.load();

            if (andPlay) {
                audio.play().then(() => {
                    setPlayState(true);
                    markTrackAsListened(track.id);
                }).catch(console.error);
            } else {
                setPlayState(false);
            }

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('id', track.id);
            window.history.replaceState({}, '', url);

            renderPlaylist();
            setTimeout(() => {
                const el = document.getElementById(`pi-${index}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // ─── Playback State ───────────────────────────────────────────────
        function setPlayState(playing) {
            isPlaying = playing;
            document.getElementById('play-icon').classList.toggle('hidden', playing);
            document.getElementById('pause-icon').classList.toggle('hidden', !playing);
            document.getElementById('cover-img').classList.toggle('playing', playing);
            document.getElementById('vinyl-ring').classList.toggle('playing', playing);
            document.getElementById('wave-container').classList.toggle('playing', playing);
            document.getElementById('bg-gradient').classList.toggle('playing', playing);
            renderPlaylist();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play().then(() => setPlayState(true)).catch(console.error);
            } else {
                audio.pause();
                setPlayState(false);
            }
        }

        function prevTrack() { loadTrack((currentIndex - 1 + tracks.length) % tracks.length, true); }
        function nextTrack() { loadTrack((currentIndex + 1) % tracks.length, true); }
        function setVolume(val) { audio.volume = parseFloat(val); }

        // ─── Radio Mode ───────────────────────────────────────────────────
        function toggleRadioMode() {
            radioMode = !radioMode;
            const btn = document.getElementById('radio-mode-btn');
            const label = document.getElementById('radio-label');
            if (radioMode) {
                btn.className = 'radio-btn on';
                label.textContent = 'УВІМК';
                // Start playing if not already
                if (audio.paused && tracks.length > 0) {
                    loadTrack(currentIndex, true);
                }
            } else {
                btn.className = 'radio-btn off';
                label.textContent = 'ВИМК';
            }
        }

        // Auto-next on track end
        audio.addEventListener('ended', () => {
            const next = (currentIndex + 1) % tracks.length;
            if (radioMode || next !== 0) {
                loadTrack(next, true);
            } else {
                setPlayState(false);
            }
        });

        // Progress update
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = `${pct}%`;
            document.getElementById('time-current').textContent = formatTime(audio.currentTime);
            document.getElementById('time-total').textContent = formatTime(audio.duration);
        });

        // Seek on click
        document.getElementById('progress-bar').addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
            if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 10);
            if (e.code === 'ArrowUp') { audio.volume = Math.min(1, audio.volume + 0.1); document.getElementById('volume-slider').value = audio.volume; }
            if (e.code === 'ArrowDown') { audio.volume = Math.max(0, audio.volume - 0.1); document.getElementById('volume-slider').value = audio.volume; }
            if (e.code === 'KeyN') nextTrack();
            if (e.code === 'KeyP') prevTrack();
        });

        // Share
        async function copyShareLink() {
            const btn = document.getElementById('share-btn');
            const orig = btn.innerHTML;
            try {
                await navigator.clipboard.writeText(window.location.href);
                btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> Скопійовано!`;
                btn.classList.add('text-green-500');
            } catch (err) { alert('Не вдалося скопіювати'); }
            setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('text-green-500'); }, 2000);
        }

        // ─── Init ─────────────────────────────────────────────────────────
        (async () => {
            const header = await window.initSiteHeader(_supabase);

            // Build filter chips from same data
            try {
                const [catRes, cityRes] = await Promise.all([
                    _supabase.from('categories').select('slug,name').order('order_index', { ascending: true }),
                    _supabase.from('cities').select('slug,name').order('order_index', { ascending: true })
                ]);
                if (catRes.data && cityRes.data) {
                    renderFilterChips(catRes.data, cityRes.data);
                }
            } catch (e) { console.warn('Filter chips load failed:', e); }

            await loadTracks();
        })();
    </script>
</body>

</html>
