<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE • Ефір — Прикарпаття News</title>
    <meta name="description"
        content="Слухайте останні новини Прикарпаття у форматі аудіо-подкасту. Оцифровані новини голосом диктора — зручно, швидко, в дорозі.">
    <link rel="canonical" href="https://ifnews-omega.vercel.app/live/">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/components/header.css">
    <script src="/components/header.js"></script>

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            letter-spacing: -0.015em;
        }

        /* Animated background gradient */
        .bg-pulse {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(234, 88, 12, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .bg-pulse.playing {
            animation: bg-breathe 3s ease-in-out infinite;
        }

        @keyframes bg-breathe {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Cover art */
        .cover-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 2rem;
            object-fit: cover;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.6s cubic-bezier(.4, 0, .2, 1), box-shadow 0.6s ease;
        }

        .cover-art.playing {
            transform: scale(1.03);
            box-shadow: 0 60px 120px rgba(234, 88, 12, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
            animation: cover-float 6s ease-in-out infinite;
        }

        @keyframes cover-float {

            0%,
            100% {
                transform: scale(1.03) translateY(0);
            }

            50% {
                transform: scale(1.03) translateY(-8px);
            }
        }

        /* Spinning vinyl overlay */
        .vinyl-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 3px solid rgba(234, 88, 12, 0.4);
            border-top-color: rgba(234, 88, 12, 0.9);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .playing .vinyl-ring {
            opacity: 1;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Progress bar */
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ea580c, #f97316);
            border-radius: 4px;
            transition: width 0.3s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(234, 88, 12, 0.8);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        /* Waveform visualizer */
        .wave-bars {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 32px;
        }

        .wave-bar {
            width: 3px;
            border-radius: 2px;
            background: rgba(234, 88, 12, 0.5);
            transform-origin: bottom;
        }

        .playing .wave-bar {
            animation: wave 1.2s ease-in-out infinite;
            background: #ea580c;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.3);
            }

            50% {
                transform: scaleY(1);
            }
        }

        /* Playlist item */
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .playlist-item.active {
            background: rgba(234, 88, 12, 0.12);
            border-color: rgba(234, 88, 12, 0.25);
        }

        .playlist-thumb {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Control buttons */
        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            color: white;
        }

        .ctrl-btn:hover {
            transform: scale(1.1);
            color: #f97316;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn-main {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #ea580c, #dc2626);
            box-shadow: 0 8px 32px rgba(234, 88, 12, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .ctrl-btn-main:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(234, 88, 12, 0.6);
            color: white;
        }

        /* Volume slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            outline: none;
            width: 100%;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ea580c;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(234, 88, 12, 0.6);
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body class="bg-[#0a0e1a]">
    <div class="bg-pulse" id="bg-gradient"></div>

    <!-- Header -->
    <div id="site-header-placeholder" class="relative z-10"></div>

    <main class="relative z-10 container mx-auto px-4 py-8 md:py-16 max-w-7xl">

        <!-- Page title -->
        <div class="mb-10 md:mb-16 flex items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="flex h-3 w-3 relative">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
                </span>
                <span class="text-xs font-black text-red-500 uppercase tracking-[0.3em]">Live • Ефір</span>
            </div>
            <div class="h-px flex-1 bg-white/5"></div>
        </div>

        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-white mb-3 italic">
            Подкаст<span class="text-orange-500">-центр</span>
        </h1>
        <p class="text-slate-400 font-medium mb-10 md:mb-16 max-w-lg">Новини Прикарпаття, озвучені голосом диктора.
            Слухайте по дорозі — без рук, без зупинок.</p>

        <!-- Loading state -->
        <div id="loading-state" class="grid grid-cols-1 lg:grid-cols-5 gap-8 lg:gap-16">
            <div class="lg:col-span-2 skeleton rounded-[2rem] aspect-square"></div>
            <div class="lg:col-span-3 space-y-4">
                <div class="skeleton h-8 rounded-xl w-3/4"></div>
                <div class="skeleton h-5 rounded-xl w-1/2"></div>
                <div class="skeleton h-16 rounded-2xl mt-8"></div>
                <div class="space-y-3 mt-8">
                    <div class="skeleton h-16 rounded-2xl"></div>
                    <div class="skeleton h-16 rounded-2xl"></div>
                    <div class="skeleton h-16 rounded-2xl"></div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="hidden text-center py-24">
            <div class="text-6xl mb-6">🎙️</div>
            <h2 class="text-2xl font-black text-white mb-3">Поки що тихо</h2>
            <p class="text-slate-400">Ще жодна новина не була озвучена. Спробуйте пізніше.</p>
        </div>

        <!-- Player UI -->
        <div id="player-ui" class="hidden grid grid-cols-1 lg:grid-cols-5 gap-8 lg:gap-16">

            <!-- Left: Cover + Controls -->
            <div class="lg:col-span-2 flex flex-col items-center">

                <!-- Cover art with vinyl ring -->
                <div class="relative w-full max-w-xs mx-auto mb-8" id="cover-wrapper">
                    <div class="vinyl-ring" id="vinyl-ring"></div>
                    <img id="cover-img" src="" alt="Обкладинка" class="cover-art">
                    <div
                        class="absolute inset-0 rounded-[2rem] bg-gradient-to-t from-black/60 via-transparent to-transparent">
                    </div>
                    <!-- Category badge -->
                    <div class="absolute top-4 left-4">
                        <span id="cover-category"
                            class="px-3 py-1 bg-orange-600/90 backdrop-blur-sm text-white text-[10px] font-black uppercase tracking-widest rounded-full"></span>
                    </div>
                </div>

                <!-- Track info -->
                <div class="text-center w-full mb-6 px-4">
                    <h2 id="track-title"
                        class="text-xl md:text-2xl font-black text-white leading-tight mb-2 line-clamp-2"></h2>
                    <p id="track-date" class="text-sm text-slate-400 font-medium"></p>
                </div>

                <!-- Waveform -->
                <div class="wave-bars mb-6" id="wave-container">
                    <!-- bars injected by JS -->
                </div>

                <!-- Progress bar -->
                <div class="w-full px-2 mb-4">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between mt-2 text-xs font-bold text-slate-500">
                        <span id="time-current">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center gap-4 mb-8">
                    <button class="ctrl-btn p-3 text-slate-300" onclick="prevTrack()" title="Попередня">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                        </svg>
                    </button>

                    <button class="ctrl-btn ctrl-btn-main" id="play-btn" onclick="togglePlay()">
                        <svg id="play-icon" class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg id="pause-icon" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>

                    <button class="ctrl-btn p-3 text-slate-300" onclick="nextTrack()" title="Наступна">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                        </svg>
                    </button>
                </div>

                <!-- Volume -->
                <div class="flex items-center gap-3 w-full px-4">
                    <svg class="w-4 h-4 text-slate-500 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.02" value="0.85"
                        oninput="setVolume(this.value)">
                    <svg class="w-5 h-5 text-slate-400 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                </div>

                <!-- Link to article -->
                <a id="track-link" href="#" target="_blank"
                    class="mt-6 flex items-center gap-2 text-xs font-black text-slate-400 hover:text-orange-400 transition-colors uppercase tracking-wider">
                    Читати статтю
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                </a>
            </div>

            <!-- Right: Playlist -->
            <div class="lg:col-span-3">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">Плейлист</h3>
                    <span id="playlist-count" class="text-xs font-bold text-slate-500"></span>
                </div>

                <div id="playlist" class="space-y-1 custom-scroll overflow-y-auto max-h-[70vh] pr-2">
                    <!-- Items injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let tracks = [];
        let currentIndex = 0;
        let audio = new Audio();
        let isPlaying = false;

        audio.volume = 0.85;

        // Build waveform bars
        const waveContainer = document.getElementById('wave-container');
        for (let i = 0; i < 28; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            const heights = [20, 40, 60, 80, 100, 80, 60, 40, 30, 50, 70, 90, 70, 50, 30, 45, 65, 85, 65, 45, 35, 55, 75, 55, 35, 25, 45, 25];
            bar.style.height = `${heights[i] || 40}%`;
            bar.style.animationDelay = `${i * 0.06}s`;
            waveContainer.appendChild(bar);
        }

        async function loadTracks() {
            const { data, error } = await _supabase
                .from('news')
                .select('id, title, slug, image_url, category, city, created_at, tts_audio_url')
                .eq('is_published', true)
                .not('tts_audio_url', 'is', null)
                .order('created_at', { ascending: false })
                .limit(50);

            document.getElementById('loading-state').classList.add('hidden');

            if (error || !data || data.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            tracks = data;
            document.getElementById('player-ui').classList.remove('hidden');
            document.getElementById('playlist-count').textContent = `${tracks.length} аудіо`;

            renderPlaylist();
            loadTrack(0, false);
        }

        function getCategoryName(cat) {
            return (window.CATEGORIES_UK && window.CATEGORIES_UK[cat]) || cat || 'Новини';
        }

        function formatDate(isoStr) {
            return new Date(isoStr).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function getArticleLink(track) {
            if (track.city && window.CITIES_UK && window.CITIES_UK[track.city]) return `/${track.city}/${track.slug}/`;
            if (track.category) return `/category/${track.category}/${track.slug}/`;
            return `/news/${track.slug}/`;
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            const listened = getListenedTracks();

            // Group tracks by date
            const groups = {};
            tracks.forEach((t, i) => {
                const date = new Date(t.created_at);
                const today = new Date();
                const yesterday = new Date();
                yesterday.setDate(today.getDate() - 1);

                let groupKey = '';
                if (date.toDateString() === today.toDateString()) groupKey = 'Сьогодні';
                else if (date.toDateString() === yesterday.toDateString()) groupKey = 'Вчора';
                else groupKey = date.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });

                if (!groups[groupKey]) groups[groupKey] = [];
                groups[groupKey].push({ track: t, index: i });
            });

            container.innerHTML = Object.entries(groups).map(([label, items]) => `
                <div class="py-4 px-4 sticky top-0 bg-[#0a0e1a]/95 backdrop-blur-sm z-20">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-3">
                        ${label}
                        <span class="h-px flex-1 bg-white/5"></span>
                    </h3>
                </div>
                ${items.map(({ track: t, index: i }) => {
                const isListened = listened.includes(t.id);
                return `
                    <div class="playlist-item ${i === currentIndex ? 'active' : ''} ${isListened ? 'opacity-60' : ''}" onclick="loadTrack(${i}, true)" id="pi-${i}">
                        <div class="relative flex-shrink-0">
                            <img src="${t.image_url || ''}" alt="" class="playlist-thumb" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect fill=%22%231e293b%22 width=%2252%22 height=%2252%22 rx=%2212%22/><text fill=%22%23ea580c%22 font-size=%2222%22 x=%2213%22 y=%2234%22>🎙</text></svg>'">
                            ${isListened ? `
                                <div class="absolute -top-1 -right-1 bg-green-500 text-white p-0.5 rounded-full shadow-lg border-2 border-[#0a0e1a]">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            ` : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">${getCategoryName(t.category)}</p>
                            <h4 class="text-sm font-bold text-white leading-snug line-clamp-2">${t.title}</h4>
                            <p class="text-xs text-slate-500 mt-1 font-medium">${formatDate(t.created_at)}</p>
                        </div>
                        <div class="flex-shrink-0">
                            ${i === currentIndex && isPlaying
                        ? `<div class="flex items-end gap-0.5 h-5">
                                    <span class="w-1 bg-orange-500 rounded-full animate-bounce" style="height:60%;animation-delay:0s"></span>
                                    <span class="w-1 bg-orange-500 rounded-full animate-bounce" style="height:100%;animation-delay:0.15s"></span>
                                    <span class="w-1 bg-orange-500 rounded-full animate-bounce" style="height:40%;animation-delay:0.3s"></span>
                                   </div>`
                        : `<svg class="w-4 h-4 text-slate-600" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`
                    }
                        </div>
                    </div>
                `}).join('')
                    `).join('');
        }

        function getListenedTracks() {
            try {
                return JSON.parse(localStorage.getItem('news_listened_tracks') || '[]');
            } catch (e) { return []; }
        }

        function markTrackAsListened(id) {
            const listened = getListenedTracks();
            if (!listened.includes(id)) {
                listened.push(id);
                localStorage.setItem('news_listened_tracks', JSON.stringify(listened.slice(-100))); // Keep last 100
            }
        }

        function loadTrack(index, andPlay = true) {
            currentIndex = index;
            const track = tracks[index];

            // Update cover
            const coverImg = document.getElementById('cover-img');
            coverImg.src = track.image_url || '';
            coverImg.onerror = () => { coverImg.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="%230f172a" width="400" height="400" rx="32"/><text fill="%23ea580c" font-size="120" x="120" y="250">🎙</text></svg>'; };

            document.getElementById('cover-category').textContent = getCategoryName(track.category);
            document.getElementById('track-title').textContent = track.title;
            document.getElementById('track-date').textContent = formatDate(track.created_at);
            document.getElementById('track-link').href = getArticleLink(track);
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('time-current').textContent = '0:00';
            document.getElementById('time-total').textContent = '0:00';

            // Load audio
            audio.pause();
            audio.src = track.tts_audio_url;
            audio.load();

            if (andPlay) {
                audio.play().then(() => {
                    setPlayState(true);
                    markTrackAsListened(track.id);
                }).catch(console.error);
            } else {
                setPlayState(false);
            }

            renderPlaylist();
            // Scroll to active in playlist
            setTimeout(() => {
                const el = document.getElementById(`pi - ${ index }`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function setPlayState(playing) {
            isPlaying = playing;

            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const coverImg = document.getElementById('cover-img');
            const vinylRing = document.getElementById('vinyl-ring');
            const waveContainer = document.getElementById('wave-container');
            const bgGradient = document.getElementById('bg-gradient');

            if (playing) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                coverImg.classList.add('playing');
                vinylRing.classList.add('playing');
                waveContainer.classList.add('playing');
                bgGradient.classList.add('playing');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                coverImg.classList.remove('playing');
                vinylRing.classList.remove('playing');
                waveContainer.classList.remove('playing');
                bgGradient.classList.remove('playing');
            }

            renderPlaylist();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play().then(() => setPlayState(true)).catch(console.error);
            } else {
                audio.pause();
                setPlayState(false);
            }
        }

        function prevTrack() {
            const prev = (currentIndex - 1 + tracks.length) % tracks.length;
            loadTrack(prev, true);
        }

        function nextTrack() {
            const next = (currentIndex + 1) % tracks.length;
            loadTrack(next, true);
        }

        function setVolume(val) {
            audio.volume = parseFloat(val);
        }

        // Auto-next on track end
        audio.addEventListener('ended', () => {
            nextTrack();
        });

        // Progress update
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = `${ pct } %`;
            document.getElementById('time-current').textContent = formatTime(audio.currentTime);
            document.getElementById('time-total').textContent = formatTime(audio.duration);
        });

        // Click on progress bar to seek
        document.getElementById('progress-bar').addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }
            if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 10); }
            if (e.code === 'ArrowUp') { audio.volume = Math.min(1, audio.volume + 0.1); document.getElementById('volume-slider').value = audio.volume; }
            if (e.code === 'ArrowDown') { audio.volume = Math.max(0, audio.volume - 0.1); document.getElementById('volume-slider').value = audio.volume; }
        });

        // Init — await header so CATEGORIES_UK is populated before rendering playlist
        (async () => {
            await window.initSiteHeader(_supabase);
            await loadTracks();
        })();
    </script>
</body>

</html>
