<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Оголошення | Калуш ПОРТАЛ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-navy: #020617;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--brand-navy); color: white; }
        .glass-container { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 3rem; }
        .img-container { border-radius: 2.5rem; overflow: hidden; background: #000; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-call { background: var(--brand-orange); color: white; border-radius: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s ease; box-shadow: 0 15px 30px rgba(249, 115, 22, 0.3); }
        .btn-call:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(249, 115, 22, 0.4); }

        @media (max-width: 768px) {
            body { padding-top: 1.5rem; }
            .container { padding-left: 0.75rem; padding-right: 0.75rem; }
            .glass-container { border-radius: 2.25rem; padding: 1.5rem; }
            h1 { font-size: 1.75rem !important; line-height: 1.1 !important; }
            
            /* Header Mobile Refinement */
            .header-nav-main { padding: 0.75rem 1.25rem !important; border-radius: 2rem !important; }
            .header-brand-box { gap: 0.5rem !important; }
            .header-links-box { gap: 0.75rem !important; }
            .header-btn-home { padding: 0.75rem 1rem !important; border-radius: 1.25rem !important; font-size: 8px !important; line-height: 1 !important; transform: scale(0.9); }
            .header-brand-logo { width: 1.75rem !important; }
            .header-brand-text { font-size: 10px !important; }
            .header-brand-sub { display: none; }
        }

        /* Unified Hamburger Menu */
        .hamburger {
            cursor: pointer;
            width: 32px;
            height: 24px;
            position: relative;
            z-index: 110;
            pointer-events: auto;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 4px;
            background: white;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border-radius: 4px;
        }
        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 10px; width: 70%; }
        .hamburger span:nth-child(3) { top: 20px; width: 40%; }

        .hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); width: 100%; }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); width: 100%; }

        .mobile-menu {
            position: fixed;
            inset: 0;
            background: #020617;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(249, 115, 22, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            backdrop-filter: blur(60px);
            z-index: 105;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1.1);
        }
        .mobile-menu.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }
        .mobile-menu-bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35rem;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            z-index: -1;
            font-family: 'Outfit', sans-serif;
            pointer-events: none;
            filter: blur(2px);
            animation: menuLogoPulse 15s ease-in-out infinite;
        }
        @keyframes menuLogoPulse {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.02; }
            50% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 0.04; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.02; }
        }
        .mobile-menu a {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            font-style: italic;
            letter-spacing: -0.05em;
            color: white;
            transition: all 0.4s ease;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }
        .mobile-menu.active a {
            opacity: 1;
            transform: translateY(0);
        }
        .mobile-menu a:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu a:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu a:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu a:nth-child(4) { transition-delay: 0.4s; }

        .mobile-menu a:hover { color: var(--brand-orange); transform: scale(1.1) rotate(-2deg); }
        .mobile-menu-close-area { position: absolute; inset: 0; z-index: -1; }
    </style>
</head>
<body class="pt-32 pb-20">
    <div id="site-header-placeholder"></div>

    <main class="container mx-auto px-4 max-w-5xl">
        <div class="glass-container p-6 md:p-12">
            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Left: Image -->
                <div class="lg:w-1/2">
                    <div class="img-container aspect-square relative">
                        <img id="ad-image" src="" alt="" class="w-full h-full object-cover">
                        <div id="vip-badge" class="absolute top-6 left-6 bg-orange-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hidden shadow-2xl">VIP</div>
                    </div>
                </div>

                <!-- Right: Content -->
                <div class="lg:w-1/2 flex flex-col">
                    <div class="mb-8">
                        <span id="ad-category" class="bg-orange-600/10 text-orange-600 border border-orange-600/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Категорія</span>
                        <h1 id="ad-title" class="text-3xl md:text-5xl font-black mt-6 leading-tight tracking-tighter uppercase italic">Заголовок оголошення</h1>
                        <div id="ad-price" class="text-4xl font-black text-orange-500 mt-4 tracking-tight">Ціна грн</div>
                    </div>

                    <div class="flex-1">
                        <p id="ad-desc" class="text-slate-400 text-lg leading-relaxed font-medium">Опис оголошення...</p>
                    </div>

                    <div class="mt-12 p-8 bg-white/5 rounded-[2rem] border border-white/5">
                        <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                            <div>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Зв'язатися</span>
                                <div id="ad-phone" class="text-xl font-black text-white tracking-widest leading-none blur-sm select-none transition-all duration-500">8800555****</div>
                            </div>
                            <button id="show-phone-btn" onclick="revealPhone()" class="btn-call px-8 py-5 text-sm active:scale-95 w-full md:w-auto">Показати номер</button>
                            <a id="call-link" href="tel:" class="btn-call px-8 py-5 text-sm active:scale-95 hidden w-full md:w-auto">Подзвонити</a>
                        </div>
                    </div>
                    
                    <button onclick="history.back()" class="mt-8 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 hover:text-white transition w-fit mx-auto lg:mx-0">← Назад до списку</button>
                    
                    <!-- Gallery thumbnails -->
                    <div id="gallery-container" class="mt-12 grid grid-cols-4 md:grid-cols-6 gap-4 hidden">
                        <!-- Thumbs inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Simple Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-10 right-10 text-white text-4xl font-light">&times;</button>
        <img id="lightbox-img" src="" class="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl">
        <div class="mt-8 flex gap-4 overflow-x-auto p-4 max-w-full">
            <!-- Mini thumbs if needed -->
        </div>
    </div>

    <script>
        let fullPhone = '';

        function revealPhone() {
            const phoneEl = document.getElementById('ad-phone');
            const showBtn = document.getElementById('show-phone-btn');
            const callLink = document.getElementById('call-link');
            
            phoneEl.innerText = fullPhone;
            phoneEl.classList.remove('blur-sm');
            showBtn.classList.add('hidden');
            callLink.classList.remove('hidden');
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            lb.classList.remove('hidden');
            lb.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.add('hidden');
            lb.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        // Add click listener to main image
        document.getElementById('ad-image').onclick = function() {
            openLightbox(this.src);
            this.style.cursor = 'zoom-in';
        };
        document.getElementById('ad-image').style.cursor = 'zoom-in';
    </script>
    <script>
        function toggleMenu() {
            const burger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            burger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = burger.classList.contains('active') ? 'hidden' : 'auto';
        }
        window.addEventListener('DOMContentLoaded', () => {
             const h = document.getElementById('hamburger');
             if(h) h.onclick = toggleMenu;
        });
    </script>
</body>
</html>
