<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-navy: #020617;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-blur: blur(40px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--brand-navy);
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
        }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        
        .place-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
            padding: 1.25rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: var(--glass-blur);
            position: relative;
            overflow: hidden;
        }
        .place-card:hover {
            border-color: rgba(249, 115, 22, 0.3);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
        }

        /* Unified Hamburger Menu */
        .hamburger {
            cursor: pointer;
            width: 32px;
            height: 24px;
            position: relative;
            z-index: 110;
            pointer-events: auto;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 4px;
            background: white;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border-radius: 4px;
        }
        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 10px; width: 70%; }
        .hamburger span:nth-child(3) { top: 20px; width: 40%; }

        .hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); width: 100%; }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); width: 100%; }

        .mobile-menu {
            position: fixed;
            inset: 0;
            background: #020617;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(249, 115, 22, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            backdrop-filter: blur(60px);
            z-index: 105;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1.1);
        }
        .mobile-menu.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }
        .mobile-menu-bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35rem;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            z-index: -1;
            font-family: 'Outfit', sans-serif;
            pointer-events: none;
            filter: blur(2px);
            animation: menuLogoPulse 15s ease-in-out infinite;
        }
        @keyframes menuLogoPulse {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.02; }
            50% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 0.04; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.02; }
        }
        .mobile-menu a {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            font-style: italic;
            letter-spacing: -0.05em;
            color: white;
            transition: all 0.4s ease;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }
        .mobile-menu.active a {
            opacity: 1;
            transform: translateY(0);
        }
        .mobile-menu a:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu a:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu a:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu a:nth-child(4) { transition-delay: 0.4s; }

        .mobile-menu a:hover { color: var(--brand-orange); transform: scale(1.1) rotate(-2deg); }
        .mobile-menu-close-area { position: absolute; inset: 0; z-index: -1; }

        @media (max-width: 768px) {
            body { padding-top: 1.5rem; }
            .container { padding-left: 1rem; padding-right: 1rem; }
            h1 { font-size: 2.5rem !important; line-height: 1 !important; margin-bottom: 0.5rem !important; }
        }
    </style>
</head>
<body class="pt-32 pb-20">
    <div id="site-header-placeholder"></div>

    <main class="container mx-auto px-6 max-w-7xl">
        <div class="mb-16 text-center lg:text-left">
            <h1 id="list-title" class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4 text-white italic">Заклади міста</h1>
            <p id="list-desc" class="text-slate-500 font-medium tracking-wide uppercase text-[10px] tracking-[0.3em]">Відкрийте для себе найкращі локації громади</p>
        </div>

        <div id="place-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Places items -->
        </div>
    </main>

    <script>
        function toggleMenu() {
            const burger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            burger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = burger.classList.contains('active') ? 'hidden' : 'auto';
        }
        window.addEventListener('DOMContentLoaded', () => {
             const h = document.getElementById('hamburger');
             if(h) h.onclick = toggleMenu;
        });
    </script>
</body>
</html>
