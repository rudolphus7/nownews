        // ── URL HELPERS ─────────────────────────────────────────────────
        function getSlugFromUrl() {
            const ssrSlug = window.__SSR_SLUG__;
            if (ssrSlug && ssrSlug !== 'undefined' && ssrSlug !== '') {
                console.log("Found SSR Slug:", ssrSlug);
                return ssrSlug;
            }

            const path = window.location.pathname;
            console.log("Current Pathname:", path);

            // Нова логіка: беремо останню частину шляху, якщо вона не технічна
            const parts = path.split('/').filter(p => p && p !== 'news' && p !== 'category');

            // Якщо шлях містить рубрику (наприклад /category/viyna/slug), рубрика буде в parts[0], а slug в parts[1]
            // Якщо шлях містить місто (наприклад /kalush/slug), місто в parts[0], slug в parts[1]
            // Якщо шлях /news/slug, slug в parts[0]

            let pathSlug = null;
            if (parts.length > 0) {
                // Якщо ми в підкупелі /category/ та маємо лише 1 сегмент — це швидше за все лістинг категорії
                if (path.includes('/category/') && parts.length < 2) {
                    console.log("On category listing page, skipping path slug detection");
                    pathSlug = null;
                } else {
                    pathSlug = parts[parts.length - 1];

                    const CITIES_LIST = ['kalush', 'if', 'kolomyya', 'dolyna', 'bolekhiv', 'nadvirna', 'burshtyn', 'kosiv', 'yaremche'];
                    if (CITIES_LIST.includes(pathSlug)) pathSlug = null;

                    if (pathSlug && (pathSlug.endsWith('.html') || pathSlug.endsWith('.php'))) pathSlug = null;
                }
            }

            if (pathSlug) {
                const s = decodeURIComponent(pathSlug);
                console.log("Found Path Slug:", s);
                return s;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const qSlug = urlParams.get('slug');

            }

                    const link = e.target.closest('a');

                        const slug = link.pathname.split('/news/')[1];
                        if (slug) {
                            e.preventDefault();
                            window.location.href = `/news.html?slug=${slug}`;
                        }
                    }
                });
            }

            // 2. Load the article content
            await loadFullNews();
        }

        // ── Content ─────────────────────────────────────────────────────
        async function loadFullNews() {
            const isPreRendered = window.__SSR_CONTENT_PRE_RENDERED__;
            console.log("Starting loadFullNews... Pre-rendered:", isPreRendered);

            const slug = getSlugFromUrl();
            const id = getIdFromUrl();

            console.log("Detected keys:", { slug, id });

            const loader = document.getElementById('loader');

            if (!slug && !id) {
                console.warn("No slug or ID found!");
                if (loader) {
                    loader.classList.add('hidden');
                    loader.innerHTML = `<div class="text-center py-20 text-slate-600 italic">Оберіть новину на <a href="/" class="text-orange-600 underline font-bold">головній сторінці</a>.</div>`;
                    loader.classList.remove('hidden');
                }
                return;
            }

            // Якщо ми вже маємо дані з SSR, використовуємо їх негайно
            if (isPreRendered && window.__SSR_POST_DATA__) {
                const data = window.__SSR_POST_DATA__;
                console.log("Using SSR data for hydration:", data.title);
                currentPost = data;

                fillUI(data);
                loadRelated(data.category, data.id);
                loadReactions(data.id, data.allowed_reactions);
                loadComments(data.id);
                subscribeToReactions(data.id);

                if (loader) loader.classList.add('hidden');
                document.getElementById('news-content').classList.remove('hidden');

                // Start Text Analytics Tracking
                if (window.BukvaAnalytics) {
                    window.BukvaAnalytics.startTextTracking(data.id, _supabase);
                }

                // Інкремент переглядів все одно потрібен
                const viewedKey = `viewed_${data.id}`;
                if (!_safeStorageGet(viewedKey)) {
                    // Bot check before increment
                    if (window.isBot && window.isBot()) {
                        console.log('Analytics: Skipping view increment for bot');
                    } else {
                        // Standardized 5-second delay for human presence
                        setTimeout(async () => {
                            // Verify user is still on this post and tab is active
                            if (currentPost && currentPost.id === data.id && document.visibilityState === 'visible') {
                                try {
                                    await _supabase.rpc('increment_views', { post_id: data.id });
                                    _safeStorageSet(viewedKey, 'true');
                                    console.log('Analytics: View incremented for', data.id);
                                } catch (e) {
                                    console.error('Analytics: View increment error', e);
                                }
                            }
                        }, 3000);
                    }
                }
                return;
            }

            // Стандартне завантаження (якщо SSR не спрацював або це SPA перехід)
            const timeoutPromise = new Promise((_, reject) =>
                setTimeout(() => reject(new Error("Таймаут завантаження (15с). Перевірте інтернет.")), 15000)
            );

            try {
                console.log("Fetching from Supabase...");
                let query = _supabase.from('news').select('*');
                if (slug) query = query.eq('slug', slug);
                else query = query.eq('id', id);

                // Запускаємо запит паралельно з таймаутом
                let { data, error } = await Promise.race([
                    query.maybeSingle(),
                    timeoutPromise
                ]);

                // Fallback: If slug search failed but slug looks like an ID, try searching by ID
                if ((error || !data) && slug && /^\d+$/.test(slug)) {
                    console.log(`Slug-based fetch failed or empty for "${slug}", trying as ID...`);
                    const fallbackQuery = _supabase.from('news').select('*').eq('id', slug).maybeSingle();
                    const fallbackResult = await Promise.race([
                        fallbackQuery,
                        timeoutPromise
                    ]);
                    data = fallbackResult.data;
                    error = fallbackResult.error;
                }

                if (error) {
                    console.error("Supabase error:", error);
                    if (loader) loader.innerHTML = `
                        <div class="text-center py-20">
                            <div class="text-red-500 font-bold uppercase tracking-widest mb-4">Помилка: ${error.message}</div>
                            <button onclick="location.reload()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black uppercase text-xs hover:bg-orange-600 transition">Спробувати ще раз</button>
                        </div>`;
                    return;
                }

                if (data) {
                    console.log("Article data received:", data.title);
                    currentPost = data;
                    document.title = `${data.title} | BUKVA NEWS`;

                    // Final URL Sync
                    if (data.slug && !window.location.pathname.includes(data.slug)) {
                        window.history.replaceState(null, '', `/news/${data.slug}`);
                    }

                    fillUI(data);
                    loadRelated(data.category, data.id);
                    loadReactions(data.id, data.allowed_reactions);
                    loadComments(data.id);
                    subscribeToReactions(data.id);

                    if (loader) loader.classList.add('hidden');
                    document.getElementById('news-content').classList.remove('hidden');

                    // Start Text Analytics Tracking
                    if (window.BukvaAnalytics) {
                        window.BukvaAnalytics.startTextTracking(data.id, _supabase);
                    }

                    // Increment Views (with session guard)
                    const viewedKey = `viewed_${data.id}`;
                    if (!_safeSessGet(viewedKey)) {
                        await _supabase.rpc('increment_views', { post_id: data.id });
                        _safeSessSet(viewedKey, 'true');

                        // Fetch updated count to show in UI
                        const { data: updatedPost } = await _supabase.from('news').select('views').eq('id', data.id).single();
                        if (updatedPost && document.getElementById('view-count')) {
                            document.getElementById('view-count').innerText = updatedPost.views || 0;
                        }
                    }
                } else {
                    console.warn("Article not found in Supabase");
                    if (loader) {
                        loader.classList.add('hidden');
                        loader.innerHTML = `
                            <div class="text-center py-20">
                                <h1 class="text-4xl font-black text-slate-900 mb-4">404</h1>
                                <p class="text-slate-500 mb-8 font-medium">Статтю не знайдено або її було видалено.</p>
                                <a href="/" class="inline-flex items-center gap-2 bg-orange-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-orange-700 transition">
                                    На головну
                                </a>
                            </div>`;
                        loader.classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error("Load failed", err);
                if (loader) loader.innerHTML = `
                    <div class="p-10 text-center">
                        <div class="text-red-500 font-bold mb-4">Помилка завантаження: ${err.message}</div>
                        <button onclick="location.reload()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black uppercase text-xs hover:bg-orange-600 transition">Оновити сторінку</button>
                    </div>`;
            }
        }

        /**
         * Optimizes Supabase image URLs using its Image Transformation API.
         */
        function optimizeImage(url, width = 800, quality = 80) {
            if (!url) return '';
            const q = width <= 480 ? 50 : (width <= 800 ? 65 : quality);

            // 1. Supabase Storage URLs
            if (url.includes('/storage/v1/object/public/')) {
                return url.replace(
                    '/storage/v1/object/public/',
                    `/storage/v1/render/image/public/`
                ) + `?width=${width}&quality=${q}&format=webp`;
            }

            // 2. External URLs
            // Return original URL
            if (url.startsWith('http')) {
                return url;
            }

            return url;
        }

        function fillUI(data) {
            const reader = document.getElementById('news-reader');
            if (reader) {
                if (data.tts_audio_url) reader.classList.remove('hidden');
                else reader.classList.add('hidden');
            }

            document.getElementById('news-title').innerText = data.title;
            document.getElementById('breadcrumb-category').innerText = CATEGORIES_UK[data.category] || data.category;
            document.getElementById('news-date').innerText = new Date(data.created_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });

            // Reading Time
            const contentForTime = data.content || document.getElementById('news-text').innerText || '';
            const words = contentForTime.replace(/<[^>]*>/g, '').split(/\s+/).filter(Boolean).length;
            const min = Math.max(1, Math.round(words / 200));
            const readingTimeElem = document.getElementById('reading-time');
            if (readingTimeElem) {
                readingTimeElem.innerText = `${min} ${min === 1 ? 'хвилина' : (min < 5 ? 'хвилини' : 'хвилин')}`;
            }

            // View Count
            const viewCountElem = document.getElementById('view-count');
            if (viewCountElem) {
                viewCountElem.innerText = data.views || 0;
            }

            const img = document.getElementById('news-image');
            if (data.image_url) {
                img.src = optimizeImage(data.image_url, 1200, 85);
                img.alt = data.title;
            } else {
                img.classList.add('hidden');
            }

            // Optimize article body images
            let optimizedContent = data.content || document.getElementById('news-text').innerHTML || '';
            optimizedContent = optimizedContent.replace(/<img\s+([^>]+)>/gi, (match, attrs) => {
                if (!attrs.includes('loading=')) attrs += ' loading="lazy"';
                if (!attrs.includes('decoding=')) attrs += ' decoding="async"';
                return `<img ${attrs}>`;
            });

            if (data.content) {
                document.getElementById('news-text').innerHTML = optimizedContent;
            }

            // Meta Badges
            let metaHtml = '';
            if (data.city) metaHtml += `<div class="inline-flex items-center gap-2 bg-orange-50 text-orange-600 px-4 py-2 rounded-2xl text-[11px] font-black uppercase tracking-widest border border-orange-100 shadow-sm leading-none">${CITIES_UK[data.city] || data.city}</div>`;

            if (data.tags) data.tags.forEach(t => {
                metaHtml += `<span class="bg-slate-50 text-slate-500 px-4 py-2 rounded-2xl text-[11px] font-black uppercase tracking-widest border border-slate-100 shadow-sm leading-none">#${t}</span>`;
            });
            document.getElementById('news-meta-tags').innerHTML = metaHtml;

            updateMetaTags({
                title: `${data.title} | BUKVA NEWS`,
                description: data.meta_description || data.title,

            });

        async function loadRelated(category, currentId) {

                    </a>
                `).join('');

        function updateMetaTags({ title, description, image, url }) {
            document.title = title;
            const setMeta = (sel, attr, val) => {
                let el = document.querySelector(sel);
                if (!el) { el = document.createElement('meta'); const parts = sel.match(/\[(.*?)=["'](.*?)["']\]/); if (parts) { el.setAttribute(parts[1], parts[2]); document.head.appendChild(el); } }
                el.setAttribute(attr, val);
            };
            setMeta('meta[name="description"]', 'content', description);
            setMeta('meta[property="og:title"]', 'content', title);
            setMeta('meta[property="og:image"]', 'content', image);
            setMeta('meta[property="og:url"]', 'content', url);
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
            canonical.href = url;
        }

        window.share = (platform) => {
            const cleanUrl = window.location.origin + window.location.pathname;
            const title = document.title;
            let shareUrl = '';
            switch (platform) {
                case 'telegram': shareUrl = `https://t.me/share/url?url=${encodeURIComponent(cleanUrl)}&text=${encodeURIComponent(title)}`; break;
                case 'facebook': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(cleanUrl)}`; break;
                case 'viber': shareUrl = `viber://forward?text=${encodeURIComponent(title + " " + cleanUrl)}`; break;
                case 'copy':
                    navigator.clipboard.writeText(cleanUrl).then(() => {
                        const toast = document.getElementById('copy-toast'); // Changed from 'toast-copy' to 'copy-toast'
                        if (toast) { // Added check for toast element
                            toast.classList.remove('translate-y-full');
                            setTimeout(() => toast.classList.add('translate-y-full'), 2000);
                        }
                    });
                    return;
            }
            if (shareUrl) window.open(shareUrl, '_blank');
        };

        const REACTION_MAP = {
            'like': '👍',

        // --- NEWS READER (TTS) LOGIC ---
        let ttsUtterance = null;
        let ttsVoices = [];
        let isTtsPlaying = false;
        let isTtsPaused = false;
        let isCloudMode = false;
        let cloudAudio = null;
        let cloudChunks = [];
        let currentChunkIndex = 0;

        const loadVoices = () => {

        window.toggleTTS = async () => {
            console.log("TTS Toggle Triggered. State:", { isTtsPlaying, isTtsPaused });
            if (!currentPost) return;

            const icon = document.getElementById('tts-icon');
            const anim = document.getElementById('tts-status-anim');

            // --- MOBILE AUDIO PRIMING ---
            if (!isTtsPlaying && !isTtsPaused) {
                if (!cloudAudio) cloudAudio = new Audio();
                cloudAudio.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA== ";
                cloudAudio.play().catch(() => { });
                cloudAudio.pause();
                console.log("Audio primed for mobile");
            }

            if (isTtsPlaying && !isTtsPaused) {
                console.log("TTS Pausing...");
                if (isCloudMode && cloudAudio) {
                    cloudAudio.pause();
                } else if (window.speechSynthesis && window.speechSynthesis.speaking) {
                    window.speechSynthesis.pause();
                }
                isTtsPaused = true;
                if (icon) icon.innerText = '▶';
                if (anim) anim.classList.add('hidden');

                if (window.BukvaAnalytics && currentPost) {
                    await window.BukvaAnalytics.stopVoiceTracking(false, _supabase);
                    window.BukvaAnalytics.startTextTracking(currentPost.id, _supabase);
                }
            } else if (isTtsPaused) {
                console.log("TTS Resuming...");
                if (isCloudMode && cloudAudio) {
                    cloudAudio.play().catch(e => console.error("Resume failed:", e));
                } else if (window.speechSynthesis) {
                    window.speechSynthesis.resume();
                }
                isTtsPaused = false;
                if (icon) icon.innerText = '⏸';
                if (anim) anim.classList.remove('hidden');

                if (window.BukvaAnalytics && currentPost) {
                    window.BukvaAnalytics.stopTextTracking();
                    window.BukvaAnalytics.startVoiceTracking(currentPost.id, _supabase, cloudAudio);
                }
            } else {
                console.log("TTS Calling startTTS()...");
                startTTS();
            }
        };

        function startTTS() {
            const icon = document.getElementById('tts-icon');
            const anim = document.getElementById('tts-status-anim');
            const ttsBtn = document.getElementById('tts-play-btn');

            try {
                if (window.speechSynthesis && ttsVoices.length === 0) {
                    ttsVoices = window.speechSynthesis.getVoices();
                }
            } catch (e) { console.warn("SpeechSynthesis restricted"); }

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = (currentPost.title || "") + ". " + (currentPost.content || "");
            const cleanText = tempDiv.innerText || tempDiv.textContent || "";

            if (!cleanText.trim()) return;

            stopTTS();

            if (window.BukvaAnalytics && currentPost) {
                window.BukvaAnalytics.stopTextTracking();
                window.BukvaAnalytics.startVoiceTracking(currentPost.id, _supabase, cloudAudio);
            }

            const isMobile = /Android|iPhone|iPad|iPod|FB_IAB|FB4A|FBAV/i.test(navigator.userAgent);
            let ukVoice = null;
            if (!isMobile && window.speechSynthesis) {
                ukVoice = ttsVoices.find(v => v.lang.toLowerCase().includes('uk') || v.name.toLowerCase().includes('ukrainian'));
            }

            if (ukVoice) {
                console.log("Using Native TTS:", ukVoice.name);
                isCloudMode = false;
                if (icon) icon.innerText = '⏸';
                if (anim) anim.classList.remove('hidden');
                playNativeTTS(cleanText, ukVoice);
            } else {
                console.log(isMobile ? "Mobile/FB detected. Using Cloud TTS." : "Ukrainian voice not found. Using Cloud TTS.");
                isCloudMode = true;
                if (icon) icon.innerText = '⏳';
                if (anim) anim.classList.remove('hidden');
                if (ttsBtn) {
                    ttsBtn.style.opacity = '0.7';
                    ttsBtn.style.pointerEvents = 'none';
                }
                playCloudTTS(cleanText);
            }
        }

        function playNativeTTS(text, voice) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                ttsUtterance = new SpeechSynthesisUtterance(text);
                ttsUtterance.lang = 'uk-UA';
                ttsUtterance.voice = voice;
                ttsUtterance.onstart = () => {
                    isTtsPlaying = true;
                    isTtsPaused = false;
                };
                ttsUtterance.onend = () => { stopTTS(); };
                ttsUtterance.onerror = () => { stopTTS(); };
                window.speechSynthesis.speak(ttsUtterance);

                setTimeout(() => {
                    if (isTtsPlaying && !window.speechSynthesis.speaking) window.speechSynthesis.resume();
                }, 1000);
            }, 300);
        }

        async function playCloudTTS(text) {
            console.log("Starting Premium TTS...");

            if (currentPost && currentPost.tts_audio_url) {
                console.log("Using cached audio:", currentPost.tts_audio_url);
                isTtsPlaying = true;
                isTtsPaused = false;

                const icon = document.getElementById('tts-icon');
                const ttsBtn = document.getElementById('tts-play-btn');
                if (icon) icon.innerText = '⏸';
                if (ttsBtn) { ttsBtn.style.opacity = ''; ttsBtn.style.pointerEvents = ''; }

                if (!cloudAudio) cloudAudio = new Audio();
                else {
                    cloudAudio.pause();
                    if (cloudAudio.src.startsWith('blob:')) URL.revokeObjectURL(cloudAudio.src);
                }

                cloudAudio.src = currentPost.tts_audio_url;
                cloudAudio.onended = () => { stopTTS(); };
                cloudAudio.onerror = (e) => {
                    console.error("Cached Audio Error:", e);
                    currentPost.tts_audio_url = null;
                    playCloudTTS(text);
                };
                cloudAudio.play().catch(e => {
                    console.error("Cached Playback Blocked:", e);
                    stopTTS();
                });
                return;
            }

            isTtsPlaying = true;
            isTtsPaused = false;

            const cleanText = text.replace(/\s+/g, ' ').trim();
            cloudChunks = cleanText.match(/.{1,2500}(\s|$)/g) || [cleanText];
            currentChunkIndex = 0;
            playNextCloudChunk();
        }

        async function playNextCloudChunk() {
            if (!isTtsPlaying || currentChunkIndex >= cloudChunks.length) {
                if (currentChunkIndex >= cloudChunks.length) stopTTS();
                return;
            }

            const chunk = cloudChunks[currentChunkIndex];
            try {
                const articleId = currentPost ? currentPost.id : undefined;
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: chunk,
                        articleId,
                        chunkIndex: currentChunkIndex,
                        totalChunks: cloudChunks.length
                    })
                });

                if (response.status === 429) {
                    const errData = await response.json().catch(() => ({}));
                    const retryMs = errData.retryAfterMs || 60000;
                    const retrySeconds = Math.ceil(retryMs / 1000);
                    console.warn(`TTS rate limited. Retrying in ${retrySeconds}s...`);

                    const icon = document.getElementById('tts-icon');
                    if (icon) icon.innerText = `⏳${retrySeconds}с`;

                    await new Promise(resolve => {
                        let remaining = retrySeconds;
                        const interval = setInterval(() => {
                            remaining--;
                            if (icon) icon.innerText = `⏳${remaining}с`;
                            if (remaining <= 0) { clearInterval(interval); resolve(); }
                        }, 1000);
                    });

                    if (isTtsPlaying) playNextCloudChunk();
                    return;
                }

                if (!response.ok) {
                    const err = await response.json().catch(() => ({ error: 'Unknown server error' }));
                    throw new Error(err.error || `Server error ${response.status}`);
                }

                const wavBuffer = await response.arrayBuffer();
                const cachedUrl = response.headers.get('X-TTS-Cached-URL');
                if (cachedUrl && currentPost) {
                    currentPost.tts_audio_url = cachedUrl;
                }

                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                const blobUrl = URL.createObjectURL(blob);

                if (!cloudAudio) cloudAudio = new Audio();
                else {
                    cloudAudio.pause();
                    if (cloudAudio.src.startsWith('blob:')) URL.revokeObjectURL(cloudAudio.src);
                }

                cloudAudio.src = blobUrl;
                cloudAudio.onended = () => {
                    if (blobUrl.startsWith('blob:')) URL.revokeObjectURL(blobUrl);
                    currentChunkIndex++;
                    playNextCloudChunk();
                };
                cloudAudio.onerror = (e) => {
                    console.error("Audio Playback Error:", e);
                    stopTTS();
                };

                const icon = document.getElementById('tts-icon');
                const ttsBtn = document.getElementById('tts-play-btn');
                if (icon) icon.innerText = '⏸';
                if (ttsBtn) { ttsBtn.style.opacity = ''; ttsBtn.style.pointerEvents = ''; }
                cloudAudio.play().catch(e => {
                    console.error("Playback Blocked:", e);
                    stopTTS();
                });

            } catch (err) {
                console.error("TTS Error:", err.message);
                const icon = document.getElementById('tts-icon');
                const ttsBtn = document.getElementById('tts-play-btn');
                if (icon) icon.innerText = '▶';
                if (ttsBtn) { ttsBtn.style.opacity = ''; ttsBtn.style.pointerEvents = ''; }
                stopTTS();
            }
        }

        window.stopTTS = () => {
            const wasPlaying = isTtsPlaying;
            try {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            } catch (e) { }
            if (cloudAudio) {
                cloudAudio.pause();
                cloudAudio = null;
            }
            isTtsPlaying = false;
            isTtsPaused = false;
            isCloudMode = false;
            cloudChunks = [];
            currentChunkIndex = 0;

            const icon = document.getElementById('tts-icon');
            const anim = document.getElementById('tts-status-anim');
            const ttsBtn = document.getElementById('tts-play-btn');
            if (icon) icon.innerText = '▶';
            if (anim) anim.classList.add('hidden');
            if (ttsBtn) { ttsBtn.style.opacity = ''; ttsBtn.style.pointerEvents = ''; }

            if (wasPlaying && window.BukvaAnalytics && currentPost) {
                window.BukvaAnalytics.stopVoiceTracking(false, _supabase);
                if (document.visibilityState !== 'hidden') {
                    window.BukvaAnalytics.startTextTracking(currentPost.id, _supabase);
                }
            }
        };

        // Stop speech when leaving page
        window.addEventListener('beforeunload', () => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });

        function subscribeToReactions(id) {
            if (!_supabase) return;
            _supabase.channel(`news-reactions-${id}`)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'news', filter: `id=eq.${id}` }, payload => {
                    const data = payload.new;
                    if (data) {
                        // Update all potential counters that might be on the page
                        Object.keys(REACTION_MAP).forEach(type => {
                            const elem = document.getElementById(`count-${type}`);
                            const dbField = type === 'like' ? 'likes' : type;
                            if (elem && data[dbField] !== undefined) {
                                elem.innerText = data[dbField] || 0;
                            }
                        });
                    }
                })
                .subscribe();
        }

        async function loadComments(postId) {
            const container = document.getElementById('comments-list');
            const countElem = document.getElementById('comments-count');
            if (!container) return;

            try {
                const { data, error } = await _supabase
                    .from('comments')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('is_approved', true)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (countElem) countElem.innerText = data.length;

                if (data.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-slate-400 italic font-medium">Поки що немає коментарів. Будьте першим! 📣</div>';
                    return;
                }

                // Build comment tree
                const commentMap = {};
                const roots = [];
                data.forEach(c => {
                    c.replies = [];
                    commentMap[c.id] = c;
                    if (c.parent_id) {
                        if (commentMap[c.parent_id]) commentMap[c.parent_id].replies.push(c);
                        else roots.push(c);
                    } else {
                        roots.push(c);
                    }
                });

                function renderComment(comment, depth = 0) {
                    const isReply = depth > 0;
                    return `
                    <div class="${isReply ? 'ml-6 md:ml-12 mt-4 border-l-2 border-slate-100 pl-4 md:pl-8' : 'bg-slate-50 p-6 rounded-3xl border border-slate-100 mb-6'} transition hover:border-orange-200 group relative">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-slate-900 text-sm uppercase tracking-tight">${comment.user_name}</h4>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">${new Date(comment.created_at).toLocaleString('uk-UA')}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="handleCommentReaction('${comment.id}', 'likes')" 
                                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-white border border-slate-100 text-[11px] font-bold text-slate-600 hover:text-orange-600 hover:border-orange-200 transition">
                                    👍 <span id="comment-likes-${comment.id}">${comment.likes || 0}</span>
                                </button>
                                <button onclick="handleCommentReaction('${comment.id}', 'dislikes')" 
                                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-white border border-slate-100 text-[11px] font-bold text-slate-600 hover:text-red-600 hover:border-red-200 transition">
                                    👎 <span id="comment-dislikes-${comment.id}">${comment.dislikes || 0}</span>
                                </button>
                            </div>
                        </div>
                        <p class="text-slate-700 text-sm leading-relaxed">${comment.content}</p>
                        <button onclick="showReplyForm('${comment.id}')" 
                            class="mt-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-orange-600 transition flex items-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                            ВІДПОВІСТИ
                        </button>
                        <div id="reply-form-container-${comment.id}" class="mt-4 hidden"></div>
                        <div class="replies-container">
                            ${comment.replies.map(r => renderComment(r, depth + 1)).join('')}
                        </div>
                    </div>`;
                }

                container.innerHTML = roots.reverse().map(c => renderComment(c)).join('');
            } catch (err) {
                console.error("Comments load error:", err);
                container.innerHTML = '<div class="text-center py-10 text-red-400 italic font-medium">Не вдалося завантажити коментарі.</div>';
            }
        }

        window.showReplyForm = (parentId) => {
            const container = document.getElementById(`reply-form-container-${parentId}`);
            if (!container) return;

            if (!container.innerHTML) {
                container.innerHTML = `
                    <div class="bg-white p-4 rounded-2xl border border-orange-100 shadow-sm mt-2">
                        <input type="text" id="reply-user-${parentId}" placeholder="Ваше ім'я" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-2 text-sm font-bold mb-2 focus:ring-2 focus:ring-orange-500/20 transition">
                        <textarea id="reply-content-${parentId}" placeholder="Ваша відповідь..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-2 text-sm font-medium h-20 mb-2 focus:ring-2 focus:ring-orange-500/20 transition"></textarea>
                        <div class="flex justify-end gap-2">
                            <button onclick="this.parentElement.parentElement.parentElement.classList.add('hidden')" class="px-4 py-2 text-[10px] font-black uppercase text-slate-400">Скасувати</button>
                            <button id="btn-submit-reply-${parentId}" onclick="submitReply('${parentId}')" class="px-4 py-2 bg-slate-900 text-white text-[10px] font-black uppercase rounded-xl hover:bg-orange-600 transition">Відповісти</button>
                        </div>
                    </div>
                `;
            }
            container.classList.toggle('hidden');
        };

        window.submitReply = async (parentId) => {
            const name = document.getElementById(`reply-user-${parentId}`);
            const content = document.getElementById(`reply-content-${parentId}`);
            const btn = document.getElementById(`btn-submit-reply-${parentId}`);

            if (!name.value || !content.value) return;

            btn.disabled = true;
            btn.innerText = "...";

            try {
                const { error } = await _supabase.from('comments').insert([{
                    post_id: currentPost.id,
                    parent_id: parentId,
                    user_name: name.value,
                    content: content.value,
                    is_approved: true
                }]);
                if (error) throw error;

                name.value = '';
                content.value = '';
                document.getElementById(`reply-form-container-${parentId}`).classList.add('hidden');
                loadComments(currentPost.id);
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ВІДПОВІСТИ";
            }
        };

        async function handleCommentReaction(commentId, type) {
            const currentReaction = localStorage.getItem(`comment_reaction_${commentId}`);

            // If same reaction clicked again, remove it
            if (currentReaction === type) {
                try {
                    const { error } = await _supabase.rpc('update_comment_reaction', {
                        comment_id: commentId,
                        reaction_type: type,
                        delta: -1
                    });
                    if (error) throw error;
                    localStorage.removeItem(`comment_reaction_${commentId}`);
                    const countElem = document.getElementById(`comment-${type}-${commentId}`);
                    if (countElem) countElem.innerText = Math.max(0, parseInt(countElem.innerText) - 1);
                } catch (err) { console.error(err); }
                return;
            }

            // If different reaction exists, remove old one first
            if (currentReaction) {
                try {
                    await _supabase.rpc('update_comment_reaction', {
                        comment_id: commentId,
                        reaction_type: currentReaction,
                        delta: -1
                    });
                    const oldCountElem = document.getElementById(`comment-${currentReaction}-${commentId}`);
                    if (oldCountElem) oldCountElem.innerText = Math.max(0, parseInt(oldCountElem.innerText) - 1);
                } catch (err) { console.error(err); }
            }

            // Add new reaction
            try {
                const { error } = await _supabase.rpc('update_comment_reaction', {
                    comment_id: commentId,
                    reaction_type: type,
                    delta: 1
                });
                if (error) throw error;
                localStorage.setItem(`comment_reaction_${commentId}`, type);
                const countElem = document.getElementById(`comment-${type}-${commentId}`);
                if (countElem) countElem.innerText = parseInt(countElem.innerText) + 1;
            } catch (err) { console.error(err); }
        }

        // Initialize Comment Form
        const commentForm = document.getElementById('comment-form');
        if (commentForm) {
            commentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!currentPost) return;

                const btn = document.getElementById('btn-submit-comment');
                const userName = document.getElementById('comment-user-name');
                const content = document.getElementById('comment-content');

                if (!userName.value || !content.value) return;

                btn.disabled = true;
                btn.innerText = 'Надсилаємо...';

                try {
                    const { error } = await _supabase.from('comments').insert([{
                        post_id: currentPost.id,
                        user_name: userName.value,
                        content: content.value,
                        is_approved: true
                    }]);
                    if (error) throw error;

                    userName.value = '';
                    content.value = '';
                    loadComments(currentPost.id);
                } catch (err) {
                    alert("Помилка: " + err.message);
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'Надіслати';
                }
            });
        }

        window.handleReaction = async (e, type) => {
            if (!currentPost) return;
            const btn = e.currentTarget;
            const dbField = type === 'like' ? 'likes' : type;
            const currentReaction = localStorage.getItem(`reaction_${currentPost.id}`);

            // If same reaction clicked again, remove it
            if (currentReaction === type) {
                try {
                    const { error } = await _supabase.rpc('update_reaction', {
                        post_id: currentPost.id,
                        reaction_type: dbField,
                        delta: -1
                    });
                    if (error) throw error;
                    localStorage.removeItem(`reaction_${currentPost.id}`);
                    btn.classList.remove('bg-orange-600/20', 'border-orange-600');

                    const countElem = document.getElementById(`count-${type}`);
                    if (countElem) countElem.innerText = Math.max(0, parseInt(countElem.innerText) - 1);
                } catch (err) { console.error(err); }
                return;
            }

            // If different reaction exists, remove old one first
            if (currentReaction) {
                try {
                    const oldField = currentReaction === 'like' ? 'likes' : currentReaction;
                    await _supabase.rpc('update_reaction', {
                        post_id: currentPost.id,
                        reaction_type: oldField,
                        delta: -1
                    });

                    const oldCountElem = document.getElementById(`count-${currentReaction}`);
                    if (oldCountElem) oldCountElem.innerText = Math.max(0, parseInt(oldCountElem.innerText) - 1);

                    document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('bg-orange-600/20', 'border-orange-600'));
                } catch (err) { console.error(err); }
            }

            // Add new reaction
            try {
                const { error } = await _supabase.rpc('update_reaction', {
                    post_id: currentPost.id,
                    reaction_type: dbField,
                    delta: 1
                });
                if (error) throw error;
                localStorage.setItem(`reaction_${currentPost.id}`, type);
                btn.classList.add('bg-orange-600/20', 'border-orange-600');

                const countElem = document.getElementById(`count-${type}`);
                if (countElem) countElem.innerText = parseInt(countElem.innerText) + 1;

                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = '', 200);
            } catch (err) { console.error(err); }
        };

        document.addEventListener('DOMContentLoaded', () => {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            init();
            window.initSiteFooter && window.initSiteFooter(_supabase);
        });

        window.onpopstate = () => {
            document.getElementById('news-content').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            loadFullNews();
        };

        window.onhashchange = () => {
            document.getElementById('news-content').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            loadFullNews();
        };
    </script>
</body>
