<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-orange-rgb: 249, 115, 22;
            --dark-slate: #020617;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(40px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
            line-height: 1.6;
        }
        .place-hero {
            height: 50vh;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .hero-bg-blur {
            position: absolute;
            inset: -20px;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.4);
            opacity: 0.8;
            z-index: 1;
        }
        .place-hero img#place-image {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.8s ease;
        }
        .place-hero:hover img#place-image { transform: scale(1.02); }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .action-chip {
            padding: 1rem 2rem;
            background: white/5;
            border: 1px solid white/10;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }
        .action-chip:hover {
            background: var(--brand-orange);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            body { padding-top: 0; }
            .place-hero { 
                height: 50vh !important;
                border-radius: 0 0 2.5rem 2.5rem;
                margin-bottom: 0;
            }
            .hero-content {
                padding: 1.5rem !important;
                z-index: 10 !important;
            }
            .container { padding-left: 0; padding-right: 0; }
            .mobile-info-container {
                margin: -2rem 1.5rem 0;
                padding: 2.5rem 1.5rem;
                position: relative;
                z-index: 30;
                border-radius: 2.5rem;
                background: rgba(2, 6, 23, 0.6);
                backdrop-filter: blur(40px);
                border: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            }
            .mobile-float-card {
                position: relative;
                z-index: 20;
                margin-top: 1rem;
            }
            #place-title { font-size: 2.8rem !important; line-height: 0.9; margin-top: 0.5rem; }

            /* Header Mobile Refinement */
            .header-nav-main { padding: 0.5rem 1rem !important; border-radius: 2.5rem !important; background: rgba(2, 6, 23, 0.7) !important; }
            .header-brand-box { gap: 0.4rem !important; }
            .header-links-box { gap: 0.5rem !important; }
            .header-btn-home { padding: 0.6rem 0.9rem !important; border-radius: 1.5rem !important; font-size: 8px !important; letter-spacing: 0.1em !important; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)) !important; }
            .header-brand-logo { width: 2rem !important; }
            .header-brand-text { font-size: 11px !important; letter-spacing: -0.02em !important; }
            .header-brand-sub { display: none; }
        }

        /* Unified Hamburger Menu */
        .hamburger {
            cursor: pointer;
            width: 32px;
            height: 24px;
            position: relative;
            z-index: 110;
            pointer-events: auto;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 4px;
            background: white;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border-radius: 4px;
        }
        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 10px; width: 70%; }
        .hamburger span:nth-child(3) { top: 20px; width: 40%; }

        .hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); width: 100%; }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); width: 100%; }

        .mobile-menu {
            position: fixed;
            inset: 0;
            background: #020617;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(249, 115, 22, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            backdrop-filter: blur(60px);
            z-index: 105;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1.1);
        }
        .mobile-menu.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }
        .mobile-menu-bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35rem;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            z-index: -1;
            font-family: 'Outfit', sans-serif;
            pointer-events: none;
            filter: blur(2px);
            animation: menuLogoPulse 15s ease-in-out infinite;
        }
        @keyframes menuLogoPulse {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.02; }
            50% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 0.04; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.02; }
        }
        .mobile-menu a {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            font-style: italic;
            letter-spacing: -0.05em;
            color: white;
            transition: all 0.4s ease;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }
        .mobile-menu.active a {
            opacity: 1;
            transform: translateY(0);
        }
        .mobile-menu a:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu a:nth-child(2) { transition-delay: 0.2s; }
        .mobile-menu a:nth-child(3) { transition-delay: 0.3s; }
        .mobile-menu a:nth-child(4) { transition-delay: 0.4s; }

        .mobile-menu a:hover { color: var(--brand-orange); transform: scale(1.1) rotate(-2deg); }
        .mobile-menu-close-area { position: absolute; inset: 0; z-index: -1; }
    </style>
</head>
<body class="pt-32 pb-20">
    <!-- Header Placeholder -->
    <div id="site-header-placeholder"></div>
 
    <main class="container mx-auto px-0 md:px-6 max-w-6xl">
        <div class="place-hero md:rounded-[3rem] shadow-2xl overflow-hidden">
            <div id="place-hero-blur" class="hero-bg-blur"></div>
            <img id="place-image" src="" alt="Place Image">
        </div>

        <!-- Restructured Title Section -->
        <div class="mobile-info-container md:px-6 md:py-20">
            <div class="max-w-4xl">
                <div class="flex flex-wrap items-center gap-4 md:gap-6 mb-4 md:mb-8">
                    <span id="place-category" class="bg-orange-600 text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] px-4 md:px-6 py-2 md:py-2.5 rounded-full shadow-xl shadow-orange-600/30">Категорія</span>
                    <div class="flex text-orange-500 text-base md:text-2xl gap-1 md:gap-2 drop-shadow-[0_0_10px_rgba(249,115,22,0.3)]" id="place-rating">⭐⭐⭐⭐⭐</div>
                </div>
                <h1 id="place-title" class="text-4xl md:text-[120px] font-black text-white uppercase tracking-tighter leading-[0.8] italic drop-shadow-2xl">Назва закладу</h1>
            </div>
        </div>

        <div class="px-6 md:px-0 grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-12">
            <div class="lg:col-span-2 space-y-10 mobile-float-card">
                <div class="glass p-8 md:p-14 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-48 h-48 bg-orange-600/5 rounded-full blur-[100px] group-hover:bg-orange-600/10 transition"></div>
                    <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.4em] mb-10">Про заклад</h3>
                    <div id="place-description" class="text-slate-300 text-lg md:text-xl leading-relaxed font-medium"></div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-4 md:hidden">Контакти</div>
                <a id="place-nav-link" href="#" target="_blank" class="action-chip glass group flex items-center gap-6 p-6">
                    <div class="w-14 h-14 rounded-[1.25rem] bg-white/5 flex items-center justify-center group-hover:bg-white/20 transition text-2xl">📍</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 opacity-50">Адреса</div>
                        <div id="place-address" class="font-bold text-[15px] truncate">--</div>
                    </div>
                </a>
                <a id="place-phone-link" href="tel:" class="action-chip glass group flex items-center gap-6 p-6">
                    <div class="w-14 h-14 rounded-[1.25rem] bg-white/5 flex items-center justify-center group-hover:bg-white/20 transition text-2xl">📞</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 opacity-50">Телефон</div>
                        <div id="place-phone" class="font-bold text-[15px] truncate">--</div>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script id="ssr-data"></script>
    <script>
        function toggleMenu() {
            const burger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            burger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = burger.classList.contains('active') ? 'hidden' : 'auto';
        }
        window.addEventListener('DOMContentLoaded', () => {
             const h = document.getElementById('hamburger');
             if(h) h.onclick = toggleMenu;
        });
    </script>
</body>
</html>
