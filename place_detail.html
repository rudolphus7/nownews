<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
    <style>
        :root {
            --brand-orange: #f97316;
            --dark-slate: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(25px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .place-hero {
            height: 50vh;
            position: relative;
            overflow: hidden;
        }
        .place-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
        }
    </style>
</head>
<body class="pt-24 pb-20">
    <!-- Header Placeholder -->
    <div id="site-header-placeholder"></div>

    <main class="container mx-auto px-6 max-w-5xl">
        <div class="place-hero rounded-[3rem] shadow-2xl overflow-hidden mb-12">
            <img id="place-image" src="" alt="Place Image">
            <div class="absolute inset-x-0 bottom-0 p-12 bg-gradient-to-t from-slate-950 to-transparent">
                <div class="flex flex-wrap items-center gap-4 mb-4">
                    <span id="place-category" class="bg-orange-600 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full">Категорія</span>
                    <div class="flex text-orange-400 gap-1" id="place-rating">⭐⭐⭐⭐⭐</div>
                </div>
                <h1 id="place-title" class="text-4xl md:text-6xl font-black text-white uppercase tracking-tighter">Назва закладу</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2 space-y-10">
                <div class="glass p-10">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Про заклад</h3>
                    <div id="place-description" class="text-slate-300 text-lg leading-relaxed"></div>
                </div>
            </div>
            
            <div class="space-y-8">
                <div class="glass p-8 border-orange-600/20">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Контакти</h3>
                    <div class="space-y-6">
                        <div class="flex items-start gap-4">
                            <span class="text-xl">📍</span>
                            <div>
                                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Адреса</div>
                                <div id="place-address" class="font-bold">--</div>
                            </div>
                        </div>
                        <div class="flex items-start gap-4">
                            <span class="text-xl">📞</span>
                            <div>
                                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Телефон</div>
                                <div id="place-phone" class="font-bold">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script id="ssr-data"></script>
</body>
</html>
