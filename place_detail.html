<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-orange-rgb: 249, 115, 22;
            --dark-slate: #020617;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(40px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
            line-height: 1.6;
        }
        .place-hero {
            height: 50vh;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .hero-bg-blur {
            position: absolute;
            inset: -20px;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.4);
            opacity: 0.8;
            z-index: 1;
        }
        .place-hero img#place-image {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.8s ease;
        }
        .place-hero:hover img#place-image { transform: scale(1.02); }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .action-chip {
            padding: 1rem 2rem;
            background: white/5;
            border: 1px solid white/10;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }
        .action-chip:hover {
            background: var(--brand-orange);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            body { padding-top: 0; }
            .place-hero { 
                height: 50vh !important;
                border-radius: 0 0 2.5rem 2.5rem;
                margin-bottom: 0;
            }
            .hero-content {
                padding: 1.5rem !important;
                z-index: 10 !important;
            }
            .container { padding-left: 0; padding-right: 0; }
            .mobile-info-container {
                margin: -2rem 1.5rem 0;
                padding: 2.5rem 1.5rem;
                position: relative;
                z-index: 30;
                border-radius: 2.5rem;
                background: rgba(2, 6, 23, 0.6);
                backdrop-filter: blur(40px);
                border: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            }
            .mobile-float-card {
                position: relative;
                z-index: 20;
                margin-top: 1rem;
            }
            #place-title { font-size: 2.8rem !important; line-height: 0.9; margin-top: 0.5rem; }

            /* Header Mobile Refinement */
            .header-nav-main { padding: 0.5rem 1rem !important; border-radius: 2.5rem !important; background: rgba(2, 6, 23, 0.7) !important; }
            .header-brand-box { gap: 0.4rem !important; }
            .header-links-box { gap: 0.5rem !important; }
            .header-btn-home { padding: 0.6rem 0.9rem !important; border-radius: 1.5rem !important; font-size: 8px !important; letter-spacing: 0.1em !important; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)) !important; }
            .header-brand-logo { width: 2rem !important; }
            .header-brand-text { font-size: 11px !important; letter-spacing: -0.02em !important; }
            .header-brand-sub { display: none; }
        }
    </style>
</head>
<body class="pt-24 pb-20">
    <!-- Header Placeholder -->
    <div id="site-header-placeholder"></div>
 
    <main class="container mx-auto px-0 md:px-6 max-w-6xl">
        <div class="place-hero md:rounded-[3rem] shadow-2xl overflow-hidden">
            <div id="place-hero-blur" class="hero-bg-blur"></div>
            <img id="place-image" src="" alt="Place Image">
        </div>

        <!-- Restructured Title Section -->
        <div class="mobile-info-container md:px-6 md:py-20">
            <div class="max-w-4xl">
                <div class="flex flex-wrap items-center gap-4 md:gap-6 mb-4 md:mb-8">
                    <span id="place-category" class="bg-orange-600 text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] px-4 md:px-6 py-2 md:py-2.5 rounded-full shadow-xl shadow-orange-600/30">Категорія</span>
                    <div class="flex text-orange-500 text-base md:text-2xl gap-1 md:gap-2 drop-shadow-[0_0_10px_rgba(249,115,22,0.3)]" id="place-rating">⭐⭐⭐⭐⭐</div>
                </div>
                <h1 id="place-title" class="text-4xl md:text-[120px] font-black text-white uppercase tracking-tighter leading-[0.8] italic drop-shadow-2xl">Назва закладу</h1>
            </div>
        </div>

        <div class="px-6 md:px-0 grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-12">
            <div class="lg:col-span-2 space-y-10 mobile-float-card">
                <div class="glass p-8 md:p-14 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-48 h-48 bg-orange-600/5 rounded-full blur-[100px] group-hover:bg-orange-600/10 transition"></div>
                    <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.4em] mb-10">Про заклад</h3>
                    <div id="place-description" class="text-slate-300 text-lg md:text-xl leading-relaxed font-medium"></div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-4 md:hidden">Контакти</div>
                <a id="place-nav-link" href="#" target="_blank" class="action-chip glass group flex items-center gap-6 p-6">
                    <div class="w-14 h-14 rounded-[1.25rem] bg-white/5 flex items-center justify-center group-hover:bg-white/20 transition text-2xl">📍</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 opacity-50">Адреса</div>
                        <div id="place-address" class="font-bold text-[15px] truncate">--</div>
                    </div>
                </a>
                <a id="place-phone-link" href="tel:" class="action-chip glass group flex items-center gap-6 p-6">
                    <div class="w-14 h-14 rounded-[1.25rem] bg-white/5 flex items-center justify-center group-hover:bg-white/20 transition text-2xl">📞</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 opacity-50">Телефон</div>
                        <div id="place-phone" class="font-bold text-[15px] truncate">--</div>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script id="ssr-data"></script>
</body>
</html>
