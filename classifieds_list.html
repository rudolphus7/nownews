<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
    <style>
        :root {
            --brand-orange: #f97316;
            --dark-slate: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(25px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .ad-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .ad-card:hover {
            border-color: var(--brand-orange);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="pt-32 pb-20">
    <div id="site-header-placeholder"></div>

    <main class="container mx-auto px-6">
        <div class="mb-12">
            <h1 id="list-title" class="text-4xl md:text-5xl font-black uppercase tracking-tighter mb-4 text-white">Актуальні оголошення</h1>
            <p id="list-desc" class="text-slate-400 font-medium">Знайдіть найкращі пропозиції у вашому місті</p>
        </div>

        <div id="ad-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Ads items -->
        </div>
    </main>
</body>
</html>
