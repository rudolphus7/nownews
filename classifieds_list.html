<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-navy: #020617;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-blur: blur(40px);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--brand-navy);
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
        }
        .ad-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 1.25rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: var(--glass-blur);
            position: relative;
            overflow: hidden;
        }
        .ad-card:hover {
            border-color: rgba(249, 115, 22, 0.3);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="pt-32 pb-20">
    <div id="site-header-placeholder"></div>

    <main class="container mx-auto px-6 max-w-7xl">
        <div class="mb-16 text-center lg:text-left">
            <h1 id="list-title" class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-4 text-white italic">Актуальні оголошення</h1>
            <p id="list-desc" class="text-slate-500 font-medium tracking-wide">Знайдіть найкращі пропозиції у вашому місті</p>
        </div>

        <div id="ad-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Ads items -->
        </div>
    </main>
</body>
</html>
