    <script>
        const SUPABASE_URL = 'https://kgrxlznhimwuvwhjfzhv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_L4_HhLhbj_m6wbEc3ZqhcQ_QNGOLWXU';
        let _supabase;

        // CATEGORIES_UK and CITIES_UK are now provided globally by /components/header.js
        const isLocal = window.location.hostname === 'localhost' ||
            window.location.hostname.startsWith('192.168.') ||
            window.location.hostname.startsWith('127.0.0.1') ||
            window.location.port !== '';

        function getNewsLink(post) {
            const slug = post.slug || '';
            const id = post.id || '';
            if (!slug) return `/news/?id=${id}`;

            // Hierarchical URLs: /city/slug/ or /category/cat/slug/
            if (post.city && CITIES_UK[post.city]) {
                return `/novyny/${post.city}/${slug}/`;
            }
            if (post.category && CATEGORY_EN_TO_UK_SLUG[post.category]) {
                return `/${CATEGORY_EN_TO_UK_SLUG[post.category]}/${slug}/`;
            }

            return `/${slug}/`;
        }

        /**
         * Parse city from pathname (e.g. /kolomyya/ → 'kolomyya')
         */
        function parseCityFromUrl() {
            // SSR: api/city.js injects window.__SSR_CITY__
            if (window.__SSR_CITY__ && window.__SSR_CITY__ !== 'undefined') {
                return window.__SSR_CITY__;
            }
            const pathParts = window.location.pathname.replace(/^\/|\/$/g, '').split('/');
            const citySlug = pathParts[0]; // /:city/ → index 0
            return (citySlug && window.CITIES_UK && window.CITIES_UK[citySlug]) ? citySlug : null;
        }

        /**
         * Parse category slug from URL.
         * api/category.js injects window.__SSR_CATEGORY_SLUG__ on category pages.
         * The slug in DB is the same as the URL slug.
         */
        function parseCategoryFromUrl() {
            // SSR: api/category.js injects window.__SSR_CATEGORY_SLUG__
            if (window.__SSR_CATEGORY_SLUG__ && window.__SSR_CATEGORY_SLUG__ !== 'undefined') {
                return window.__SSR_CATEGORY_SLUG__;
            }
            const pathParts = window.location.pathname.replace(/^\/|\/$/g, '').split('/');
            const catSlug = pathParts[0];
            
            // If it's a known category (from DB/window), use it
            if (window.CATEGORIES_UK && window.CATEGORIES_UK[catSlug]) return catSlug;
            
            return new URLSearchParams(window.location.search).get('category') || null;
        }

        const PAGE_SIZE = 8;
        let currentPage = 0;
        let currentFilters = {};
        let currentViewMode = localStorage.getItem('newsViewMode') || 'detailed'; // 'detailed' or 'compact'

        /**
         * Update page-level SEO meta tags dynamically
         */
        function updatePageSeo(city, category) {
            const SITE_URL = 'https://bukva.news';
            let title, description, canonical;

            // Resolve display names: prefer dynamic maps, fallback to SSR-injected names
            const cityName = (city && CITIES_UK[city]) || (city && window.__SSR_CITY_NAME__) || city;
            const catName = (category && CATEGORIES_UK[category]) || (category && window.__SSR_CATEGORY_NAME__) || category;

            if (city && cityName) {
                title = `Новини ${cityName} | BUKVA NEWS`;
                description = `Актуальні новини ${cityName}: події, факти, оперативна інформація. Читайте все найважливіше першими.`;
                canonical = `${SITE_URL}/${city}/`;
            } else if (category && catName) {
                title = `${catName} | BUKVA NEWS`;
                description = `Новини рубрики «${catName}»: усі головні події Івано-Франківщини.`;
                const ukSlug = CATEGORY_EN_TO_UK_SLUG[category] || category;
                canonical = `${SITE_URL}/${ukSlug}/`;
            } else {
                title = 'BUKVA NEWS | Головні новини Івано-Франківщини';
                description = 'Головні новини Івано-Франківщини: політика, економіка, війна, культура і спорт.';
                canonical = SITE_URL + '/';
            }

            document.title = title;

            let descEl = document.querySelector('meta[name="description"]');
            if (!descEl) { descEl = document.createElement('meta'); descEl.name = 'description'; document.head.appendChild(descEl); }
            descEl.content = description;

            let canonEl = document.querySelector('link[rel="canonical"]');
            if (!canonEl) { canonEl = document.createElement('link'); canonEl.rel = 'canonical'; document.head.appendChild(canonEl); }
            canonEl.href = canonical;

            const setOg = (prop, val) => {
                let el = document.querySelector(`meta[property="${prop}"]`);
                if (!el) { el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
                el.content = val;
            };
            setOg('og:title', title);
            setOg('og:description', description);
            setOg('og:url', canonical);
            setOg('og:type', 'website');

            const sectionTitleContainer = document.getElementById('section-title-container');
            const sectionSubtitle = document.getElementById('section-subtitle');
            const heroSec = document.getElementById('hero-container');
            const sectionHead = document.getElementById('section-header');

            if (city || category) {
                if (heroSec) heroSec.classList.add('hidden');
                if (sectionHead) sectionHead.classList.remove('hidden');

                if (sectionTitleContainer) {
                    let headingText = '';
                    if (city && cityName) {
                        headingText = `Новини міста ${cityName}`;
                    } else if (category && catName) {
                        headingText = `Рубрика: ${catName}`;
                    }
                    sectionTitleContainer.innerHTML = `<h1 id="section-title" class="text-5xl md:text-8xl font-black italic tracking-tighter text-slate-900 leading-none">${headingText}</h1>`;
                }

                if (sectionSubtitle) {
                    sectionSubtitle.textContent = city ? 'Місто' : 'Рубрика';
                }
            } else {
                if (heroSec) heroSec.classList.remove('hidden');
                if (sectionHead) sectionHead.classList.add('hidden');
                if (sectionTitleContainer) sectionTitleContainer.innerHTML = '';
            }
        }

        let initialNewsPromise;

        // PRE-INIT: Wait for library THEN start fetch for speed
        window.onSupabaseReady = () => {
            if (!_supabase && window.supabase) {
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                initialNewsPromise = _supabase.from('news')
                    .select('*')
                    .eq('is_published', true)
                    .order('created_at', { ascending: false })
                    .limit(PAGE_SIZE + 1);
            }
        };

        // If library already there (e.g. cached/fast), init immediately
        if (window.supabase) window.onSupabaseReady();

        async function init() {
            // 1. Initialize Shared Header
            window.header = await window.initSiteHeader(_supabase);

            // 2. Initial state from URL
            const cityFromPath = parseCityFromUrl();
            const categoryFromPath = parseCategoryFromUrl();
            const urlParams = new URLSearchParams(window.location.search);

            currentFilters = {
                category: categoryFromPath || urlParams.get('category'),
                city: cityFromPath || urlParams.get('city')
            };

            updatePageSeo(currentFilters.city, currentFilters.category);

            // Handle Localhost 404
            if (isLocal) {
                document.addEventListener('click', (e) => {
                    const link = e.target.closest('a');
                    if (link && link.pathname.startsWith('/news/')) {
                        const slug = link.pathname.replace(/^\/news\//, '').replace(/\/$/, '');
                        if (slug) {
                            e.preventDefault();
                            window.location.href = `/news.html?slug=${slug}`;
                        }
                    }
                });
            }

            window.addEventListener('news-filter-changed', async (e) => {
                currentFilters = e.detail;
                updatePageSeo(currentFilters.city, currentFilters.category);
                await loadNews();
            });

            // Use our PRE-FETCHED data if no filters applied
            if (!currentFilters.category && !currentFilters.city && initialNewsPromise) {
                const { data, error } = await initialNewsPromise;
                if (!error && data && data.length > 0) {
                    renderHero(data[0]);
                    renderGrid(data.slice(1));
                    updateViewToggleUI();
                    return;
                }
            }

            await loadNews();
            updateViewToggleUI();
        }

        window.toggleViewMode = () => {
            currentViewMode = currentViewMode === 'detailed' ? 'compact' : 'detailed';
            localStorage.setItem('newsViewMode', currentViewMode);
            updateViewToggleUI();

            // Re-render only the current visible news
            loadNews(false);
        };

        function updateViewToggleUI() {
            const icon = document.getElementById('view-toggle-icon');
            if (!icon) return;

            if (currentViewMode === 'compact') {
                // List icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>';
            } else {
                // Grid/Detail icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path>';
            }
        }

        window.addEventListener('popstate', async () => {
            const cityFromPath = parseCityFromUrl();
            const urlParams = new URLSearchParams(window.location.search);
            currentFilters = {
                category: urlParams.get('category'),
                city: cityFromPath
            };
            updatePageSeo(currentFilters.city, currentFilters.category);
            await loadNews();
        });

        async function loadNews(isMore = false) {
            try {
                const heroSec = document.getElementById('hero-container');
                const sectionHead = document.getElementById('section-header');
                const isFiltered = currentFilters.category || currentFilters.city;

                if (!isMore) {
                    currentPage = 0;
                    document.getElementById('news-grid').innerHTML = '';

                    if (isFiltered) {
                        heroSec.classList.add('hidden');
                        sectionHead.classList.remove('hidden');

                        // Resolve display name: dynamic maps first, then SSR-injected fallback
                        const cityName = currentFilters.city
                            ? (CITIES_UK[currentFilters.city] || window.__SSR_CITY_NAME__ || currentFilters.city)
                            : null;
                        const catName = currentFilters.category
                            ? (CATEGORIES_UK[currentFilters.category] || window.__SSR_CATEGORY_NAME__ || currentFilters.category)
                            : null;

                        const headingText = cityName
                            ? `Новини міста ${cityName}`
                            : (catName ? `Рубрика: ${catName}` : 'Новини');
                        const subtitle = currentFilters.category ? 'Рубрика' : 'Місто';

                        const sectionTitleContainer = document.getElementById('section-title-container');
                        if (sectionTitleContainer) {
                            sectionTitleContainer.innerHTML = `<h1 id="section-title" class="text-5xl md:text-8xl font-black italic tracking-tighter text-slate-900 leading-none">${headingText}</h1>`;
                        }
                        if (document.getElementById('section-subtitle')) {
                            document.getElementById('section-subtitle').innerText = subtitle;
                        }
                    } else {
                        heroSec.classList.remove('hidden');
                        sectionHead.classList.add('hidden');
                        heroSec.innerHTML = '<div class="animate-pulse bg-slate-200 h-[450px] md:h-[650px] rounded-[3rem]"></div>';
                    }
                }

                let query = _supabase.from('news').select('*').eq('is_published', true).order('created_at', { ascending: false });
                if (currentFilters.category) query = query.eq('category', currentFilters.category);
                if (currentFilters.city) query = query.eq('city', currentFilters.city);

                let from, to;
                if (!isMore) {
                    from = 0;
                    to = PAGE_SIZE;
                } else {
                    from = (currentPage * PAGE_SIZE) + 1;
                    to = from + PAGE_SIZE - 1;
                }

                const { data, error } = await query.range(from, to);
                if (error) throw error;

                if (!isMore) {
                    if (data.length > 0) {
                        if (!isFiltered) renderHero(data[0]);
                        renderGrid(isFiltered ? data : data.slice(1));
                    } else {
                        if (!isFiltered) heroSec.innerHTML = '';
                        document.getElementById('news-grid').innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 font-bold uppercase tracking-widest">Новин не знайдено</div>';
                        document.getElementById('more-news-container').classList.add('hidden');
                    }
                } else {
                    renderGrid(data, true);
                }

                // Pagination UI
                if (data.length < (isMore ? PAGE_SIZE : PAGE_SIZE + 1)) {
                    document.getElementById('btn-more').classList.add('hidden');
                    document.getElementById('no-more-news').classList.remove('hidden');
                } else {
                    document.getElementById('btn-more').classList.remove('hidden');
                    document.getElementById('no-more-news').classList.add('hidden');
                }

            } catch (err) {
                console.error('loadNews error:', err);
            }
        }

        /**
         * Optimizes Supabase image URLs using its Image Transformation API.
         */
        function optimizeImage(url, width = 800, quality = 80) {
            if (!url) return '';
            const q = width <= 480 ? 50 : (width <= 800 ? 65 : quality);

            // 1. Supabase Storage URLs
            if (url.includes('/storage/v1/object/public/')) {
                return url.replace(
                    '/storage/v1/object/public/',
                    `/storage/v1/render/image/public/`
                ) + `?width=${width}&quality=${q}&format=webp`;
            }

            // 2. External URLs
            // Return original URL to avoid proxy errors
            if (url.startsWith('http')) {
                return url;
            }

            return url;
        }

        function renderHero(hero) {
            const heroLink = getNewsLink(hero);

            // Image Optimization with Srcset
            const imgMobile = optimizeImage(hero.image_url, 480, 75);
            const imgTablet = optimizeImage(hero.image_url, 800, 80);
            const imgDesktop = optimizeImage(hero.image_url, 1200, 85);

            document.getElementById('hero-container').innerHTML = `
                <a href="${heroLink}" class="group relative block h-[450px] md:h-[650px] overflow-hidden rounded-[2.5rem] md:rounded-[3.5rem] bg-slate-900 shadow-2xl transition-all duration-700">
                    <img 
                        src="${imgDesktop}" 
                        srcset="${imgMobile} 480w, ${imgTablet} 800w, ${imgDesktop} 1200w"
                        sizes="(max-width: 768px) 100vw, 1200px"
                        fetchpriority="high" 
                        class="news-image-scale absolute inset-0 w-full h-full object-cover opacity-60 grayscale-[0.2] transition-all duration-1000 group-hover:scale-105 group-hover:grayscale-0" 
                        alt="${hero.title}">
                    <div class="hero-gradient absolute inset-0"></div>
                    
                    <div class="absolute inset-0 p-6 md:p-16 flex flex-col justify-end max-w-5xl">
                        <div class="flex items-center gap-3 mb-4 md:mb-6 animate-in fade-in slide-in-from-left-4 duration-700">
                            <span class="px-4 py-1.5 bg-orange-600 text-white text-[10px] md:text-xs font-black uppercase tracking-widest rounded-full shadow-lg shadow-orange-600/20 leading-none">
                                Головна новина
                            </span>
                            <div class="h-[1px] w-12 bg-white/20"></div>
                            <div class="text-white/60 text-[10px] md:text-xs font-bold uppercase tracking-widest">
                                ${CATEGORIES_UK[hero.category] || 'НОВИНИ'}
                            </div>
                        </div>
                        <h1 class="text-3xl md:text-6xl lg:text-7xl text-white font-extrabold leading-[1.1] mb-4 md:mb-8 tracking-tighter drop-shadow-2xl animate-in fade-in slide-in-from-bottom-4 duration-700 delay-100">${hero.title}</h1>
                        <p class="text-slate-200 text-sm md:text-xl line-clamp-2 max-w-3xl font-medium opacity-90 leading-relaxed animate-in fade-in slide-in-from-bottom-4 duration-700 delay-200">
                             ${hero.meta_description} <span class="text-orange-400 font-extrabold hover:text-orange-300 ml-2">Читати далі →</span>
                        </p>
                    </div>
                </a>`;
        }

        function renderGrid(posts, append = false) {
            const grid = document.getElementById('news-grid');

            if (currentViewMode === 'compact') {
                grid.className = "flex flex-col gap-4 max-w-full";
            } else {
                grid.className = "grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10 max-w-full";
            }

            const html = posts.map((post, i) => {
                const link = getNewsLink(post);

                if (currentViewMode === 'compact') {
                    // Compact Style: Small image + Title + Category
                    return `
                    <a href="${link}" class="news-list-item group flex items-center gap-3 sm:gap-4 border-b border-slate-50 pb-4 last:border-0 animate-in fade-in slide-in-from-bottom-2 duration-500 hover:bg-slate-50 -mx-2 sm:-mx-4 px-2 sm:px-4 rounded-2xl transition-all" style="animation-delay: ${i * 0.03}s">
                        <div class="relative w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-slate-100">
                            <img src="${optimizeImage(post.image_url, 200, 70)}" loading="lazy" decoding="async" class="w-full h-full object-cover grayscale-[0.2] group-hover:grayscale-0 transition-transform duration-500 group-hover:scale-110" alt="${post.title}">
                        </div>
                        <div class="flex-1 min-w-0">
                             <div class="flex items-center gap-2 mb-1">
                                <span class="text-[8px] font-black text-orange-600 uppercase tracking-widest">${CATEGORIES_UK[post.category] || post.category}</span>
                                <span class="w-0.5 h-0.5 bg-slate-300 rounded-full"></span>
                                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${new Date(post.created_at).toLocaleDateString('uk-UA')}</span>
                             </div>
                             <h3 class="text-sm md:text-lg font-bold leading-tight text-slate-900 group-hover:text-orange-600 transition-colors tracking-tight line-clamp-2 overflow-hidden">${post.title}</h3>
                        </div>
                        <div class="text-[14px] font-bold text-slate-300 group-hover:text-orange-600 transition-colors flex-shrink-0 ml-auto">
                            →
                        </div>
                    </a>`;
                }

                // Detailed Style (Grid Format)
                return `
                <a href="${link}" class="news-list-item group flex flex-col h-full border border-transparent hover:border-slate-100 p-3 sm:p-4 -mx-2 sm:-mx-4 md:m-0 rounded-[1.5rem] sm:rounded-[2.5rem] bg-transparent md:bg-white hover:bg-white md:shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] hover:shadow-2xl hover:shadow-orange-100 transition-all duration-500 animate-in fade-in slide-in-from-bottom-4" style="animation-delay: ${i * 0.05}s">
                    <div class="relative w-full aspect-[4/3] rounded-[1.5rem] md:rounded-[2rem] overflow-hidden flex-shrink-0 bg-slate-100 shadow-md mb-5 md:mb-6">
                        <img src="${optimizeImage(post.image_url, 600, 80)}" loading="lazy" decoding="async" class="news-image-scale w-full h-full object-cover transition-all duration-700 grayscale-[0.1] group-hover:grayscale-0 group-hover:scale-105" alt="${post.title}">
                        <div class="absolute bottom-3 right-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-lg text-[9px] font-black text-white tracking-widest shadow-xl opacity-0 group-hover:opacity-100 transition-opacity">👁️ ${post.views || 0}</div>
                    </div>
                    <div class="flex-1 flex flex-col relative z-10 px-1 md:px-2">
                         <div class="flex items-center gap-3 mb-3">
                            <span class="text-[10px] font-black text-orange-600 uppercase tracking-widest bg-orange-50 px-2.5 py-1 rounded-md border border-orange-100/50 shadow-sm">${CATEGORIES_UK[post.category] || post.category}</span>
                            <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${new Date(post.created_at).toLocaleDateString('uk-UA')}</span>
                         </div>
                         <h3 class="text-xl md:text-2xl font-extrabold leading-[1.2] mb-3 text-slate-900 group-hover:text-orange-600 transition-colors tracking-tight line-clamp-3">${post.title}</h3>
                         <p class="text-slate-600 text-sm md:text-base line-clamp-2 leading-relaxed mb-6 font-medium mt-auto opacity-90">${post.meta_description || 'Читати деталі новини на нашому порталі.'}</p>
                         <div class="flex items-center gap-2 text-slate-900 font-black text-[11px] uppercase tracking-widest group-hover:translate-x-1 transition-transform mt-auto justify-end">
                             ДЕТАЛЬНІШЕ
                             <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                         </div>
                    </div>
                </a>`;
            }).join('');

            if (append) grid.innerHTML += html;
            else grid.innerHTML = html;
        }

        window.loadMoreNews = () => {
            currentPage++;
            loadNews(true);
        };

        // Sidebar trending (can stay simple or fetch top views)
        async function loadTrending() {
            // Fetch categories independently to guarantee Ukrainian names always available
            let catMap = {};
            try {
                const { data: cats } = await _supabase.from('categories').select('slug,name');
                if (cats) cats.forEach(c => { catMap[c.slug] = c.name; });
            } catch (e) { }

            const { data } = await _supabase.from('news').select('id, title, slug, image_url, views, category, meta_description').eq('is_published', true).order('views', { ascending: false }).limit(6);
            if (data) {
                document.getElementById('trending-list').innerHTML = data.map(post => {
                    const link = getNewsLink(post);
                    // Ukrainian name: prefer freshly fetched catMap, then populated CATEGORIES_UK, then slug
                    const catName = catMap[post.category] || CATEGORIES_UK[post.category] || post.category;
                    return `
                    <a href="${link}" class="trending-item group flex gap-3 sm:gap-5 border-b border-slate-100 pb-5 mb-5 last:border-0 last:mb-0 p-2 sm:p-3 -mx-2 sm:-mx-3 rounded-2xl hover:bg-white hover:shadow-xl transition-all duration-300">
                        <div class="w-20 h-20 sm:w-24 sm:h-24 flex-shrink-0 rounded-xl sm:rounded-2xl overflow-hidden relative bg-slate-100 shadow-sm">
                            <img src="${optimizeImage(post.image_url, 200, 70)}" loading="lazy" decoding="async" class="w-full h-full object-cover grayscale-[0.3] group-hover:grayscale-0 transition-all duration-700 group-hover:scale-110" alt="${post.title}">
                            <div class="absolute bottom-1 right-1 bg-black/60 backdrop-blur-sm px-2 py-0.5 rounded-lg text-[8px] font-black text-white shadow-xl">👁️ ${post.views || 0}</div>
                        </div>
                        <div class="flex flex-col justify-center gap-1.5">
                            <span class="text-[10px] font-black text-orange-600 uppercase tracking-widest inline-block px-2 py-0.5 bg-orange-50 rounded-md self-start border border-orange-100/50">${catName}</span>
                            <h4 class="text-sm font-extrabold text-slate-900 leading-snug group-hover:text-orange-600 transition-colors tracking-tight line-clamp-2">${post.title}</h4>
                            <div class="flex items-center gap-4 mt-1">
                                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Читати статтю →</span>
                            </div>
                        </div>
                    </a>`;
                }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            init(); // Header init inside
            loadTrending();
            window.initSiteFooter(_supabase);
        });

        // ── Newsletter subscription ──────────────────────────────────────
        async function submitNewsletter() {
            const input = document.getElementById('newsletter-email');
            const btn = document.getElementById('newsletter-btn');
            const msg = document.getElementById('newsletter-msg');
            const email = input.value.trim();

            if (!email) { input.focus(); return; }

            btn.disabled = true;
            btn.textContent = '...';
            msg.className = 'text-xs text-center font-bold hidden';

            try {
                const res = await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.ok) {
                    msg.textContent = '✅ ' + data.message;
                    msg.className = 'text-xs text-center font-bold text-green-400';
                    input.value = '';
                    btn.textContent = 'Підписатись';
                } else {
                    msg.textContent = '⚠️ ' + (data.error || 'Помилка');
                    msg.className = 'text-xs text-center font-bold text-orange-300';
                    btn.textContent = 'Підписатись';
                }
            } catch (e) {
                msg.textContent = '⚠️ Помилка з\'єднання';
                msg.className = 'text-xs text-center font-bold text-orange-300';
                btn.textContent = 'Підписатись';
            }
            msg.classList.remove('hidden');
            btn.disabled = false;
        }
        window.submitNewsletter = submitNewsletter;
    </script>
